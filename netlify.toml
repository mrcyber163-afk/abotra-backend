[build]
command = "echo 'No build step required'"
publish = "."

[build.environment]
NODE_VERSION = "18"

# Redirects
[[redirects]]
from = "/"
to = "/index.html"
status = 200

[[redirects]]
from = "/admin/*"
to = "/admin/:splat"
status = 200

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

# 404 page
[[redirects]]
from = "/*"
to = "/404.html"
status = 404

# Functions
[functions]
directory = "functions"
node_bundler = "esbuild"

# Headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/manifest.json"
[headers.values]
Content-Type = "application/json"

[[headers]]
for = "/sw.js"
[headers.values]
Content-Type = "application/javascript"
Service-Worker-Allowed = "/"

[[headers]]
for = "/assets/images/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600"