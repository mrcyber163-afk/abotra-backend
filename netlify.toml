[build]
  publish = "frontend"

[build.environment]
  NODE_VERSION = "18"

[context.production.environment]
  API_URL = "https://abotra-backend-production.up.railway.app"
  VITE_API_URL = "https://abotra-backend-production.up.railway.app"
  API_BASE_URL = "https://abotra-backend-production.up.railway.app"
  NODE_ENV = "production"

[[redirects]]
  from = "/"
  to = "/frontend/index.html"
  status = 200

[[redirects]]
  from = "/pages/*"
  to = "/frontend/pages/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/frontend/assets/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/frontend/admin/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/frontend/pages/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Service-Worker-Allowed = "/"
