[build]
command = "npm install"
functions = "netlify/functions"
publish = "frontend"

[functions]
node_bundler = "esbuild"
external_node_modules = ["firebase-admin"]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/frontend/index.html"
status = 200