<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin Login | ABOTRA-PROAI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #050505;
    background-image: url("../assets/images/background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
}

body.light-theme {
    background: #f5f5f5;
    background-image: url("../assets/images/background-light.png");
}

body.light-theme .overlay {
    background: rgba(255,255,255,0.85);
}

body.light-theme .login-box {
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.08);
}

body.light-theme .input-box input {
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.1);
    color: #1a1a1a;
}

body.light-theme .input-box input::placeholder {
    color: #999;
}

body.light-theme .sub-text {
    color: #666;
}

body.light-theme .theme-toggle {
    background: rgba(0,0,0,0.08);
    border-color: rgba(128,0,0,0.3);
}

body.light-theme .theme-toggle i,
body.light-theme .theme-toggle span {
    color: #800000;
}

.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
    z-index: 10000;
}

.theme-toggle:hover {
    background: rgba(255,215,0,0.2);
    transform: scale(1.05);
}

.theme-toggle i {
    font-size: 16px;
    color: #FFFFFF;
}

.theme-toggle span {
    font-size: 12px;
    font-weight: 600;
    color: #FFFFFF;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(4px);
    z-index: 1;
}

.login-container {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    justify-content: center;
}

.login-box {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    backdrop-filter: blur(15px);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.logo-section {
    background: linear-gradient(135deg, #800000, #b8860b, #FFD700);
    padding: 0;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.logo-section img {
    width: 100%;
    height: auto;
    max-height: 180px;
    object-fit: contain;
    display: block;
    background: rgba(0,0,0,0.2);
    padding: 20px;
}

.content {
    padding: 30px;
}

.admin-badge-container {
    text-align: center;
    margin-bottom: 20px;
}

.admin-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 12px;
    font-weight: 700;
    color: #FFD700;
    backdrop-filter: blur(5px);
}

.admin-badge i {
    font-size: 14px;
}

h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    color: #FFD700;
    margin-bottom: 8px;
}

h1 i {
    margin-right: 8px;
    font-size: 24px;
}

.sub-text {
    text-align: center;
    color: #BBBBBB;
    font-size: 13px;
    margin-bottom: 25px;
}

.input-box {
    width: 100%;
    margin-bottom: 20px;
    position: relative;
}

.input-box i:first-child {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #FFD700;
    font-size: 16px;
    z-index: 2;
}

.input-box input {
    width: 100%;
    height: 52px;
    border: none;
    outline: none;
    border-radius: 14px;
    padding: 0 15px 0 45px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #FFFFFF;
    font-size: 14px;
    transition: 0.3s;
}

.input-box input:focus {
    border-color: #FFD700;
    box-shadow: 0 0 8px rgba(255,215,0,0.2);
}

.input-box input::placeholder {
    color: #888;
}

.password-box i:last-child {
    position: absolute;
    left: auto;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #FFD700;
    font-size: 16px;
    z-index: 2;
}

.login-btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #800000, #b8860b, #FFD700);
    color: white;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255,215,0,0.4);
}

.login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.back-link {
    text-align: center;
    margin-top: 20px;
}

.back-link a {
    color: #FFD700;
    text-decoration: none;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: 0.3s;
}

.back-link a:hover {
    color: white;
}

.notification {
    position: fixed;
    top: 80px;
    right: 25px;
    min-width: 280px;
    max-width: 350px;
    padding: 12px 16px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 99999;
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease;
}

.notification.success {
    background: rgba(0,255,136,0.15);
    border-color: rgba(0,255,136,0.35);
}

.notification.success i {
    color: #00FF88;
}

.notification.error {
    background: rgba(255,77,77,0.15);
    border-color: rgba(255,77,77,0.35);
}

.notification.error i {
    color: #FF4D4D;
}

.notification i {
    font-size: 16px;
}

.notification .message {
    flex: 1;
    font-size: 13px;
    line-height: 1.4;
    color: #FFFFFF;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(100%); }
}

@media(max-width: 480px) {
    .login-box { max-width: 100%; }
    .content { padding: 25px; }
    h1 { font-size: 22px; }
    h1 i { font-size: 20px; }
    .theme-toggle { top: 15px; right: 15px; padding: 8px 12px; }
    .theme-toggle span { display: none; }
    .logo-section img { max-height: 130px; padding: 15px; }
    .admin-badge { padding: 6px 14px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i>
    <i class="fas fa-moon" style="display:none;"></i>
    <span>Theme</span>
</div>

<div class="overlay"></div>

<div class="login-container">
    <div class="login-box">
        <div class="logo-section">
            <img src="../assets/images/logo.png" alt="ABOTRA-PROAI" onerror="this.src='https://placehold.co/420x180/800000/FFD700?text=ABOTRA-PROAI'">
        </div>
        
        <div class="content">
            <div class="admin-badge-container">
                <div class="admin-badge">
                    <i class="fas fa-crown"></i> ADMINISTRATOR PANEL
                </div>
            </div>
            
            <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
            <p class="sub-text">Enter your administrator credentials</p>

            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" id="adminEmail" placeholder="Admin Email" autocomplete="email">
            </div>

            <div class="input-box password-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password">
                <i class="fas fa-eye-slash" id="togglePassword"></i>
            </div>

            <button class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Access Admin Panel
            </button>

            <div class="back-link">
                <a href="../index.html">
                    <i class="fas fa-arrow-left"></i> Back to Website
                </a>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ============================================================
// THEME TOGGLE
// ============================================================
function initTheme() {
    const savedTheme = localStorage.getItem('abotra_theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
}

document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

// ============================================================
// PASSWORD TOGGLE
// ============================================================
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('adminPassword');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
});

// ============================================================
// SHOW NOTIFICATION
// ============================================================
function showNotification(message, type) {
    const existingNotif = document.querySelector('.notification');
    if (existingNotif) existingNotif.remove();
    
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    notification.innerHTML = `<i class="fas ${icon}"></i><div class="message">${message}</div>`;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => notification.remove(), 300);
    }, 4000);
}

// ============================================================
// CHECK IF USER IS ADMIN
// ============================================================
async function checkIsAdmin(email, uid) {
    try {
        const snapshot = await db.ref('admins').once('value');
        if (snapshot.exists()) {
            const admins = snapshot.val();
            for (const key in admins) {
                const admin = admins[key];
                if (admin === true && key === uid) return true;
                if (typeof admin === 'object' && admin !== null) {
                    if (admin.email === email || admin.uid === uid) return true;
                }
            }
        }
        return false;
    } catch (error) {
        console.error("Error checking admin status:", error);
        return false;
    }
}

// ============================================================
// CHECK EXISTING SESSION
// ============================================================
function checkExistingSession() {
    const isLoggedIn = localStorage.getItem('abotra_admin_logged_in') === 'true';
    const sessionExpiry = localStorage.getItem('abotra_admin_session_expiry');
    
    if (isLoggedIn && sessionExpiry && Date.now() < parseInt(sessionExpiry)) {
        window.location.href = 'admin-dashboard.html';
        return true;
    } else if (isLoggedIn) {
        localStorage.removeItem('abotra_admin_logged_in');
        localStorage.removeItem('abotra_admin_email');
        localStorage.removeItem('abotra_admin_uid');
        localStorage.removeItem('abotra_admin_session_expiry');
    }
    return false;
}

// ============================================================
// LOGIN FUNCTION
// ============================================================
document.getElementById('loginBtn').addEventListener('click', async function() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    
    if (!email || !password) {
        showNotification('Please enter both email and password', 'error');
        return;
    }
    
    if (!email.includes('@')) {
        showNotification('Please enter a valid email address', 'error');
        return;
    }
    
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
    
    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        const isAdmin = await checkIsAdmin(email, user.uid);
        
        if (isAdmin) {
            localStorage.setItem('abotra_admin_logged_in', 'true');
            localStorage.setItem('abotra_admin_email', email);
            localStorage.setItem('abotra_admin_uid', user.uid);
            localStorage.setItem('abotra_admin_session_expiry', (Date.now() + (24 * 60 * 60 * 1000)).toString());
            
            showNotification('✓ Admin login successful!', 'success');
            
            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 1500);
        } else {
            showNotification('⛔ Access denied. You do not have administrator privileges.', 'error');
            await auth.signOut();
            localStorage.removeItem('abotra_admin_logged_in');
            localStorage.removeItem('abotra_admin_email');
            localStorage.removeItem('abotra_admin_uid');
            localStorage.removeItem('abotra_admin_session_expiry');
        }
        
    } catch (error) {
        console.error("Login error:", error);
        
        let errorMessage = 'Invalid credentials. Please try again.';
        if (error.code === 'auth/user-not-found') {
            errorMessage = 'No administrator account found with this email.';
        } else if (error.code === 'auth/wrong-password') {
            errorMessage = 'Incorrect password. Please try again.';
        } else if (error.code === 'auth/too-many-requests') {
            errorMessage = 'Too many failed attempts. Please try again later.';
        } else if (error.code === 'auth/invalid-email') {
            errorMessage = 'Invalid email format.';
        }
        
        showNotification(errorMessage, 'error');
        
    } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
    }
});

// ============================================================
// ENTER KEY SUPPORT
// ============================================================
document.getElementById('adminPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
    }
});
document.getElementById('adminEmail').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
    }
});

// ============================================================
// INITIALIZE
// ============================================================
checkExistingSession();
initTheme();
</script>
</body>
</html>
