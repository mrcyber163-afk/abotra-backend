<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, push, set, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let latestMasterTrade = null;
let isCopying = false;
let refreshInterval = null;
const EXPIRY_HOURS = 6;
const EXPIRY_MS = EXPIRY_HOURS * 60 * 60 * 1000;
const PERFORMANCE_FEE_PERCENT = 0.10;

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
}
document.getElementById('themeToggle').addEventListener('click', () => {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

function showNotification(message, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';
    toast.innerHTML = `<i class="fas ${icon}"></i><div class="popup-message">${message}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 4000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatExpiryTime(createdAt) {
    const remaining = (createdAt + EXPIRY_MS) - Date.now();
    if (remaining <= 0) return 'Expired';
    const hours = Math.floor(remaining / (60 * 60 * 1000));
    const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
    return `${hours}h ${minutes}m remaining`;
}

async function copyMasterTrade() {
    if (!currentUser) { showNotification('Please login first', 'error'); return; }
    if (!latestMasterTrade) { showNotification('No active master trade available', 'error'); return; }
    if (Date.now() - latestMasterTrade.createdAt > EXPIRY_MS) { showNotification('Trade has expired!', 'error'); return; }
    if (isCopying) return;
    
    const copyBtn = document.getElementById('copyBtn');
    isCopying = true;
    copyBtn.disabled = true;
    copyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    
    try {
        const userRef = ref(db, `users/${currentUser.uid}`);
        const userSnap = await get(userRef);
        let userBalance = userSnap.exists() ? (userSnap.val().balance || 0) : 0;
        if (userBalance < latestMasterTrade.amount) {
            showNotification(`Insufficient balance! Need $${latestMasterTrade.amount}`, 'error');
            copyBtn.disabled = false;
            copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy This Trade';
            isCopying = false;
            return;
        }
        
        await runTransaction(userRef, (current) => {
            if (current && (current.balance || 0) >= latestMasterTrade.amount) {
                current.balance = (current.balance || 0) - latestMasterTrade.amount;
            }
            return current;
        });
        
        const copiedTradeRef = push(ref(db, `copiedTrades/${currentUser.uid}`));
        const copiedTradeId = copiedTradeRef.key;
        await set(copiedTradeRef, {
            id: copiedTradeId, originalTradeId: latestMasterTrade.id, type: latestMasterTrade.type,
            amount: latestMasterTrade.amount, leverage: latestMasterTrade.leverage,
            entryPrice: latestMasterTrade.entryPrice, takeProfit: latestMasterTrade.takeProfit || null,
            stopLoss: latestMasterTrade.stopLoss || null, status: 'active',
            copiedAt: Date.now(), createdAt: latestMasterTrade.createdAt, isCopiedTrade: true
        });
        
        const masterRef = ref(db, `masterTrades/${latestMasterTrade.id}`);
        const masterSnap = await get(masterRef);
        if (masterSnap.exists()) {
            const current = masterSnap.val();
            await update(masterRef, {
                totalFollowers: (current.totalFollowers || 0) + 1,
                totalVolume: (current.totalVolume || 0) + latestMasterTrade.amount
            });
        }
        
        const userTradeRef = push(ref(db, `trades/${currentUser.uid}`));
        await set(userTradeRef, {
            id: userTradeRef.key, type: latestMasterTrade.type, margin: latestMasterTrade.amount,
            amount: latestMasterTrade.amount, leverage: latestMasterTrade.leverage,
            entryPrice: latestMasterTrade.entryPrice, takeProfit: latestMasterTrade.takeProfit || null,
            stopLoss: latestMasterTrade.stopLoss || null, status: 'open',
            createdAt: Date.now(), copiedFrom: latestMasterTrade.id, isCopiedTrade: true,
            symbol: 'BTC/USDT', performanceFeePending: true, performanceFeePercent: PERFORMANCE_FEE_PERCENT
        });
        
        const perfFeeRef = ref(db, `performanceFees/${currentUser.uid}/${userTradeRef.key}`);
        await set(perfFeeRef, {
            tradeId: userTradeRef.key, masterTradeId: latestMasterTrade.id,
            amount: latestMasterTrade.amount, entryPrice: latestMasterTrade.entryPrice,
            type: latestMasterTrade.type, feePercent: PERFORMANCE_FEE_PERCENT,
            status: 'open', createdAt: Date.now()
        });
        
        showNotification(`✅ Trade copied! Redirecting...`, 'success');
        copyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Copied!';
        setTimeout(() => { window.location.href = 'trade.html'; }, 1500);
        
    } catch (error) {
        showNotification('Error copying trade', 'error');
        copyBtn.disabled = false;
        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy This Trade';
        isCopying = false;
    }
}

// ✅ FIXED: loadLatestMasterTrade - Simple read without orderByChild
async function loadLatestMasterTrade() {
    const container = document.getElementById('masterTradeContainer');
    try {
        // ✅ Simple read - no query/orderByChild needed
        const snapshot = await get(ref(db, 'masterTrades'));
        let allTrades = [];
        
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                const trade = { id: child.key, ...child.val() };
                // Only include active trades
                if (trade.status !== 'inactive' && trade.status !== 'closed') {
                    allTrades.push(trade);
                }
            });
        }
        
        if (allTrades.length === 0) {
            container.innerHTML = `<div class="trade-card"><div class="loading-state"><i class="fas fa-inbox"></i><p>No active master trades available</p><p style="font-size:10px; margin-top:8px;">Admin will post trading opportunities here</p></div></div>`;
            latestMasterTrade = null;
            return;
        }
        
        // ✅ Sort manually by createdAt (newest first)
        allTrades.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        const trade = allTrades[0];
        
        if (!trade || !trade.type || !trade.amount) {
            container.innerHTML = `<div class="trade-card"><div class="loading-state"><i class="fas fa-exclamation-triangle"></i><p>Invalid trade data</p></div></div>`;
            latestMasterTrade = null;
            return;
        }
        
        // Check if expired
        if (Date.now() - trade.createdAt > EXPIRY_MS) {
            await update(ref(db, `masterTrades/${trade.id}`), { status: 'inactive' });
            container.innerHTML = `<div class="trade-card"><div class="loading-state"><i class="fas fa-clock"></i><p>Previous trade expired. Waiting for new one...</p></div></div>`;
            latestMasterTrade = null;
            return;
        }
        
        latestMasterTrade = trade;
        const tradeTypeClass = trade.type === 'BUY' ? 'trade-type-BUY' : 'trade-type-SELL';
        const tradeTypeText = trade.type === 'BUY' ? '📈 BUY / LONG' : '📉 SELL / SHORT';
        const tradeCreator = trade.createdByEmail || trade.createdBy || 'Master Trader';
        
        container.innerHTML = `
            <div class="trade-card">
                <div style="text-align:center;">
                    <span class="${tradeTypeClass}">${tradeTypeText}</span>
                    <div class="expiry-badge">⏰ ${formatExpiryTime(trade.createdAt)}</div>
                </div>
                <div style="text-align:center;margin:12px 0;">
                    <span class="trade-amount">$${trade.amount}</span>
                </div>
                <div class="trade-info">
                    <div class="trade-info-item"><div class="trade-info-label">Entry Price</div><div class="trade-info-value">$${trade.entryPrice}</div></div>
                    <div class="trade-info-item"><div class="trade-info-label">Leverage</div><div class="trade-info-value">${trade.leverage}x</div></div>
                    <div class="trade-info-item"><div class="trade-info-label">Take Profit</div><div class="trade-info-value">${trade.takeProfit ? `$${trade.takeProfit}` : 'N/A'}</div></div>
                    <div class="trade-info-item"><div class="trade-info-label">Stop Loss</div><div class="trade-info-value">${trade.stopLoss ? `$${trade.stopLoss}` : 'N/A'}</div></div>
                </div>
                <div class="trade-info" style="grid-template-columns: repeat(2, 1fr);">
                    <div class="trade-info-item"><div class="trade-info-label">Created By</div><div class="trade-info-value" style="font-size:11px;">${escapeHtml(tradeCreator)}</div></div>
                    <div class="trade-info-item"><div class="trade-info-label">Total Followers</div><div class="trade-info-value">${trade.totalFollowers || 0}</div></div>
                </div>
                ${trade.note ? `<div style="background:rgba(255,215,0,0.08);border-radius:10px;padding:8px;margin:10px 0;text-align:center;"><small style="color:#FFD700;font-size:10px;">📝 ${escapeHtml(trade.note)}</small></div>` : ''}
                <div style="background:rgba(255,215,0,0.08);border-radius:10px;padding:10px;text-align:center;">
                    <small style="color:#FFD700;font-size:10px;">💰 Performance Fee: <strong>10%</strong> of profit</small>
                </div>
                <button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy This Trade</button>
                <div style="text-align:center;margin-top:12px;">
                    <small style="color:#888;font-size:9px;">⚠️ $${trade.amount} will be deducted from your balance<br>Trade expires ${EXPIRY_HOURS} hours after creation</small>
                </div>
            </div>
        `;
        
        const copyBtn = document.getElementById('copyBtn');
        if (copyBtn) copyBtn.addEventListener('click', copyMasterTrade);
        
    } catch (error) {
        console.error('Load master trade error:', error);
        container.innerHTML = `
            <div class="trade-card">
                <div class="loading-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Error loading master trade</p>
                    <p style="font-size:10px; color:#F6465D;">${error.message || 'Please try again'}</p>
                    <button onclick="location.reload()" style="margin-top:12px; padding:6px 16px; background:rgba(255,215,0,0.2); border:1px solid rgba(255,215,0,0.3); border-radius:8px; color:#FFD700; cursor:pointer;">Refresh</button>
                </div>
            </div>
        `;
        latestMasterTrade = null;
    }
}

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    document.getElementById('skeletonInfoCard').style.display = 'flex';
    document.getElementById('skeletonTradeCard').style.display = 'block';
    document.getElementById('realContent').style.display = 'none';
    await loadLatestMasterTrade();
    refreshInterval = setInterval(loadLatestMasterTrade, 30000);
    setTimeout(() => {
        document.getElementById('skeletonInfoCard').style.display = 'none';
        document.getElementById('skeletonTradeCard').style.display = 'none';
        document.getElementById('realContent').style.display = 'block';
    }, 1500);
});

initTheme();
</script>
</body>
</html>
