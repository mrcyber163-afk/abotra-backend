<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, query, orderByChild, limitToLast, push, set, update, runTransaction, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let latestMasterTrade = null;
let isCopying = false;
let refreshInterval = null;

const EXPIRY_HOURS = 6;
const EXPIRY_MS = EXPIRY_HOURS * 60 * 60 * 1000;
const PERFORMANCE_FEE_PERCENT = 0.10; // 10%

function showToast(message, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i><div class="popup-message">${message}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(toast);
    toast.querySelector('.close-notif').addEventListener('click', () => { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); });
    setTimeout(() => { if(toast.parentNode) { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); } }, 4000);
}

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    } else {
        document.body.classList.remove('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    }
}
document.getElementById('themeToggle').addEventListener('click', () => {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

async function addNotification(userId, title, message, type = 'info', link = null) {
    if (!userId) return;
    try {
        const notifRef = push(ref(db, `notifications/${userId}`));
        await set(notifRef, {
            id: notifRef.key,
            title,
            message,
            type,
            read: false,
            link: link,
            timestamp: Date.now(),
            date: new Date().toISOString()
        });
    } catch(e) { console.error("Notification error:", e); }
}

function formatExpiryTime(createdAt) {
    const expiryTime = createdAt + EXPIRY_MS;
    const remaining = expiryTime - Date.now();
    if (remaining <= 0) return 'Expired';
    const hours = Math.floor(remaining / (60 * 60 * 1000));
    const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
    return `${hours}h ${minutes}m remaining`;
}

async function updatePlatformStatsForFee(amount) {
    try {
        const statsRef = ref(db, 'platformStats');
        const snap = await get(statsRef);
        const current = snap.exists() ? snap.val() : {};
        
        await update(statsRef, {
            totalPerformanceFees: (current.totalPerformanceFees || 0) + amount,
            totalFeesCollected: (current.totalFeesCollected || 0) + amount,
            lastPerformanceFeeAt: Date.now()
        });
        console.log(`✅ Performance fee $${amount.toFixed(2)} added to platformStats`);
    } catch(e) {
        console.error("Error updating platform stats:", e);
    }
}

async function copyMasterTrade() {
    if (!currentUser) {
        showToast('Please login first', 'error');
        return;
    }
    if (!latestMasterTrade) {
        showToast('No active master trade available', 'error');
        return;
    }
    
    const now = Date.now();
    const tradeAge = now - (latestMasterTrade.createdAt || 0);
    if (tradeAge > EXPIRY_MS) {
        showToast(`This trade has expired! Master trades expire after ${EXPIRY_HOURS} hours.`, 'error');
        return;
    }
    
    if (isCopying) return;
    
    const copyBtn = document.getElementById('copyBtn');
    isCopying = true;
    copyBtn.disabled = true;
    copyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    
    try {
        const userRef = ref(db, `users/${currentUser.uid}`);
        let userBalance = 0;
        const userSnap = await get(userRef);
        if (userSnap.exists()) {
            userBalance = userSnap.val().balance || 0;
        }
        
        if (userBalance < latestMasterTrade.amount) {
            showToast(`Insufficient balance! Need $${latestMasterTrade.amount}`, 'error');
            copyBtn.disabled = false;
            copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy This Trade';
            isCopying = false;
            return;
        }
        
        const result = await runTransaction(userRef, (currentData) => {
            if (currentData) {
                const currentBalance = currentData.balance || 0;
                if (currentBalance >= latestMasterTrade.amount) {
                    return { ...currentData, balance: currentBalance - latestMasterTrade.amount };
                }
                return currentData;
            }
            return currentData;
        });
        
        if (!result.committed) {
            showToast('Insufficient balance!', 'error');
            copyBtn.disabled = false;
            copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy This Trade';
            isCopying = false;
            return;
        }
        
        const copiedTradeRef = push(ref(db, `copiedTrades/${currentUser.uid}`));
        const copiedTradeId = copiedTradeRef.key;
        
        await set(copiedTradeRef, {
            id: copiedTradeId,
            originalTradeId: latestMasterTrade.id,
            masterTradeId: latestMasterTrade.id,
            type: latestMasterTrade.type,
            amount: latestMasterTrade.amount,
            leverage: latestMasterTrade.leverage,
            entryPrice: latestMasterTrade.entryPrice,
            takeProfit: latestMasterTrade.takeProfit || null,
            stopLoss: latestMasterTrade.stopLoss || null,
            status: 'active',
            copiedAt: Date.now(),
            createdAt: latestMasterTrade.createdAt,
            note: latestMasterTrade.note || '',
            performanceFeeApplied: false,
            isCopiedTrade: true
        });
        
        const masterTradeRef = ref(db, `masterTrades/${latestMasterTrade.id}`);
        const masterSnap = await get(masterTradeRef);
        if (masterSnap.exists()) {
            const currentFollowers = masterSnap.val().totalFollowers || 0;
            const currentVolume = masterSnap.val().totalVolume || 0;
            await update(masterTradeRef, {
                totalFollowers: currentFollowers + 1,
                totalVolume: currentVolume + latestMasterTrade.amount
            });
        }
        
        const userTradeRef = push(ref(db, `trades/${currentUser.uid}`));
        const tradeId = userTradeRef.key;
        await set(userTradeRef, {
            id: tradeId,
            type: latestMasterTrade.type,
            margin: latestMasterTrade.amount,
            amount: latestMasterTrade.amount,
            leverage: latestMasterTrade.leverage,
            entryPrice: latestMasterTrade.entryPrice,
            takeProfit: latestMasterTrade.takeProfit || null,
            stopLoss: latestMasterTrade.stopLoss || null,
            status: 'open',
            createdAt: Date.now(),
            timestamp: Date.now(),
            copiedFrom: latestMasterTrade.id,
            isCopiedTrade: true,
            originalTradeId: latestMasterTrade.id,
            symbol: 'BTC/USDT',
            positionValue: latestMasterTrade.amount * latestMasterTrade.leverage,
            openDate: new Date().toISOString(),
            performanceFeePending: true,
            performanceFeePercent: PERFORMANCE_FEE_PERCENT,
            liquidationPrice: latestMasterTrade.entryPrice * (1 - 0.005),
            openFee: 0
        });
        
        const perfFeeRef = ref(db, `performanceFees/${currentUser.uid}/${tradeId}`);
        await set(perfFeeRef, {
            tradeId: tradeId,
            masterTradeId: latestMasterTrade.id,
            amount: latestMasterTrade.amount,
            entryPrice: latestMasterTrade.entryPrice,
            type: latestMasterTrade.type,
            leverage: latestMasterTrade.leverage,
            feePercent: PERFORMANCE_FEE_PERCENT,
            status: 'open',
            createdAt: Date.now()
        });
        
        await addNotification(
            currentUser.uid,
            '✅ Master Trade Copied Successfully',
            `You successfully copied ${latestMasterTrade.type === 'BUY' ? '📈 LONG' : '📉 SHORT'} trade of $${latestMasterTrade.amount} with ${latestMasterTrade.leverage}x leverage! 10% performance fee applies on profits.`,
            'success',
            'trade.html'
        );
        
        showToast(`✅ Trade copied! Redirecting to trade page...`, 'success');
        
        copyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Copied!';
        setTimeout(() => {
            window.location.href = 'trade.html?symbol=BTC&copied=true';
        }, 1500);
        
    } catch (error) {
        console.error("Copy error:", error);
        showToast('Error copying trade: ' + error.message, 'error');
        copyBtn.disabled = false;
        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy This Trade';
        isCopying = false;
    }
}

async function cleanupExpiredTrades() {
    try {
        const tradesRef = ref(db, 'masterTrades');
        const snapshot = await get(tradesRef);
        if (!snapshot.exists()) return;
        
        const now = Date.now();
        let markedCount = 0;
        
        snapshot.forEach(child => {
            const trade = child.val();
            const tradeAge = now - (trade.createdAt || 0);
            if (tradeAge > EXPIRY_MS && trade.status !== 'inactive') {
                update(ref(db, `masterTrades/${child.key}`), { status: 'inactive' });
                markedCount++;
                console.log(`Marked inactive expired master trade: ${child.key}`);
            }
        });
        
        if (markedCount > 0) {
            console.log(`Marked ${markedCount} expired master trades as inactive`);
        }
    } catch (error) {
        console.error("Cleanup error:", error);
    }
}

async function loadLatestMasterTrade() {
    const container = document.getElementById('masterTradeContainer');
    
    try {
        await cleanupExpiredTrades();
        
        const tradesRef = query(ref(db, 'masterTrades'), orderByChild('createdAt'), limitToLast(10));
        const snapshot = await get(tradesRef);
        
        if (!snapshot.exists()) {
            container.innerHTML = `
                <div class="trade-card">
                    <div class="loading-state">
                        <i class="fas fa-inbox"></i>
                        <p>No active master trades available</p>
                        <p style="font-size:10px; margin-top:8px;">Check back later for trading opportunities</p>
                    </div>
                </div>
            `;
            latestMasterTrade = null;
            return;
        }
        
        let allTrades = [];
        snapshot.forEach(child => {
            const trade = { id: child.key, ...child.val() };
            if (trade.status !== 'inactive' && trade.status !== 'closed') {
                allTrades.push(trade);
            }
        });
        
        if (allTrades.length === 0) {
            container.innerHTML = `
                <div class="trade-card">
                    <div class="loading-state">
                        <i class="fas fa-inbox"></i>
                        <p>No active master trades available</p>
                        <p style="font-size:10px; margin-top:8px;">Check back later for trading opportunities</p>
                    </div>
                </div>
            `;
            latestMasterTrade = null;
            return;
        }
        
        allTrades.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        const trade = allTrades[0];
        
        if (!trade || !trade.type || !trade.amount) {
            container.innerHTML = `
                <div class="trade-card">
                    <div class="loading-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Invalid trade data found</p>
                        <p style="font-size:10px; margin-top:8px;">Please contact admin to fix the master trade data</p>
                    </div>
                </div>
            `;
            latestMasterTrade = null;
            return;
        }
        
        const now = Date.now();
        const tradeAge = now - (trade.createdAt || 0);
        const isExpired = tradeAge > EXPIRY_MS;
        
        if (isExpired) {
            await update(ref(db, `masterTrades/${trade.id}`), { status: 'inactive' });
            container.innerHTML = `
                <div class="trade-card">
                    <div class="loading-state">
                        <i class="fas fa-clock"></i>
                        <p>Previous trade has expired after ${EXPIRY_HOURS} hours</p>
                        <p style="font-size:10px; margin-top:8px;">Waiting for new master trade...</p>
                    </div>
                </div>
            `;
            latestMasterTrade = null;
            return;
        }
        
        latestMasterTrade = trade;
        
        const tradeTypeClass = trade.type === 'BUY' ? 'trade-type-BUY' : 'trade-type-SELL';
        const tradeTypeText = trade.type === 'BUY' ? '📈 BUY / LONG' : '📉 SELL / SHORT';
        const tradeDate = trade.createdAt ? new Date(trade.createdAt).toLocaleString() : 'Unknown';
        const tradeCreator = trade.createdByEmail || 'Master Trader';
        const expiryDisplay = formatExpiryTime(trade.createdAt);
        const expiryWarning = tradeAge > (EXPIRY_MS * 0.8) ? true : false;
        
        container.innerHTML = `
            <div class="trade-card">
                <div style="text-align: center;">
                    <span class="${tradeTypeClass}">${tradeTypeText}</span>
                    ${expiryWarning ? '<div class="expiry-badge" style="margin-top:6px;">⚠️ Expires in ' + expiryDisplay + '</div>' : '<div class="expiry-badge" style="margin-top:6px;">⏰ ' + expiryDisplay + '</div>'}
                </div>
                <div style="text-align: center; margin: 12px 0;">
                    <span class="trade-amount">$${trade.amount}</span>
                </div>
                <div class="trade-info">
                    <div class="trade-info-item">
                        <div class="trade-info-label">Entry Price</div>
                        <div class="trade-info-value">$${trade.entryPrice}</div>
                    </div>
                    <div class="trade-info-item">
                        <div class="trade-info-label">Leverage</div>
                        <div class="trade-info-value">${trade.leverage}x</div>
                    </div>
                    <div class="trade-info-item">
                        <div class="trade-info-label">Take Profit</div>
                        <div class="trade-info-value">${trade.takeProfit ? `$${trade.takeProfit}` : 'N/A'}</div>
                    </div>
                    <div class="trade-info-item">
                        <div class="trade-info-label">Stop Loss</div>
                        <div class="trade-info-value">${trade.stopLoss ? `$${trade.stopLoss}` : 'N/A'}</div>
                    </div>
                </div>
                <div class="trade-info">
                    <div class="trade-info-item">
                        <div class="trade-info-label">Created By</div>
                        <div class="trade-info-value">${escapeHtml(tradeCreator)}</div>
                    </div>
                    <div class="trade-info-item">
                        <div class="trade-info-label">Created At</div>
                        <div class="trade-info-value">${tradeDate}</div>
                    </div>
                    <div class="trade-info-item">
                        <div class="trade-info-label">Total Followers</div>
                        <div class="trade-info-value">${trade.totalFollowers || 0}</div>
                    </div>
                </div>
                <div style="background: rgba(255,215,0,0.08); border-radius: 10px; padding: 10px; margin: 12px 0; text-align:center;">
                    <small style="color:#FFD700; font-size:10px;">💰 Performance Fee: <strong>10%</strong> of profit</small>
                </div>
                ${trade.note ? `<div style="background: rgba(255,215,0,0.1); border-radius: 10px; padding: 10px; margin-top: 12px;">
                    <small style="color:#FFD700; font-size:9px;">📝 Note: ${escapeHtml(trade.note)}</small>
                </div>` : ''}
                <button class="copy-btn" id="copyBtn">
                    <i class="fas fa-copy"></i> Copy This Trade
                </button>
                <div style="text-align: center; margin-top: 12px;">
                    <small style="color:#888; font-size:9px;">⚠️ By copying this trade, $${trade.amount} will be deducted from your balance<br>Trade expires ${EXPIRY_HOURS} hours after creation</small>
                </div>
            </div>
        `;
        
        const copyBtn = document.getElementById('copyBtn');
        if (copyBtn) copyBtn.addEventListener('click', copyMasterTrade);
        
    } catch (error) {
        console.error("Load master trade error:", error);
        container.innerHTML = `
            <div class="trade-card">
                <div class="loading-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Error loading master trade</p>
                    <p style="font-size:10px; color:#F6465D;">${error.message || 'Please check console for details'}</p>
                    <button onclick="location.reload()" style="margin-top:12px; padding:6px 16px; background:rgba(255,215,0,0.2); border:1px solid rgba(255,215,0,0.3); border-radius:8px; color:#FFD700; cursor:pointer;">Refresh</button>
                </div>
            </div>
        `;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => {
        loadLatestMasterTrade();
    }, 30000);
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;
    
    document.getElementById('skeletonInfoCard').style.display = 'flex';
    document.getElementById('skeletonTradeCard').style.display = 'block';
    document.getElementById('realContent').style.display = 'none';
    
    await loadLatestMasterTrade();
    startAutoRefresh();
    
    setTimeout(() => {
        document.getElementById('skeletonInfoCard').style.display = 'none';
        document.getElementById('skeletonTradeCard').style.display = 'none';
        document.getElementById('realContent').style.display = 'block';
    }, 1500);
});

initTheme();
</script>
