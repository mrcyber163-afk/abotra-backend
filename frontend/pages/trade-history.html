<script type="module">

const API_BASE_URL = window.CONFIG ? window.CONFIG.API_URL : 'https://abotra-backend-production.up.railway.app';

// ============================================================
// FIREBASE
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let allTrades = [];
let filteredTrades = [];

// ============================================================
// API HELPER
// ============================================================
async function getFirebaseToken() {
    return new Promise((resolve, reject) => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
            unsubscribe();
            if (!user) { reject(new Error('No user logged in')); return; }
            try { const token = await user.getIdToken(true); resolve(token); } catch (error) { reject(error); }
        });
    });
}

async function apiRequest(endpoint, method, body = null) {
    try {
        const token = await getFirebaseToken();
        const options = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(`${API_BASE_URL}/api/${endpoint}`, options);
        return await response.json();
    } catch (error) { console.error('API error:', error); return { success: false, error: error.message }; }
}

// ============================================================
// THEME
// ============================================================
function initTheme() {
    const savedTheme = localStorage.getItem('abotra_theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
}
document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

function showNotification(message, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i><div class="popup-message">${message}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 4000);
}

// ============================================================
// LOAD TRADES
// ============================================================
async function loadTrades() {
    if (!currentUser) return;
    const container = document.getElementById('historyContainer');
    container.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div><div class="loading-text">Loading trades...</div></div>';
    
    try {
        // Try backend API first
        const data = await apiRequest('trades/history', 'GET');
        if (data.success && data.trades) {
            allTrades = data.trades || [];
        } else {
            // Fallback to Firebase
            const tradesRef = ref(db, `trades/${currentUser.uid}`);
            const snapshot = await get(tradesRef);
            allTrades = [];
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    const trade = child.val();
                    if (trade.status === 'closed' || trade.status === 'completed') {
                        allTrades.push({ id: child.key, ...trade });
                    }
                });
            }
        }
        allTrades.sort((a, b) => {
            const dateA = a.closedAt || a.timestamp || 0;
            const dateB = b.closedAt || b.timestamp || 0;
            return dateB - dateA;
        });
        applyFilters();
        if (allTrades.length === 0) {
            showNotification('No completed trades found.', 'info');
        }
        setTimeout(() => {
            document.getElementById('skeletonContainer').style.display = 'none';
            document.getElementById('realContent').style.display = 'block';
        }, 500);
    } catch (error) {
        console.error("Error loading trades:", error);
        container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading trades. Please try again.</p></div>';
        setTimeout(() => {
            document.getElementById('skeletonContainer').style.display = 'none';
            document.getElementById('realContent').style.display = 'block';
        }, 1000);
    }
}

function applyFilters() {
    const typeFilter = document.getElementById('filterType').value;
    const dateFilter = document.getElementById('filterDate').value;
    const resultFilter = document.getElementById('filterResult').value;
    filteredTrades = [...allTrades];
    
    if (typeFilter !== 'all') {
        filteredTrades = filteredTrades.filter(t => t.type === typeFilter);
    }
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (dateFilter === 'today') {
        filteredTrades = filteredTrades.filter(t => new Date(t.closedAt || t.timestamp) >= today);
    } else if (dateFilter === 'week') {
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        filteredTrades = filteredTrades.filter(t => new Date(t.closedAt || t.timestamp) >= weekAgo);
    } else if (dateFilter === 'month') {
        const monthAgo = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
        filteredTrades = filteredTrades.filter(t => new Date(t.closedAt || t.timestamp) >= monthAgo);
    } else if (dateFilter === 'year') {
        const yearAgo = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());
        filteredTrades = filteredTrades.filter(t => new Date(t.closedAt || t.timestamp) >= yearAgo);
    }
    if (resultFilter === 'profit') {
        filteredTrades = filteredTrades.filter(t => (t.closedProfit || t.profit || 0) > 0);
    } else if (resultFilter === 'loss') {
        filteredTrades = filteredTrades.filter(t => (t.closedProfit || t.profit || 0) < 0);
    }
    updateStats();
    renderHistory();
}

function updateStats() {
    const totalTrades = filteredTrades.length;
    const winningTrades = filteredTrades.filter(t => (t.closedProfit || t.profit || 0) > 0).length;
    const winRate = totalTrades > 0 ? (winningTrades / totalTrades * 100).toFixed(1) : 0;
    const totalPnl = filteredTrades.reduce((sum, t) => sum + (t.closedProfit || t.profit || 0), 0);
    const bestTrade = filteredTrades.length > 0 ? Math.max(...filteredTrades.map(t => t.closedProfit || t.profit || 0)) : 0;
    const avgProfit = totalTrades > 0 ? totalPnl / totalTrades : 0;
    
    document.getElementById('totalTrades').textContent = totalTrades;
    document.getElementById('winRate').textContent = `${winRate}%`;
    document.getElementById('totalPnl').innerHTML = `$${totalPnl.toFixed(2)}`;
    document.getElementById('bestTrade').innerHTML = `$${bestTrade.toFixed(2)}`;
    const pnlPercent = document.getElementById('pnlPercent');
    if (avgProfit > 0) {
        pnlPercent.innerHTML = `Avg: +$${avgProfit.toFixed(2)}`;
        pnlPercent.className = 'stats-sub positive';
    } else if (avgProfit < 0) {
        pnlPercent.innerHTML = `Avg: -$${Math.abs(avgProfit).toFixed(2)}`;
        pnlPercent.className = 'stats-sub negative';
    } else {
        pnlPercent.innerHTML = 'Avg: $0';
        pnlPercent.className = 'stats-sub';
    }
}

function renderHistory() {
    const container = document.getElementById('historyContainer');
    if (filteredTrades.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-chart-line"></i><p>No trades found matching your filters</p></div>`;
        return;
    }
    container.innerHTML = '';
    filteredTrades.forEach(trade => {
        const pnl = trade.closedProfit || trade.profit || 0;
        const entryPrice = trade.entryPrice || trade.price || 0;
        const closePrice = trade.closePrice || trade.exitPrice || entryPrice;
        const priceChange = entryPrice > 0 ? ((closePrice - entryPrice) / entryPrice * 100).toFixed(2) : 0;
        const closeDate = new Date(trade.closedAt || trade.timestamp || Date.now()).toLocaleString();
        const leverage = trade.leverage || 1;
        const stakedAmount = trade.margin || trade.investedAmount || trade.amount || 0;
        
        const card = document.createElement('div');
        card.className = 'history-card';
        card.innerHTML = `
            <div class="card-header">
                <div class="trade-type ${trade.type === 'BUY' ? 'buy' : 'sell'}">${trade.type || 'TRADE'}</div>
                <div class="trade-date"><i class="far fa-calendar-alt"></i> ${closeDate}</div>
            </div>
            <div class="card-details">
                <div class="detail-item"><div class="detail-label">Amount Staked</div><div class="detail-value" style="color:#FFD700; font-weight:700;">$${stakedAmount.toFixed(2)}</div></div>
                <div class="detail-item"><div class="detail-label">Leverage</div><div class="detail-value">${leverage}x</div></div>
                <div class="detail-item"><div class="detail-label">Entry Price</div><div class="detail-value">$${entryPrice.toFixed(2)}</div></div>
                <div class="detail-item"><div class="detail-label">Close Price</div><div class="detail-value">$${closePrice.toFixed(2)}</div></div>
                <div class="detail-item"><div class="detail-label">Price Change</div><div class="detail-value ${priceChange >= 0 ? 'positive' : 'negative'}">${priceChange >= 0 ? '+' : ''}${priceChange}%</div></div>
                <div class="detail-item"><div class="detail-label">Symbol</div><div class="detail-value">${trade.symbol || 'BTC/USDT'}</div></div>
            </div>
            <div class="pnl-section">
                <div class="pnl-amount ${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl).toFixed(2)}</div>
                <div class="pnl-percent ${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? 'PROFIT' : 'LOSS'}</div>
            </div>
        `;
        container.appendChild(card);
    });
}

function resetFilters() {
    document.getElementById('filterType').value = 'all';
    document.getElementById('filterDate').value = 'all';
    document.getElementById('filterResult').value = 'all';
    applyFilters();
}

document.getElementById('filterType').addEventListener('change', applyFilters);
document.getElementById('filterDate').addEventListener('change', applyFilters);
document.getElementById('filterResult').addEventListener('change', applyFilters);
document.getElementById('resetFilterBtn').addEventListener('click', resetFilters);

// ============================================================
// INIT
// ============================================================
function init() {
    initTheme();
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        await loadTrades();
    });
}
init();
</script>
