<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>My P2P Orders | ABOTRA-PROAI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    background: #050505;
    background-image: url("../assets/images/background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    padding-bottom: 75px;
    position: relative;
    transition: background 0.3s ease;
    font-size: 11px;
}

body.light-theme {
    background: #f5f5f5;
    background-image: url("../assets/images/background-light.png");
}
body.light-theme .overlay { background: rgba(255,255,255,0.85); }
body.light-theme .top-bar,
body.light-theme .order-card {
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.08);
}
body.light-theme .top-bar h2,
body.light-theme .page-title {
    color: #800000;
}
body.light-theme .order-info p,
body.light-theme .order-info h4 {
    color: #1e1e2f;
}
body.light-theme .order-status-badge.status-pending-badge {
    background: rgba(128,0,0,0.1);
    color: #800000;
}
body.light-theme .order-status-badge.status-paid-badge,
body.light-theme .order-status-badge.status-completed-badge {
    background: rgba(14,203,129,0.15);
    color: #0A9E65;
}
body.light-theme .theme-toggle {
    background: rgba(0,0,0,0.08);
    border-color: rgba(128,0,0,0.3);
}
body.light-theme .theme-toggle i { color: #800000; }
body.light-theme .bottom-nav {
    background: rgba(255,255,255,0.95);
    border-top: 1px solid rgba(128,0,0,0.2);
}
body.light-theme .bottom-nav a { color: #888; }
body.light-theme .bottom-nav a.active { color: #800000; }
body.light-theme .chat-btn {
    background: linear-gradient(135deg, #800000, #FFD700);
    color: white;
}
body.light-theme .empty-orders {
    background: rgba(0,0,0,0.05);
    color: #333;
}
body.light-theme .empty-orders i { color: #800000; }

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(4px);
    z-index: 1;
}

.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,215,0,0.2);
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo-area { display: flex; align-items: center; gap: 8px; }
.logo-area img { 
    width: 32px; 
    height: 32px; 
    border-radius: 8px; 
    object-fit: cover;
    background: transparent;
}
.logo-area h2 { color: #FFD700; font-size: 14px; margin-bottom: 2px; }
.logo-area p { color: #AAAAAA; font-size: 7px; }
.top-bar-right { display: flex; align-items: center; gap: 8px; }
.back-btn-top {
    background: rgba(255,215,0,0.15);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    color: #FFD700;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 500;
}
.back-btn-top:hover { background: rgba(255,215,0,0.3); }
.theme-toggle {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 10px;
    padding: 8px;
    cursor: pointer;
    transition: 0.3s;
}
.theme-toggle:hover {
    background: rgba(255,215,0,0.2);
    transform: scale(1.05);
}
.theme-toggle i { font-size: 15px; color: #FFFFFF; }

.main-content {
    position: relative;
    z-index: 2;
    max-width: 800px;
    margin: 70px auto 20px;
    padding: 0 12px;
}
.page-title {
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    color: #FFD700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.orders-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.order-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s ease;
    cursor: pointer;
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.order-card:hover {
    transform: translateY(-2px);
    background: rgba(255,215,0,0.1);
    border-color: rgba(255,215,0,0.4);
}
.order-info h4 { 
    color: #FFD700; 
    font-size: 13px; 
    margin-bottom: 4px; 
}
.order-info p { 
    color: #aaa; 
    font-size: 10px; 
}
.order-status-badge {
    padding: 4px 10px;
    border-radius: 18px;
    font-size: 9px;
    font-weight: 600;
}
.status-pending-badge { background: rgba(255,215,0,0.2); color: #FFD700; }
.status-paid-badge { background: rgba(14,203,129,0.2); color: #0ECB81; }
.status-completed-badge { background: rgba(14,203,129,0.3); color: #0ECB81; }
.status-disputed-badge { background: rgba(246,70,93,0.2); color: #F6465D; }
.status-cancelled-badge { background: rgba(128,128,128,0.2); color: #aaa; }
.status-expired-badge { background: rgba(246,70,93,0.15); color: #F6465D; }
.chat-btn {
    background: linear-gradient(135deg, #800000, #FFD700);
    border: none;
    border-radius: 25px;
    padding: 6px 16px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-left: 12px;
    text-decoration: none;
    display: inline-block;
    font-size: 10px;
    transition: 0.3s;
}
.chat-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 2px 8px rgba(255,215,0,0.3);
}
.empty-orders {
    text-align: center;
    padding: 50px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border-radius: 20px;
}
.empty-orders i { font-size: 40px; color: rgba(255,215,0,0.3); margin-bottom: 12px; }
.empty-orders p { color: #aaa; margin-bottom: 16px; font-size: 11px; }
.go-to-market-btn {
    background: linear-gradient(135deg, #800000, #FFD700);
    border: none;
    border-radius: 25px;
    padding: 12px 25px;
    color: white;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: 0.3s;
    font-size: 11px;
}
.go-to-market-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255,215,0,0.3);
}

/* Loading skeleton styles */
.skeleton-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 18px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    animation: skeletonPulse 0.6s ease-in-out infinite;
}
.skeleton-info {
    flex: 1;
}
.skeleton-title {
    width: 60%;
    height: 14px;
    background: linear-gradient(90deg, rgba(255,215,0,0.3) 25%, rgba(255,215,0,0.6) 50%, rgba(255,215,0,0.3) 75%);
    background-size: 200% 100%;
    border-radius: 6px;
    margin-bottom: 6px;
    animation: shimmer 0.6s infinite;
}
.skeleton-subtitle {
    width: 40%;
    height: 10px;
    background: linear-gradient(90deg, rgba(255,215,0,0.2) 25%, rgba(255,215,0,0.4) 50%, rgba(255,215,0,0.2) 75%);
    background-size: 200% 100%;
    border-radius: 5px;
    animation: shimmer 0.6s infinite 0.1s;
}
.skeleton-badge {
    width: 70px;
    height: 28px;
    background: linear-gradient(90deg, rgba(255,215,0,0.25) 25%, rgba(255,215,0,0.5) 50%, rgba(255,215,0,0.25) 75%);
    background-size: 200% 100%;
    border-radius: 18px;
    margin-left: 12px;
    animation: shimmer 0.6s infinite 0.2s;
}
.skeleton-chat {
    width: 60px;
    height: 28px;
    background: linear-gradient(90deg, rgba(14,203,129,0.25) 25%, rgba(14,203,129,0.5) 50%, rgba(14,203,129,0.25) 75%);
    background-size: 200% 100%;
    border-radius: 25px;
    margin-left: 6px;
    animation: shimmer 0.6s infinite 0.15s;
}
@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
@keyframes skeletonPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,215,0,0.2);
    border-radius: 18px 18px 0 0;
    display: flex;
    justify-content: space-around;
    padding: 6px 10px;
    z-index: 100;
}
.bottom-nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #888;
    font-size: 8px;
    gap: 2px;
    transition: 0.3s;
}
.bottom-nav a i { font-size: 18px; }
.bottom-nav a:hover { color: #FFD700; transform: translateY(-2px); }
.bottom-nav a.active { color: #FFD700; }

.notification-popup {
    position: fixed;
    top: 70px;
    right: 15px;
    min-width: 240px;
    padding: 10px 14px;
    border-radius: 14px;
    backdrop-filter: blur(20px);
    animation: slideInRight 0.3s ease;
    border-left: 3px solid;
    z-index: 99999;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
}
.notification-popup.success { background: linear-gradient(135deg, rgba(14,203,129,0.15), rgba(14,203,129,0.08)); border-left-color: #0ECB81; color: white; }
.notification-popup.error { background: linear-gradient(135deg, rgba(255,77,77,0.15), rgba(255,77,77,0.08)); border-left-color: #FF4D4D; color: white; }
.notification-popup.info { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.08)); border-left-color: #FFD700; color: white; }
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
}

@media(max-width: 600px) {
    .order-card { flex-direction: column; align-items: flex-start; gap: 10px; }
    .order-card > div:last-child { align-self: flex-end; }
    .chat-btn { margin-left: 0; }
    .page-title { font-size: 18px; }
    .order-info h4 { font-size: 12px; }
    .order-info p { font-size: 9px; }
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="top-bar">
    <div class="logo-area">
        <img src="../assets/images/logo.png" alt="ABOTRA-PROAI" onerror="this.src='https://placehold.co/40x40/800000/FFD700?text=AI'">
        <div>
            <h2>ABOTRA-PROAI</h2>
            <p>P2P Orders</p>
        </div>
    </div>
    <div class="top-bar-right">
        <button class="back-btn-top" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Back</button>
        <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i><i class="fas fa-moon" style="display:none;"></i></div>
    </div>
</div>
<div class="main-content">
    <div class="page-title"><i class="fas fa-exchange-alt"></i> My P2P Orders</div>
    <div id="appContainer">
        <!-- Loading skeletons -->
        <div class="skeleton-card"><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-subtitle"></div></div><div style="display:flex;"><div class="skeleton-badge"></div><div class="skeleton-chat"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-subtitle"></div></div><div style="display:flex;"><div class="skeleton-badge"></div><div class="skeleton-chat"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-info"><div class="skeleton-title"></div><div class="skeleton-subtitle"></div></div><div style="display:flex;"><div class="skeleton-badge"></div><div class="skeleton-chat"></div></div></div>
    </div>
</div>
<div class="bottom-nav">
    <a href="dashboard.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="trade.html"><i class="fa-solid fa-chart-line"></i><span>Trade</span></a>
    <a href="auto-bot.html"><i class="fas fa-robot"></i><span>AI Bot</span></a>
    <a href="p2p-market.html"><i class="fas fa-handshake"></i><span>P2P</span></a>
    <a href="account.html"><i class="fa-solid fa-user"></i><span>Profile</span></a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let ordersUnsubscribe = null;
let ordersCache = [];

const CACHE_KEY = 'p2p_orders_cache_v4';
const CACHE_TIME_KEY = 'p2p_orders_cache_time_v4';

function formatNumber(n) { return (n || 0).toLocaleString('en-US'); }

function formatTimeAgo(timestamp) {
    if (!timestamp) return '';
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 5) return "Just now";
    if (seconds < 60) return `${seconds}s ago`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days === 1) return "Yesterday";
    return new Date(timestamp).toLocaleDateString();
}

function showNotification(msg, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

function loadFromCache() {
    try {
        const cached = localStorage.getItem(CACHE_KEY);
        const cacheTime = localStorage.getItem(CACHE_TIME_KEY);
        
        if (cached && cacheTime) {
            const age = Date.now() - parseInt(cacheTime);
            if (age < 30 * 60 * 1000) {
                const orders = JSON.parse(cached);
                if (orders.length > 0) {
                    renderOrders(orders);
                    return orders;
                }
            }
        }
    } catch(e) {}
    return null;
}

function saveToCache(orders) {
    try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(orders));
        localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
    } catch(e) {}
}

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        const sunIcon = document.querySelector('#themeToggle i.fa-sun');
        const moonIcon = document.querySelector('#themeToggle i.fa-moon');
        if (sunIcon) sunIcon.style.display = 'none';
        if (moonIcon) moonIcon.style.display = 'inline-block';
    }
}

document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('light-theme');
    localStorage.setItem('abotra_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    const sunIcon = document.querySelector('#themeToggle i.fa-sun');
    const moonIcon = document.querySelector('#themeToggle i.fa-moon');
    if (sunIcon && moonIcon) {
        if (document.body.classList.contains('light-theme')) {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'inline-block';
        } else {
            sunIcon.style.display = 'inline-block';
            moonIcon.style.display = 'none';
        }
    }
});

function renderOrders(orders) {
    const container = document.getElementById('appContainer');
    if (!container) return;
    
    if (!orders || orders.length === 0) {
        container.innerHTML = `<div class="empty-orders"><i class="fas fa-inbox"></i><p>No orders yet</p><button class="go-to-market-btn" onclick="window.location.href='p2p-market.html'"><i class="fas fa-handshake"></i> Go to P2P Market</button></div>`;
        return;
    }
    
    let html = '<div class="orders-list">';
    
    for (let i = 0; i < orders.length; i++) {
        const order = orders[i];
        const statusText = { 
            pending: 'Awaiting Payment', 
            paid: 'Payment Sent', 
            completed: 'Completed', 
            disputed: 'Disputed', 
            cancelled: 'Cancelled', 
            expired: 'Expired' 
        }[order.status] || order.status;
        
        let statusClass = `status-${order.status}-badge`;
        if (order.status === 'expired') statusClass = 'status-expired-badge';
        if (order.status === 'cancelled') statusClass = 'status-cancelled-badge';
        
        const isBuyerOrder = order.buyerId === currentUser?.uid;
        let partnerName = isBuyerOrder ? (order.merchantName || 'Merchant') : (order.buyerName || 'Buyer');
        
        const rate = order.rate || 2800;
        const currency = order.currency || 'TZS';
        const date = new Date(order.createdAtMillis || order.createdAt);
        const dateStr = date.toLocaleDateString();
        const timeAgo = formatTimeAgo(order.createdAtMillis || order.createdAt);
        
        html += `
            <div class="order-card" style="animation-delay: ${i * 0.02}s">
                <div class="order-info">
                    <h4>${formatNumber(order.amount)} USDT @ ${formatNumber(rate)} ${currency}</h4>
                    <p><i class="fas fa-user"></i> ${escapeHtml(partnerName)} • ${dateStr} (${timeAgo})</p>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="order-status-badge ${statusClass}">${statusText}</div>
                    <a href="p2p-chat.html?orderId=${order.id}" class="chat-btn"><i class="fas fa-comments"></i> Chat</a>
                </div>
            </div>`;
    }
    html += '</div>';
    container.innerHTML = html;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function loadOrdersRealtime() {
    if (ordersUnsubscribe) {
        ordersUnsubscribe();
        ordersUnsubscribe = null;
    }
    
    const ordersQuery = query(ref(db, 'p2p_orders'), orderByChild('createdAtMillis'), limitToLast(200));
    
    ordersUnsubscribe = onValue(ordersQuery, (snapshot) => {
        const allOrders = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                const order = { id: child.key, ...child.val() };
                allOrders.push(order);
            });
        }
        
        const userOrders = allOrders.filter(order => 
            order.buyerId === currentUser?.uid || order.merchantUserId === currentUser?.uid
        );
        
        userOrders.sort((a, b) => (b.createdAtMillis || b.createdAt || 0) - (a.createdAtMillis || a.createdAt || 0));
        
        ordersCache = userOrders;
        saveToCache(userOrders);
        renderOrders(userOrders);
        
    }, (error) => {
        console.warn("Orders listener error:", error);
        if (ordersCache.length > 0) {
            renderOrders(ordersCache);
        }
    });
}

onAuthStateChanged(auth, async (user) => {
    if (!user) { 
        window.location.href = 'login.html'; 
        return; 
    }
    currentUser = user;
    
    loadFromCache();
    loadOrdersRealtime();
});

initTheme();

window.addEventListener('beforeunload', () => {
    if (ordersUnsubscribe) ordersUnsubscribe();
});
</script>
</body>
</html>
