.empty-state { text-align: center; padding: 45px 20px; }

.notification-popup {
    position: fixed;
    top: 70px;
    right: 15px;
    min-width: 240px;
    max-width: 280px;

    z-index: 99999;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    animation: slideInRight 0.3s ease;
    border-left: 3px solid;
}
.notification-popup.success { background: linear-gradient(135deg,rgba(0,255,136,0.15), rgba(0,255,136,0.08)); border-left-color: #00FF88; }
.notification-popup.error { background: linear-gradient(135deg,rgba(255,77,77,0.15), rgba(255,77,77,0.08)); border-left-color: #FF4D4D; }
.notification-popup.info { background: linear-gradient(135deg,rgba(255,215,0,0.15), rgba(255,215,0,0.08)); border-left-color: #FFD700; }
.notification-popup i { font-size: 16px; }
.notification-popup .popup-message { flex: 1; font-size: 10px; line-height: 1.4; color: #FFFFFF; font-weight: 500; }
.notification-popup .close-notif { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 11px; }

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(100%); }
}

@media(max-width: 700px) {
    .notifications-container { padding: 0 12px; margin-top: 65px; }
    .page-title { font-size: 16px; flex-direction: column; }
    .action-buttons-group { width: 100%; justify-content: center; }
    .device-message { padding: 8px 10px; }

    .logo-area h2 { font-size: 13px; }
    .logo-area p { display: none; }

<div class="skeleton-card"><div class="skeleton-icon"></div><div class="skeleton-content"><div class="skeleton-line medium"></div><div class="skeleton-line long"></div><div class="skeleton-line short"></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get, push, query, orderByChild, limitToLast, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let notificationsListener = null;
let unreadCount = 0;
let oneSignalInitialized = false;

const ONESIGNAL_APP_ID = "e8654c5c-faf8-4dc4-9f60-d8d3ce7cd1cc";

// ========== ONESIGNAL PUSH NOTIFICATIONS ==========
async function initOneSignal() {
    if (oneSignalInitialized) return;
    try {
        if (typeof window.OneSignal === 'undefined') {
            setTimeout(initOneSignal, 1000);
            return;
        }
        
        await window.OneSignal.Deferred;
        await window.OneSignal.init({
            appId: ONESIGNAL_APP_ID,
            safari_web_id: "web.onesignal.auto.123456789",
            notifyButton: { enable: false },
            allowLocalhostAsSecureOrigin: true,
        });
        
        oneSignalInitialized = true;
        console.log("OneSignal initialized");
        
        const isSubscribed = await window.OneSignal.Notifications.permission;
        const bannerDismissed = localStorage.getItem('onesignal_banner_dismissed');
        
        if (isSubscribed !== true && !bannerDismissed) {
            document.getElementById('permissionBanner').style.display = 'flex';
        }
        
        if (currentUser) {
            await window.OneSignal.sendTag("user_id", currentUser.uid);
            await window.OneSignal.sendTag("user_email", currentUser.email);
            await window.OneSignal.setExternalUserId(currentUser.uid);
        }
        
    } catch (error) {
        console.error("OneSignal init error:", error);
    }
}

async function requestPushPermission() {
    try {
        if (typeof window.OneSignal === 'undefined') return;
        
        const result = await window.OneSignal.Notifications.requestPermission();
        if (result === true) {
            localStorage.setItem('onesignal_banner_dismissed', 'true');
            document.getElementById('permissionBanner').style.display = 'none';
            showToast('Notifications enabled! You will receive alerts on your phone.', 'success');
            
            if (currentUser) {
                await window.OneSignal.sendTag("user_id", currentUser.uid);
                await window.OneSignal.sendTag("user_email", currentUser.email);
                await window.OneSignal.setExternalUserId(currentUser.uid);
            }
        } else {
            showToast('Notification permission denied', 'info');
        }
    } catch (error) {
        console.error("Permission error:", error);
        showToast('Could not enable notifications', 'error');
    }
}

// Send push notification
async function sendPushNotification(title, message, link = null) {
    if (!oneSignalInitialized || !currentUser) return;
    try {
        await window.OneSignal.Notifications.sendSelf({
            title: title,
            message: message,
            url: link || window.location.origin + '/notifications.html',
            icon: 'https://placehold.co/64x64/800000/FFD700?text=AI'
        });
        console.log("Push notification sent:", title);
    } catch(e) {
        console.log("Push not sent:", e);
    }
}

// Add notification with push
async function addNotificationWithPush(userId, title, message, type = 'info', link = null, actionData = null) {
    if (!userId) return;
    
    const notifRef = push(ref(db, `notifications/${userId}`));
    await set(notifRef, {
        id: notifRef.key, title, message, type, read: false,
        timestamp: Date.now(), date: new Date().toISOString(), link, actionData
    });
    
    if (userId === currentUser?.uid && oneSignalInitialized) {
        await sendPushNotification(title, message, link);
    }
    
    return notifRef.key;
}

window.addNotification = addNotificationWithPush;

// ========== ORIGINAL CODE CONTINUES ==========
function showToast(message, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i><div class="popup-message">${message}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(toast);
    toast.querySelector('.close-notif').addEventListener('click', () => { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); });
    setTimeout(() => { if(toast.parentNode) { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); } }, 4000);
}

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    } else {
        document.body.classList.remove('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    }
}

document.getElementById('themeToggle').addEventListener('click', () => {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

function detectDevice() {
    const ua = navigator.userAgent;
    let device = '';
    if (/iPhone/i.test(ua)) device = 'iPhone';
    else if (/iPad/i.test(ua)) device = 'iPad';
    else if (/Android/i.test(ua)) device = 'Android Device';
    else if (/Windows/i.test(ua)) device = 'Windows PC';
    else if (/Mac/i.test(ua)) device = 'Mac Computer';
    else device = 'Unknown Device';
    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) device += ' (Chrome)';
    else if (/Firefox/i.test(ua)) device += ' (Firefox)';
    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) device += ' (Safari)';
    else if (/Edg/i.test(ua)) device += ' (Edge)';
    return device;
}

async function markAsRead(notificationId, event) {
    if (event) event.stopPropagation();
    if (!currentUser) return;
    await update(ref(db, `notifications/${currentUser.uid}/${notificationId}`), { read: true });
    await updateUnreadCountAndBadge();
    showToast('Marked as read', 'success');
}

async function markAllAsRead() {
    if (!currentUser) return;
    const snapshot = await get(ref(db, `notifications/${currentUser.uid}`));
    if (snapshot.exists()) {
        const updates = {};
        snapshot.forEach(child => { 
            if (!child.val().read) updates[`${child.key}/read`] = true; 
        });
        if (Object.keys(updates).length > 0) {
            await update(ref(db, `notifications/${currentUser.uid}`), updates);
            showToast(`${Object.keys(updates).length} marked as read`, 'success');
            await updateUnreadCountAndBadge();
        } else {
            showToast('No unread', 'info');
        }
    }
}

async function clearAllNotifications() {
    if (!currentUser) return;
    if (!confirm('⚠️ Delete ALL notifications? This cannot be undone.')) return;
    
    try {
        await remove(ref(db, `notifications/${currentUser.uid}`));
        showToast('All notifications cleared', 'success');
        await updateUnreadCountAndBadge();
        loadNotifications(currentUser.uid);
    } catch (error) {
        console.error("Clear error:", error);
        showToast('Failed to clear', 'error');
    }
}

async function deleteSingleNotification(notificationId, event) {
    if (event) event.stopPropagation();
    if (!currentUser) return;
    if (!confirm('Delete this notification?')) return;
    
    try {
        await remove(ref(db, `notifications/${currentUser.uid}/${notificationId}`));
        showToast('Deleted', 'success');
        await updateUnreadCountAndBadge();
        loadNotifications(currentUser.uid);
    } catch (error) {
        console.error("Delete error:", error);
        showToast('Failed to delete', 'error');
    }
}

async function updateUnreadCountAndBadge() {
    if (!currentUser) return;
    const snapshot = await get(ref(db, `notifications/${currentUser.uid}`));
    let unread = 0;
    if (snapshot.exists()) {
        snapshot.forEach(child => { if (!child.val().read) unread++; });
    }
    unreadCount = unread;
    
    const badgeSpan = document.getElementById('unreadCountBadge');
    if (badgeSpan) {
        if (unread > 0) {
            badgeSpan.style.display = 'inline-block';
            badgeSpan.textContent = unread;
        } else {
            badgeSpan.style.display = 'none';
        }
    }
    
    localStorage.setItem('abotra_unread_notifications', unread);
    return unread;
}

function getNotificationIcon(type) {
    const typeMap = {
        'master-trade': { icon: 'fas fa-crown', class: 'master-trade' },
        'deposit': { icon: 'fas fa-arrow-down', class: 'deposit' },
        'withdrawal': { icon: 'fas fa-arrow-up', class: 'withdrawal' },
        'transfer': { icon: 'fas fa-exchange-alt', class: 'transfer' },
        'p2p': { icon: 'fas fa-handshake', class: 'p2p' },
        'p2p-order': { icon: 'fas fa-shopping-cart', class: 'p2p' },
        'kyc': { icon: 'fas fa-id-card', class: 'kyc' },
        'trade': { icon: 'fas fa-chart-line', class: 'trade' },
        'success': { icon: 'fas fa-check-circle', class: 'success' },
        'error': { icon: 'fas fa-exclamation-circle', class: 'error' },
        'warning': { icon: 'fas fa-exclamation-triangle', class: 'warning' }
    };
    return typeMap[type] || { icon: 'fas fa-bell', class: 'info' };
}

function timeAgo(timestamp) {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    const weeks = Math.floor(days / 7);
    return `${weeks}w ago`;
}

function getActionButton(notification) {
    const type = notification.type || '';
    
    if (type === 'deposit' || type === 'withdrawal') {
        return `<div class="notification-action"><button class="action-btn" onclick="event.stopPropagation(); window.location.href='wallet.html'"><i class="fas fa-wallet"></i> View Wallet</button></div>`;
    }
    
    if (type === 'kyc') {
        return `<div class="notification-action"><button class="action-btn" onclick="event.stopPropagation(); window.location.href='account.html'"><i class="fas fa-id-card"></i> View KYC</button></div>`;
    }
    
    if (type === 'trade' || type === 'trade-opened' || type === 'trade-closed') {
        return `<div class="notification-action"><button class="action-btn" onclick="event.stopPropagation(); window.location.href='trade-history.html'"><i class="fas fa-chart-line"></i> View Trades</button></div>`;
    }
    
    if (type === 'master-trade') {
        return `<div class="notification-action"><button class="action-btn" onclick="event.stopPropagation(); window.location.href='copy-trading.html'"><i class="fas fa-copy"></i> Copy Trade</button></div>`;
    }
    
    if (type === 'p2p' || type === 'p2p-order') {
        return `<div class="notification-action"><button class="action-btn" onclick="event.stopPropagation(); window.location.href='p2p-orders.html'"><i class="fas fa-handshake"></i> View Order</button></div>`;
    }
    
    if (notification.link) {
        return `<div class="notification-action"><button class="action-btn" onclick="event.stopPropagation(); window.location.href='${notification.link}'"><i class="fas fa-arrow-right"></i> View</button></div>`;
    }
    return '';
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function renderNotifications(notifications) {
    const container = document.getElementById('notificationsList');
    if (notifications.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet</p></div>`;
        return;
    }
    
    container.innerHTML = '';
    notifications.forEach(notif => {
        const icon = getNotificationIcon(notif.type);
        const actionButton = getActionButton(notif);
        const notifCard = document.createElement('div');
        notifCard.className = `notification-card ${notif.read ? '' : 'unread'}`;
        notifCard.onclick = () => markAsRead(notif.id, null);
        notifCard.innerHTML = `
            <div class="notification-icon ${icon.class}"><i class="${icon.icon}"></i></div>
            <div class="notification-content">
                ${notif.title ? `<div class="notification-title">${escapeHtml(notif.title)}</div>` : ''}
                <div class="message">${escapeHtml(notif.message || '')}</div>
                <div class="time"><i class="far fa-clock"></i> ${timeAgo(notif.timestamp)} ${!notif.read ? '<span style="color:#FFD700;"> • Unread</span>' : ''}</div>
                ${actionButton}
            </div>
            <button class="delete-notif-btn" onclick="event.stopPropagation(); window.deleteNotification('${notif.id}')"><i class="fas fa-trash-alt"></i></button>
        `;
        container.appendChild(notifCard);
    });
}

window.deleteNotification = async function(notificationId) {
    await deleteSingleNotification(notificationId);
};

function loadNotifications(userId) {
    if (!userId) return;
    const notificationsRef = ref(db, `notifications/${userId}`);
    
    if (notificationsListener) notificationsListener();
    notificationsListener = onValue(notificationsRef, async (snapshot) => {
        const notifications = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                notifications.push({ id: child.key, ...child.val() });
            });
            notifications.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }
        renderNotifications(notifications);
        await updateUnreadCountAndBadge();
    }, (error) => {
        console.error("Error loading notifications:", error);
        document.getElementById('notificationsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading.</p></div>';
    });
}

async function checkRegistrationAndDevice() {
    if (!currentUser) return;
    
    const currentDevice = detectDevice();
    const userRef = ref(db, `users/${currentUser.uid}`);
    const userSnapshot = await get(userRef);
    const userData = userSnapshot.exists() ? userSnapshot.val() : {};
    
    document.getElementById('userEmailDisplay').innerHTML = currentUser.email || 'User';
    document.getElementById('deviceInfo').innerHTML = currentDevice;
    
    const deviceStorageKey = `abotra_device_notified_${currentUser.uid}`;
    const lastDevice = localStorage.getItem(deviceStorageKey);
    
    if (!userData.createdAt) {
        await update(ref(db, `users/${currentUser.uid}`), { 
            createdAt: Date.now(),
            name: currentUser.email?.split('@')[0] || 'User',
            email: currentUser.email
        });
        await addNotificationWithPush(currentUser.uid, '🎉 Welcome!', 'Welcome to ABOTRA-PROAI! Start your trading journey.', 'success', 'dashboard.html');
        localStorage.setItem(deviceStorageKey, currentDevice);
    } else if (lastDevice !== currentDevice && lastDevice !== null) {
        await addNotificationWithPush(currentUser.uid, '🔐 New Device Login', `Login from: ${currentDevice}. If not you, secure your account.`, 'warning', 'security.html');
        localStorage.setItem(deviceStorageKey, currentDevice);
    } else if (!lastDevice) {
        localStorage.setItem(deviceStorageKey, currentDevice);
    }
}

document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);
document.getElementById('clearNotificationsBtn').addEventListener('click', clearAllNotifications);
document.getElementById('allowNotificationsBtn').addEventListener('click', requestPushPermission);
document.getElementById('laterBtn').addEventListener('click', () => {
    localStorage.setItem('onesignal_banner_dismissed', 'true');
    document.getElementById('permissionBanner').style.display = 'none';
});

onAuthStateChanged(auth, async (user) => {
    if (!user) { 
        window.location.href = 'login.html'; 
        return; 
    }
    currentUser = user;
    
    await checkRegistrationAndDevice();
    loadNotifications(user.uid);
    await initOneSignal();
});

initTheme();
</script>
