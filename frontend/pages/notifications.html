function getPageLink(notification) {
    const type = (notification.type || '').toLowerCase();
    const link = notification.link || '';
    
    // If direct link is provided, use it

        return link;
    }
    
    // Check if type has direct mapping
    return PAGE_ROUTES[type] || PAGE_ROUTES[type.split('-')[0]] || 'dashboard.html';
}

async function registerServiceWorker() {
    try {
        if ('serviceWorker' in navigator) {
            const registration = await navigator.serviceWorker.register('/sw.js', {
                scope: '/'
            });
            console.log('[SW] Service Worker registered:', registration);
            swRegistration = registration;
            return registration;
        }
    } catch (error) {
        console.warn('[SW] Service Worker registration failed:', error);
    }
    return null;
}

async function subscribeToPush() {
    try {
        if (!swRegistration) {
            console.warn('[PUSH] No service worker');
            return null;
        }
        
        const applicationServerKey = CONFIG.VAPID_PUBLIC_KEY;
        if (!applicationServerKey) {
            console.warn('[PUSH] No VAPID key configured');
            return null;
        }
        
        const subscription = await swRegistration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: applicationServerKey
        });
        
        console.log('[PUSH] Subscribed successfully:', subscription.endpoint);
        pushSubscription = subscription;
        
        try {
            const token = await getFirebaseToken();
            const response = await fetch(`${CONFIG.API_URL}/api/notifications/subscribe`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    subscription: subscription,
                    userId: currentUser?.uid
                })
            });
            console.log('[PUSH] Subscription saved to backend:', response.ok);
        } catch (e) {
            console.warn('[PUSH] Failed to save subscription:', e);
        }
        
        return subscription;
    } catch (error) {
        console.warn('[PUSH] Subscription failed:', error);
        return null;
    }
}

async function getFirebaseToken() {
    return new Promise((resolve, reject) => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
            unsubscribe();
            if (!user) {
                reject(new Error('No user logged in'));
                return;
            }
            try {
                const token = await user.getIdToken(true);
                resolve(token);
            } catch (error) {
                reject(error);
            }
        });
    });
}

async function requestPushPermission() {
    if (typeof Notification === 'undefined') {
        showToast('Notifications not supported', 'error');
        return;
    }
    if (Notification.permission === 'granted') {
        showToast('Notifications already enabled!', 'success');
        document.getElementById('permissionBanner').style.display = 'none';
        localStorage.setItem('onesignal_banner_dismissed', 'true');
        await subscribeToPush();
        return;
    }
    if (Notification.permission === 'denied') {
        showToast('Notification permission denied. Please enable in settings.', 'error');
        return;
    }
    try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            document.getElementById('permissionBanner').style.display = 'none';
            localStorage.setItem('onesignal_banner_dismissed', 'true');
            showToast('Notifications enabled! You will receive alerts on your phone.', 'success');
            await subscribeToPush();
        }
    } catch (error) {
        console.warn('[NOTIF] Permission request failed:', error);
    }
}

function sendDevicePushNotification(title, body, link = '/dashboard.html', type = 'info') {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    try {
        const options = {
            body: body,
            icon: '../assets/images/logo.png',
            badge: '../assets/images/logo.png',
            vibrate: [200, 100, 200],
            requireInteraction: true,
            tag: Date.now().toString(),
            data: { url: link }
        };
        const notif = new Notification(title, options);
        notif.onclick = (event) => {
            event.preventDefault();
            window.focus();
            if (link) window.location.href = link;
        };
    } catch (e) {
        console.warn('[NOTIF] Device notification error:', e);
    }
}

async function initPushNotifications() {
    if (!currentUser) return;
    try {
        const registration = await registerServiceWorker();
        if (!registration) return;
        if (Notification.permission === 'granted') {
            await subscribeToPush();
        }
        if (Notification.permission === 'default' && !localStorage.getItem('onesignal_banner_dismissed')) {
            document.getElementById('permissionBanner').style.display = 'flex';
        }
    } catch (error) {
        console.warn('[PUSH] Initialization failed:', error);
    }
}

function showToast(message, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i><div class="popup-message">${message}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(toast);
    toast.querySelector('.close-notif').addEventListener('click', () => { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); });
    setTimeout(() => { if(toast.parentNode) { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); } }, 4000);
}

function detectDevice() {
    const ua = navigator.userAgent;
    let device = '';
    if (/iPhone/i.test(ua)) device = 'iPhone';
    else if (/iPad/i.test(ua)) device = 'iPad';
    else if (/Android/i.test(ua)) device = 'Android Device';
    else if (/Windows/i.test(ua)) device = 'Windows PC';
    else if (/Mac/i.test(ua)) device = 'Mac Computer';
    else device = 'Unknown Device';
    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) device += ' (Chrome)';
    else if (/Firefox/i.test(ua)) device += ' (Firefox)';
    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) device += ' (Safari)';
    else if (/Edg/i.test(ua)) device += ' (Edge)';
    return device;
}

async function markAsRead(notificationId, event) {
    if (event) event.stopPropagation();
    if (!currentUser) return;
    await update(ref(db, `notifications/${currentUser.uid}/${notificationId}`), { read: true });
    await updateUnreadCountAndBadge();
}

async function markAllAsRead() {
    if (!currentUser) return;
    const snapshot = await get(ref(db, `notifications/${currentUser.uid}`));
    if (snapshot.exists()) {
        const updates = {};
        snapshot.forEach(child => { 
            if (!child.val().read) updates[`${child.key}/read`] = true; 
        });
        if (Object.keys(updates).length > 0) {
            await update(ref(db, `notifications/${currentUser.uid}`), updates);
            showToast(`${Object.keys(updates).length} marked as read`, 'success');
            await updateUnreadCountAndBadge();
        } else {
            showToast('No unread notifications', 'info');
        }
    }
}

async function clearAllNotifications() {
    if (!currentUser) return;
    if (!confirm('⚠️ Delete ALL notifications? This cannot be undone.')) return;
    try {
        await remove(ref(db, `notifications/${currentUser.uid}`));
        showToast('All notifications cleared', 'success');
        await updateUnreadCountAndBadge();
        loadNotifications(currentUser.uid);
    } catch (error) {
        console.error("Clear error:", error);
        showToast('Failed to clear', 'error');
    }
}

async function deleteSingleNotification(notificationId, event) {
    if (event) event.stopPropagation();
    if (!currentUser) return;
    if (!confirm('Delete this notification?')) return;
    try {
        await remove(ref(db, `notifications/${currentUser.uid}/${notificationId}`));
        showToast('Deleted', 'success');
        await updateUnreadCountAndBadge();
        loadNotifications(currentUser.uid);
    } catch (error) {
        console.error("Delete error:", error);
        showToast('Failed to delete', 'error');

async function updateUnreadCountAndBadge() {
    if (!currentUser) return;
    const snapshot = await get(ref(db, `notifications/${currentUser.uid}`));
    let unread = 0;
    if (snapshot.exists()) {
        snapshot.forEach(child => { if (!child.val().read) unread++; });
    }
    unreadCount = unread;
    const badgeSpan = document.getElementById('unreadCountBadge');
    if (badgeSpan) {
        if (unread > 0) {
            badgeSpan.style.display = 'inline-block';
            badgeSpan.textContent = unread;
        } else {
            badgeSpan.style.display = 'none';
        }
    }
    localStorage.setItem('abotra_unread_notifications', unread);
    return unread;
}

function timeAgo(timestamp) {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    const weeks = Math.floor(days / 7);
    return `${weeks}w ago`;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// RENDER NOTIFICATIONS WITH PAGE BUTTONS
// ============================================================
function renderNotifications(notifications) {
    const container = document.getElementById('notificationsList');
    if (notifications.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet</p></div>`;
        return;
    }
    
    container.innerHTML = '';
    notifications.forEach(notif => {
        const icon = getNotificationIcon(notif.type);
        const pageLink = getPageLink(notif);
        const btnInfo = getButtonInfo(notif);
        
        const notifCard = document.createElement('div');
        notifCard.className = `notification-card ${notif.read ? '' : 'unread'}`;
        notifCard.onclick = () => markAsRead(notif.id, null);
        
        // Build action button with proper link
        const actionHtml = `
            <div class="notification-action">
                <a href="${pageLink}" class="action-btn" onclick="event.stopPropagation();">
                    <i class="fas ${btnInfo.icon}"></i> ${btnInfo.text}
                </a>
            </div>
        `;
        
        notifCard.innerHTML = `
            <div class="notification-icon ${icon.class}"><i class="${icon.icon}"></i></div>
            <div class="notification-content">
                ${notif.title ? `<div class="notification-title">${escapeHtml(notif.title)}</div>` : ''}
                <div class="message">${escapeHtml(notif.message || '')}</div>
                <div class="time"><i class="far fa-clock"></i> ${timeAgo(notif.timestamp)} ${!notif.read ? '<span style="color:#FFD700;"> • Unread</span>' : ''}</div>
                ${actionHtml}
            </div>
            <button class="delete-notif-btn" onclick="event.stopPropagation(); window.deleteNotification('${notif.id}')"><i class="fas fa-trash-alt"></i></button>
        `;
        container.appendChild(notifCard);
    });
}

};

function loadNotifications(userId) {
    if (!userId) return;
    const notificationsRef = ref(db, `notifications/${userId}`);
    
    if (notificationsListener) notificationsListener();
    notificationsListener = onValue(notificationsRef, async (snapshot) => {
        const notifications = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                notifications.push({ id: child.key, ...child.val() });
            });
            notifications.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }
        renderNotifications(notifications);
        await updateUnreadCountAndBadge();
    }, (error) => {
        console.error("Error loading notifications:", error);
        document.getElementById('notificationsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading notifications.</p></div>';
    });
}

async function checkRegistrationAndDevice() {
    if (!currentUser) return;
    
    const currentDevice = detectDevice();
    const userRef = ref(db, `users/${currentUser.uid}`);
    const userSnapshot = await get(userRef);
    const userData = userSnapshot.exists() ? userSnapshot.val() : {};
    
    document.getElementById('userEmailDisplay').innerHTML = currentUser.email || 'User';
    document.getElementById('deviceInfo').innerHTML = currentDevice;
    
    const deviceStorageKey = `abotra_device_notified_${currentUser.uid}`;
    const lastDevice = localStorage.getItem(deviceStorageKey);
    
    if (!userData.createdAt) {
        await update(ref(db, `users/${currentUser.uid}`), { 
            createdAt: Date.now(),
            name: currentUser.email?.split('@')[0] || 'User',
            email: currentUser.email
        });
        await addNotificationWithPush(currentUser.uid, '🎉 Welcome!', 'Welcome to ABOTRA-PROAI! Start your trading journey.', 'success', 'dashboard.html');
        localStorage.setItem(deviceStorageKey, currentDevice);
    } else if (lastDevice !== currentDevice && lastDevice !== null) {
        await addNotificationWithPush(currentUser.uid, '🔐 New Device Login', `Login from: ${currentDevice}. If not you, secure your account.`, 'warning', 'kyc.html');
        localStorage.setItem(deviceStorageKey, currentDevice);
    } else if (!lastDevice) {
        localStorage.setItem(deviceStorageKey, currentDevice);
    }
}

// ADD NOTIFICATION WITH PUSH
// ============================================================
async function addNotificationWithPush(userId, title, message, type = 'info', link = null, actionData = null) {
    if (!userId) return;
    const notifRef = push(ref(db, `notifications/${userId}`));
    await set(notifRef, {
        id: notifRef.key, title, message, type, read: false,
        timestamp: Date.now(), date: new Date().toISOString(), link, actionData
    });
    if (userId === currentUser?.uid) {
        const pageLink = link || getPageLink({ type, link });
        sendDevicePushNotification(title, message, pageLink, type);
    }
    return notifRef.key;
}

window.addNotification = addNotificationWithPush;

// INIT
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) { 
        window.location.href = 'login.html'; 
        return; 
    }
    currentUser = user;
    
    await checkRegistrationAndDevice();
    loadNotifications(user.uid);
    await initPushNotifications();
});
