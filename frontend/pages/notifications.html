/* ===== MODAL STYLES - ABOTRA DESIGN ===== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    z-index: 999999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: modalFadeIn 0.3s ease;
}

.modal-overlay.active {
    display: flex;

.modal-content {
    background: rgba(20,20,20,0.98);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 24px;
    padding: 30px 28px 24px;

    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(255,215,0,0.05);
    position: relative;
    overflow: hidden;
}

.modal-content::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #800000, #FFD700, #800000);
    background-size: 200% 100%;
    animation: shimmer 2s infinite;
}

.modal-icon-wrapper {

.modal-icon-wrapper i {

.modal-icon-wrapper .pulse-ring {

            console.warn('[NOTIF] Notification not supported');

            return await Notification.requestPermission();
        } catch (e) {

async function registerServiceWorker() {
    try {
        if ('serviceWorker' in navigator) {
            const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
            console.log('[SW] Registered:', registration);
            swRegistration = registration;
            return registration;
        }
    } catch (error) {
        console.warn('[SW] Registration failed:', error);
    }
    return null;
}

async function subscribeToPush() {
    try {
        if (!swRegistration) return null;
        if (!('PushManager' in window)) {
            console.warn('[PUSH] PushManager not supported');
            return null;
        }
        const applicationServerKey = CONFIG.VAPID_PUBLIC_KEY;
        if (!applicationServerKey) return null;
        const subscription = await swRegistration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: applicationServerKey
        });
        console.log('[PUSH] Subscribed:', subscription.endpoint);
        pushSubscription = subscription;
        try {
            const token = await getFirebaseToken();
            await fetch(`${CONFIG.API_URL}/api/notifications/subscribe`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ subscription, userId: currentUser?.uid })
            });
        } catch (e) { console.warn('[PUSH] Save failed:', e); }
        return subscription;
    } catch (error) {
        console.warn('[PUSH] Subscription failed:', error);
        return null;
    }
}

async function getFirebaseToken() {
    return new Promise((resolve, reject) => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
            unsubscribe();
            if (!user) { reject(new Error('No user')); return; }
            try { resolve(await user.getIdToken(true)); }
            catch (error) { reject(error); }
        });
    });
}

function sendDevicePushNotification(title, body, link = '/dashboard.html', type = 'info') {
    NotificationsAPI.send(title, body, link, type);

async function initPushNotifications() {
    if (!currentUser) return;
    try {
        await registerServiceWorker();
        if (NotificationsAPI.isSupported()) {
            const permission = NotificationsAPI.getPermission();
            if (permission === 'granted') {
                await subscribeToPush();
            } else if (permission === 'default' && !localStorage.getItem('onesignal_banner_dismissed')) {
                document.getElementById('permissionBanner').style.display = 'flex';
            }
        }
    } catch (e) {

}

    toast.className = `notification-popup ${type}`;

    toast.innerHTML = `<i class="fas ${icon}"></i><div class="popup-message">${message}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;

}

function showConfirmModal(options) {
    return new Promise((resolve, reject) => {
        const modal = document.getElementById('confirmModal');
        const title = document.getElementById('modalTitle');
        const subtitle = document.getElementById('modalSubtitle');
        const warning = document.getElementById('modalWarning');
        const cancelBtn = document.getElementById('modalCancelBtn');
        const confirmBtn = document.getElementById('modalConfirmBtn');

        title.textContent = options.title || 'Delete Notification?';
        subtitle.innerHTML = options.subtitle || 'Are you sure you want to delete this notification? This action <span class="modal-highlight">cannot be undone</span>.';
        warning.innerHTML = options.warning || '<i class="fas fa-exclamation-triangle"></i> This will remove the notification permanently.';
        confirmBtn.textContent = options.confirmText || 'Delete';
        confirmBtn.innerHTML = options.confirmText || '<i class="fas fa-trash-alt"></i> Delete';

        modal.classList.add('active');

        const cleanup = () => {
            modal.classList.remove('active');
            cancelBtn.removeEventListener('click', handleCancel);
            confirmBtn.removeEventListener('click', handleConfirm);
            modal.removeEventListener('click', handleOutside);
            document.removeEventListener('keydown', handleKeydown);
        };

        const handleCancel = () => { cleanup(); reject(new Error('Cancelled')); };
        const handleConfirm = () => { cleanup(); resolve(true); };
        const handleOutside = (e) => {
            if (e.target === modal) { cleanup(); reject(new Error('Cancelled')); }
        };
        const handleKeydown = (e) => {
            if (e.key === 'Escape') { cleanup(); reject(new Error('Cancelled')); }
            if (e.key === 'Enter') { cleanup(); resolve(true); }
        };

        cancelBtn.addEventListener('click', handleCancel);
        confirmBtn.addEventListener('click', handleConfirm);
        modal.addEventListener('click', handleOutside);
        document.addEventListener('keydown', handleKeydown);
    });
}

async function markAsRead(notificationId, event) {
    if (event) event.stopPropagation();
    if (!currentUser) return;
    await update(ref(db, `notifications/${currentUser.uid}/${notificationId}`), { read: true });
    await updateUnreadCountAndBadge();
}

async function markAllAsRead() {
    if (!currentUser) return;
    const snapshot = await get(ref(db, `notifications/${currentUser.uid}`));
    if (snapshot.exists()) {
        const updates = {};
        snapshot.forEach(child => { if (!child.val().read) updates[`${child.key}/read`] = true; });
        if (Object.keys(updates).length > 0) {
            await update(ref(db, `notifications/${currentUser.uid}`), updates);
            showToast(`${Object.keys(updates).length} marked as read`, 'success');
            await updateUnreadCountAndBadge();
        } else {
            showToast('No unread notifications', 'info');
        }
    }
}

async function clearAllNotifications() {
    if (!currentUser) return;
    try {
        await showConfirmModal({
            title: 'Delete All Notifications?',
            subtitle: 'Are you sure you want to delete <span class="modal-highlight">ALL</span> notifications? This action <span class="modal-highlight">cannot be undone</span>.',
            warning: '<i class="fas fa-exclamation-triangle"></i> All notifications will be permanently removed.',
            confirmText: '<i class="fas fa-trash-alt"></i> Delete All'
        });
        await remove(ref(db, `notifications/${currentUser.uid}`));
        showToast('All notifications cleared', 'success');
        await updateUnreadCountAndBadge();
        loadNotifications(currentUser.uid);
    } catch (error) {
        if (error.message !== 'Cancelled') {
            console.error("Clear error:", error);
            showToast('Failed to clear', 'error');

    }
}

async function deleteSingleNotification(notificationId) {
    if (!currentUser) return;
    try {
        const snapshot = await get(ref(db, `notifications/${currentUser.uid}/${notificationId}`));
        const notifData = snapshot.exists() ? snapshot.val() : null;
        const title = notifData?.title || 'Notification';

        await showConfirmModal({
            title: `Delete "${title}"?`,
            subtitle: `Are you sure you want to delete this notification? This action <span class="modal-highlight">cannot be undone</span>.`,
            warning: '<i class="fas fa-exclamation-triangle"></i> This will remove the notification permanently.',
            confirmText: '<i class="fas fa-trash-alt"></i> Delete'
        });
        await remove(ref(db, `notifications/${currentUser.uid}/${notificationId}`));
        showToast('Notification deleted', 'success');
        await updateUnreadCountAndBadge();
        loadNotifications(currentUser.uid);
    } catch (error) {
        if (error.message !== 'Cancelled') {
            console.error("Delete error:", error);
            showToast('Failed to delete', 'error');
        }
    }

async function updateUnreadCountAndBadge() {
    if (!currentUser) return;
    const snapshot = await get(ref(db, `notifications/${currentUser.uid}`));
    let unread = 0;
    if (snapshot.exists()) {
        snapshot.forEach(child => { if (!child.val().read) unread++; });
    }
    unreadCount = unread;
    const badge = document.getElementById('unreadCountBadge');
    if (badge) {
        if (unread > 0) {
            badge.style.display = 'inline-block';
            badge.textContent = unread;
        } else {
            badge.style.display = 'none';
        }
    }
    localStorage.setItem('abotra_unread_notifications', unread);
    return unread;
}

function timeAgo(timestamp) {
    if (!timestamp) return 'just now';
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    const weeks = Math.floor(days / 7);
    return `${weeks}w ago`;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ============================================================
// RENDER NOTIFICATIONS
// ============================================================
function renderNotifications(notifications) {
    const container = document.getElementById('notificationsList');
    if (!notifications || notifications.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet</p></div>`;
        return;
    }

    container.innerHTML = '';
    notifications.forEach(notif => {
        const id = notif.id || notif.key || `notif_${Date.now()}`;
        const title = notif.title || 'Notification';
        const message = notif.message || '';
        const type = notif.type || 'info';
        const timestamp = notif.timestamp || notif.createdAt || Date.now();
        const read = notif.read === true;
        const link = notif.link || getPageLink(notif);

        const icon = getNotificationIcon(type);
        const btnInfo = getButtonInfo(notif);

        const card = document.createElement('div');
        card.className = `notification-card ${read ? '' : 'unread'}`;
        card.setAttribute('data-id', id);

        const actionHtml = `
            <div class="notification-action">
                <a href="${link}" class="action-btn" onclick="event.stopPropagation(); window.markAndNavigate('${id}', '${link}')">
                    <i class="fas ${btnInfo.icon}"></i> ${btnInfo.text}
                </a>
            </div>
        `;

        card.innerHTML = `
            <div class="notification-icon ${icon.class}"><i class="${icon.icon}"></i></div>
            <div class="notification-content">
                <div class="notification-title">${escapeHtml(title)}</div>
                <div class="message">${escapeHtml(message)}</div>
                <div class="time"><i class="far fa-clock"></i> ${timeAgo(timestamp)} ${!read ? '<span style="color:#FFD700;"> • Unread</span>' : ''}</div>
                ${actionHtml}
            </div>
            <button class="delete-notif-btn" onclick="event.stopPropagation(); window.deleteNotification('${id}')"><i class="fas fa-trash-alt"></i></button>
        `;

        card.addEventListener('click', () => {
            if (!read) markAsRead(id);
        });

        container.appendChild(card);
    });
}

// ============================================================
// WINDOW FUNCTIONS - Exposed for inline onclick
// ============================================================
window.markAndNavigate = async function(notificationId, destination) {
    if (!currentUser) { window.location.href = destination; return; }
    try {
        await update(ref(db, `notifications/${currentUser.uid}/${notificationId}`), { read: true });
        await updateUnreadCountAndBadge();
    } catch (e) { console.warn('[NOTIF] Mark read error:', e); }
    window.location.href = destination;
};

window.deleteNotification = async function(notificationId) {
    await deleteSingleNotification(notificationId);
};

// ============================================================
// LOAD NOTIFICATIONS
// ============================================================
function loadNotifications(userId) {
    if (!userId) return;
    const notificationsRef = ref(db, `notifications/${userId}`);

    if (notificationsListener) notificationsListener();
    notificationsListener = onValue(notificationsRef, async (snapshot) => {
        const notifications = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                const data = child.val();
                notifications.push({
                    id: child.key,
                    key: child.key,
                    title: data.title || 'Notification',
                    message: data.message || '',
                    type: data.type || 'info',
                    read: data.read === true,
                    timestamp: data.timestamp || data.createdAt || Date.now(),
                    link: data.link || '',
                    actionData: data.actionData || null
                });
            });
            notifications.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }
        renderNotifications(notifications);
        await updateUnreadCountAndBadge();
    }, (error) => {
        console.error("Error loading notifications:", error);
        document.getElementById('notificationsList').innerHTML =
            '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading notifications. Please refresh.</p></div>';
    });
}

// ============================================================
// DEVICE DETECTION & USER CHECK
// ============================================================
function detectDevice() {
    const ua = navigator.userAgent;
    let device = '';
    if (/iPhone/i.test(ua)) device = 'iPhone';
    else if (/iPad/i.test(ua)) device = 'iPad';
    else if (/Android/i.test(ua)) device = 'Android Device';
    else if (/Windows/i.test(ua)) device = 'Windows PC';
    else if (/Mac/i.test(ua)) device = 'Mac Computer';
    else device = 'Unknown Device';
    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) device += ' (Chrome)';
    else if (/Firefox/i.test(ua)) device += ' (Firefox)';
    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) device += ' (Safari)';
    else if (/Edg/i.test(ua)) device += ' (Edge)';
    return device;
}

async function checkRegistrationAndDevice() {
    if (!currentUser) return;

    const currentDevice = detectDevice();
    const userRef = ref(db, `users/${currentUser.uid}`);
    const userSnapshot = await get(userRef);
    const userData = userSnapshot.exists() ? userSnapshot.val() : {};

    document.getElementById('userEmailDisplay').textContent = currentUser.email || 'User';
    document.getElementById('deviceInfo').textContent = currentDevice;

    const deviceStorageKey = `abotra_device_notified_${currentUser.uid}`;
    const lastDevice = localStorage.getItem(deviceStorageKey);

    if (!userData.createdAt) {
        await update(ref(db, `users/${currentUser.uid}`), {
            createdAt: Date.now(),
            name: currentUser.email?.split('@')[0] || 'User',
            email: currentUser.email
        });
        await addNotificationWithPush(currentUser.uid, '🎉 Welcome!', 'Welcome to ABOTRA-PROAI! Start your trading journey.', 'success', 'dashboard.html');
        localStorage.setItem(deviceStorageKey, currentDevice);
    } else if (lastDevice && lastDevice !== currentDevice) {
        await addNotificationWithPush(currentUser.uid, '🔐 New Device Login',
            `Login from: ${currentDevice}. If not you, secure your account.`, 'warning', 'kyc.html');
        localStorage.setItem(deviceStorageKey, currentDevice);
    } else if (!lastDevice) {
        localStorage.setItem(deviceStorageKey, currentDevice);
    }
}

// ============================================================
// ADD NOTIFICATION
// ============================================================
async function addNotificationWithPush(userId, title, message, type = 'info', link = null) {
    if (!userId) return;
    try {
        const notifRef = push(ref(db, `notifications/${userId}`));
        await set(notifRef, {
            title, message, type, read: false,
            timestamp: Date.now(),
            date: new Date().toISOString(),
            link: link || null
        });
        if (userId === currentUser?.uid) {
            const pageLink = link || getPageLink({ type, link });
            sendDevicePushNotification(title, message, pageLink, type);
        }
        return notifRef.key;
    } catch (e) {
        console.warn('[NOTIF] Add failed:', e);
    }
}

document.getElementById('clearNotificationsBtn').addEventListener('click', clearAllNotifications);

document.getElementById('allowNotificationsBtn')?.addEventListener('click', async () => {
    if (NotificationsAPI.isSupported() && NotificationsAPI.getPermission() === 'default') {
        const permission = await NotificationsAPI.requestPermission();
        if (permission === 'granted') {
            document.getElementById('permissionBanner').style.display = 'none';
            localStorage.setItem('onesignal_banner_dismissed', 'true');
            showToast('Notifications enabled!', 'success');
            await subscribeToPush();
        }
    }
});

document.getElementById('laterBtn')?.addEventListener('click', () => {
    localStorage.setItem('onesignal_banner_dismissed', 'true');
    document.getElementById('permissionBanner').style.display = 'none';
});

// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;

    await checkRegistrationAndDevice();
    loadNotifications(user.uid);
    await initPushNotifications();
});
