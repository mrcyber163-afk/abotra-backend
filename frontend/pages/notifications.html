/* ===== MODAL STYLES ===== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    z-index: 999999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: modalFadeIn 0.3s ease;
}
.modal-overlay.active { display: flex; }

.modal-content {
    background: rgba(20,20,20,0.98);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 24px;
    padding: 30px 28px 24px;
    max-width: 400px;
    width: 100%;

    animation: modalSlideUp 0.35s ease;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(255,215,0,0.05);
    position: relative;
    overflow: hidden;
}
.modal-content::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #800000, #FFD700, #800000);
    background-size: 200% 100%;
    animation: shimmer 2s infinite;
}
.modal-icon-wrapper {

}

<div class="top-bar">
<div class="logo-area">

</div>
<div class="top-bar-right">

</div>
</div>

<div class="overlay"></div>

<!-- ===== CONFIRM DELETE MODAL ===== -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-content">
        <div class="modal-icon-wrapper">
            <div class="pulse-ring"></div>
            <i class="fas fa-trash-alt"></i>
        </div>
        <h3 id="modalTitle">Delete Notification?</h3>
        <p class="modal-subtitle" id="modalSubtitle">Are you sure you want to delete this notification? This action <span class="modal-highlight">cannot be undone</span>.</p>
        <div class="modal-warning-text" id="modalWarning">
            <i class="fas fa-exclamation-triangle"></i> This will remove the notification permanently.
        </div>
        <div class="modal-divider"></div>
        <div class="modal-actions">
            <button class="modal-cancel-btn" id="modalCancelBtn"><i class="fas fa-times"></i> Cancel</button>
            <button class="modal-danger-btn" id="modalConfirmBtn"><i class="fas fa-trash-alt"></i> Delete</button>
        </div>
    </div>
</div>

<div class="notifications-container">
<div class="page-title">
<span><i class="fas fa-bell"></i> Notifications <span id="unreadCountBadge" class="unread-badge" style="display:none;">0</span></span>
<div class="action-buttons-group">
<button class="mark-all-read" id="markAllReadBtn"><i class="fas fa-check-double"></i> Mark all read</button>
<button class="clear-notifications-btn" id="clearNotificationsBtn"><i class="fas fa-trash-alt"></i> Clear all</button>
</div>
</div>

<!-- Push Notification Permission Banner -->
<div id="permissionBanner" class="permission-banner" style="display:none;">
<p><i class="fas fa-bell"></i> Allow notifications to get alerts on your phone</p>
<div>
<button class="allow-btn" id="allowNotificationsBtn"><i class="fas fa-check"></i> Allow</button>
<button class="later-btn" id="laterBtn">Later</button>
</div>

function detectPageFromText(title, message, type) {
    const text = (title + ' ' + message).toLowerCase();
    
    if (type) {
        const typeLower = type.toLowerCase();
        if (PAGE_ROUTES[typeLower]) return PAGE_ROUTES[typeLower];
        for (const [key, value] of Object.entries(PAGE_ROUTES)) {
            if (typeLower.includes(key) || key.includes(typeLower)) {
                return value;
            }
        }
    }
    
    const priorityKeywords = ['deposit', 'withdraw', 'withdrawal', 'trade', 'trading', 'kyc', 'verify', 'wallet', 'balance', 'p2p', 'robot', 'bot', 'affiliate', 'referral', 'subscription', 'premium', 'leaderboard', 'signal', 'copy-trade', 'copy-trading', 'master', 'transfer'];
    
    for (const keyword of priorityKeywords) {
        if (text.includes(keyword)) {
            for (const [key, value] of Object.entries(PAGE_ROUTES)) {
                if (key === keyword || key.includes(keyword) || keyword.includes(key)) {
                    return value;
                }
            }
        }
    }
    
    return 'dashboard.html';
}

function getPageLink(notification) {
    const title = notification.title || '';
    const message = notification.message || '';
    const type = notification.type || '';
    const link = notification.link || '';
    
    if (link && link.includes('.html')) {
        if (notification.id) return `${link}?notification=${encodeURIComponent(notification.id)}`;
        return link;
    }
    
    let page = detectPageFromText(title, message, type);
    if (notification.id && page) {
        const separator = page.includes('?') ? '&' : '?';
        return `${page}${separator}notification=${encodeURIComponent(notification.id)}`;
    }
    return page;
}

function timeAgo(timestamp) {
    if (!timestamp) return 'just now';
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    const weeks = Math.floor(days / 7);
    return `${weeks}w ago`;
}

function showConfirmModal(options) {
    return new Promise((resolve, reject) => {
        const modal = document.getElementById('confirmModal');
        const title = document.getElementById('modalTitle');
        const subtitle = document.getElementById('modalSubtitle');
        const warning = document.getElementById('modalWarning');
        const cancelBtn = document.getElementById('modalCancelBtn');
        const confirmBtn = document.getElementById('modalConfirmBtn');

        title.textContent = options.title || 'Delete Notification?';
        subtitle.innerHTML = options.subtitle || 'Are you sure you want to delete this notification? This action <span class="modal-highlight">cannot be undone</span>.';
        warning.innerHTML = options.warning || '<i class="fas fa-exclamation-triangle"></i> This will remove the notification permanently.';
        confirmBtn.textContent = options.confirmText || 'Delete';
        confirmBtn.innerHTML = options.confirmText || '<i class="fas fa-trash-alt"></i> Delete';

        modal.classList.add('active');

        const cleanup = () => {
            modal.classList.remove('active');
            cancelBtn.removeEventListener('click', handleCancel);
            confirmBtn.removeEventListener('click', handleConfirm);
            modal.removeEventListener('click', handleOutside);
            document.removeEventListener('keydown', handleKeydown);
        };

        const handleCancel = () => { cleanup(); reject(new Error('Cancelled')); };
        const handleConfirm = () => { cleanup(); resolve(true); };
        const handleOutside = (e) => {
            if (e.target === modal) { cleanup(); reject(new Error('Cancelled')); }
        };
        const handleKeydown = (e) => {
            if (e.key === 'Escape') { cleanup(); reject(new Error('Cancelled')); }
            if (e.key === 'Enter') { cleanup(); resolve(true); }
        };

        cancelBtn.addEventListener('click', handleCancel);
        confirmBtn.addEventListener('click', handleConfirm);
        modal.addEventListener('click', handleOutside);
        document.addEventListener('keydown', handleKeydown);
    });
}

async function updateUnreadCountAndBadge() {

        }
    }
    localStorage.setItem('abotra_unread_notifications', unread);

// ============================================================
// SEND DEVICE PUSH NOTIFICATION
// ============================================================
function sendDevicePushNotification(title, body, link = '/dashboard.html') {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') {
        console.log('[PUSH] Notifications not available');
        return;
    }
    try {
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            navigator.serviceWorker.ready.then(registration => {
                if (registration && registration.showNotification) {
                    registration.showNotification(title, {
                        body: body,
                        icon: '/assets/images/logo-192.png',
                        badge: '/assets/images/logo-192.png',
                        vibrate: [200, 100, 200],
                        data: { url: link },
                        tag: 'notif_' + Date.now(),
                        requireInteraction: true
                    });
                    return;
                }
            }).catch(() => {});
        }
        const notif = new Notification(title, {
            body: body,
            icon: '/assets/images/logo-192.png',
            badge: '/assets/images/logo-192.png',
            vibrate: [200, 100, 200]
        });
        notif.onclick = function() {
            window.focus();
            if (link) window.location.href = link;
            notif.close();
        };
    } catch(e) { console.error('[PUSH] Error:', e); }
}

// RENDER NOTIFICATIONS
// ============================================================
function renderNotifications(notifications) {
    const container = document.getElementById('notificationsList');
    if (!notifications || notifications.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet</p></div>`;
        return;
    }

    container.innerHTML = '';
    notifications.forEach(notif => {
        const id = notif.id || notif.key || `notif_${Date.now()}`;
        const title = notif.title || 'Notification';
        const message = notif.message || '';
        const type = notif.type || 'info';
        const timestamp = notif.timestamp || notif.createdAt || Date.now();
        const read = notif.read === true;
        const link = getPageLink(notif);
        const icon = getNotificationIcon(type);
        const btnInfo = getButtonInfo(notif);

        const card = document.createElement('div');
        card.className = `notification-card ${read ? '' : 'unread'}`;
        card.setAttribute('data-id', id);

        const actionHtml = `
            <div class="notification-action">
                <a href="${link}" class="action-btn" onclick="event.stopPropagation(); window.markAndNavigate('${id}', '${link}')">
                    <i class="fas ${btnInfo.icon}"></i> ${btnInfo.text}
                </a>
            </div>
        `;

        card.innerHTML = `
            <div class="notification-icon ${icon.class}"><i class="${icon.icon}"></i></div>
            <div class="notification-content">
                <div class="notification-title">${escapeHtml(title)}</div>
                <div class="message">${escapeHtml(message)}</div>
                <div class="time"><i class="far fa-clock"></i> ${timeAgo(timestamp)} ${!read ? '<span style="color:#FFD700;"> • Unread</span>' : ''}</div>
                ${actionHtml}
            </div>
            <button class="delete-notif-btn" onclick="event.stopPropagation(); window.deleteNotification('${id}')"><i class="fas fa-trash-alt"></i></button>
        `;

        card.addEventListener('click', (e) => {
            if (e.target.closest('.action-btn') || e.target.closest('.delete-notif-btn')) return;
            if (!read) markAsRead(id);
            window.location.href = link;
        });

        container.appendChild(card);
    });
}

// ============================================================
// LOAD NOTIFICATIONS
// ============================================================
function loadNotifications(userId) {
    if (!userId) return;
    const notificationsRef = ref(db, `notifications/${userId}`);

    if (notificationsListener) notificationsListener();
    notificationsListener = onValue(notificationsRef, async (snapshot) => {
        const notifications = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                const data = child.val();
                notifications.push({
                    id: child.key,
                    key: child.key,
                    title: data.title || 'Notification',
                    message: data.message || '',
                    type: data.type || 'info',
                    read: data.read === true,
                    timestamp: data.timestamp || data.createdAt || Date.now(),
                    link: data.link || '',
                    actionData: data.actionData || null
                });
            });
            notifications.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        }
        renderNotifications(notifications);
        await updateUnreadCountAndBadge();
        
        // If there are new unread notifications, send device push
        const unread = notifications.filter(n => !n.read);
        if (unread.length > 0 && unread[0].timestamp) {
            const latest = unread[0];
            const link = getPageLink(latest);
            sendDevicePushNotification(
                latest.title || 'ABOTRA Notification',
                latest.message || 'You have a new notification',
                link
            );
        }
    }, (error) => {
        console.error("Error loading notifications:", error);
        document.getElementById('notificationsList').innerHTML =
            '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading notifications. Please refresh.</p></div>';
    });
}

// ============================================================
// DEVICE DETECTION
// ============================================================
function detectDevice() {
    const ua = navigator.userAgent;
    let device = '';
    if (/iPhone/i.test(ua)) device = 'iPhone';
    else if (/iPad/i.test(ua)) device = 'iPad';
    else if (/Android/i.test(ua)) device = 'Android Device';
    else if (/Windows/i.test(ua)) device = 'Windows PC';
    else if (/Mac/i.test(ua)) device = 'Mac Computer';
    else device = 'Unknown Device';
    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) device += ' (Chrome)';
    else if (/Firefox/i.test(ua)) device += ' (Firefox)';
    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) device += ' (Safari)';
    else if (/Edg/i.test(ua)) device += ' (Edge)';
    return device;
}

// ============================================================
// SHOW TOAST
// ============================================================
function showToast(message, type = 'info') {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';
    toast.innerHTML = `<i class="fas ${icon}"></i><div class="popup-message">${message}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(toast);
    toast.querySelector('.close-notif').addEventListener('click', () => {
        toast.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    });
    setTimeout(() => {
        if (toast.parentNode) {
            toast.style.animation = 'fadeOut 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }
    }, 4000);
}

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
}

document.getElementById('themeToggle').addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light-theme');
    localStorage.setItem('abotra_theme', isLight ? 'light' : 'dark');
    document.querySelector('#themeToggle i.fa-sun').style.display = isLight ? 'none' : 'inline-block';
    document.querySelector('#themeToggle i.fa-moon').style.display = isLight ? 'inline-block' : 'none';
});

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);
document.getElementById('clearNotificationsBtn').addEventListener('click', clearAllNotifications);

document.getElementById('allowNotificationsBtn')?.addEventListener('click', async () => {
    if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            document.getElementById('permissionBanner').style.display = 'none';
            localStorage.setItem('onesignal_banner_dismissed', 'true');
            showToast('Notifications enabled! You will receive alerts.', 'success');
            try {
                await navigator.serviceWorker.register('/sw.js', { scope: '/' });
            } catch(e) {}
        }
    }
});

document.getElementById('laterBtn')?.addEventListener('click', () => {
    localStorage.setItem('onesignal_banner_dismissed', 'true');
    document.getElementById('permissionBanner').style.display = 'none';
});

// ============================================================
// INIT
// ============================================================
async function init() {
    initTheme();
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;

        const currentDevice = detectDevice();
        document.getElementById('userEmailDisplay').textContent = user.email || 'User';
        document.getElementById('deviceInfo').textContent = currentDevice;

        if (typeof Notification !== 'undefined') {
            if (Notification.permission === 'granted') {
                document.getElementById('permissionBanner').style.display = 'none';
            } else if (Notification.permission === 'default' && !localStorage.getItem('onesignal_banner_dismissed')) {
                document.getElementById('permissionBanner').style.display = 'flex';
            } else {
                document.getElementById('permissionBanner').style.display = 'none';
            }
        }

        try {
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('/sw.js', { scope: '/' });
                console.log('[SW] Registered successfully');
            }
        } catch(e) {
            console.warn('[SW] Registration failed:', e);
        }

        loadNotifications(user.uid);
    });
}

init();
console.log('[ABOTRA] ✅ Notifications page loaded - Smart page detection');
</script>
