<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;
let retryCount = 0;
const maxRetries = 3;

function initTheme() {
    const savedTheme = localStorage.getItem('abotra_theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
        updateTradingViewTheme('light');
    } else {
        document.body.classList.remove('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
        updateTradingViewTheme('dark');
    }
}

function updateTradingViewTheme(theme) {
    const currentInterval = document.querySelector('.interval-btn.active')?.getAttribute('data-interval') || '15';
    loadTradingViewWidget(currentInterval, theme);
}

function loadTradingViewWidget(interval, theme) {
    const iframe = document.getElementById('tradingviewWidget');
    const loadingDiv = document.getElementById('chartLoading');
    
    const intervalMap = {
        '1': '1', '5': '5', '15': '15', '30': '30',
        '60': '60', '240': '240', '1440': '1D',
        '1W': '1W', '1M': '1M'
    };
    
    const tvInterval = intervalMap[interval] || '15';
    
    loadingDiv.style.display = 'block';
    iframe.style.display = 'none';
    
    setTimeout(() => {
        loadingDiv.style.display = 'none';
        iframe.style.display = 'block';
    }, 1500);
    
    iframe.src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=${tvInterval}&theme=${theme}&style=1&toolbarbg=black&hideideas=1&studies=RSI%2CMACD&hide_side_toolbar=0&allow_symbol_change=1&save_image=0&details=1&hotlist=0&calendar=0&news=0`;
}

document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
        updateTradingViewTheme('dark');
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
        updateTradingViewTheme('light');
    }
});

document.querySelectorAll('.interval-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const interval = this.getAttribute('data-interval');
        const currentTheme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
        loadTradingViewWidget(interval, currentTheme);
    });
});

async function fetchLiveMarketData() {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'none';
    
    document.getElementById('livePrice').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    document.getElementById('high24h').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    document.getElementById('low24h').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    document.getElementById('volume24h').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT', {
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const data = await response.json();
        
        if (data && data.lastPrice) {
            const price = parseFloat(data.lastPrice).toFixed(2);
            const high = parseFloat(data.highPrice).toFixed(2);
            const low = parseFloat(data.lowPrice).toFixed(2);
            const volume = parseFloat(data.quoteVolume).toFixed(0);
            const change = parseFloat(data.priceChangePercent).toFixed(2);
            
            document.getElementById('livePrice').innerHTML = `$${Number(price).toLocaleString()}`;
            document.getElementById('high24h').innerHTML = `$${Number(high).toLocaleString()}`;
            document.getElementById('low24h').innerHTML = `$${Number(low).toLocaleString()}`;
            
            let volumeDisplay;
            if (volume >= 1e9) volumeDisplay = `$${(volume / 1e9).toFixed(2)}B`;
            else if (volume >= 1e6) volumeDisplay = `$${(volume / 1e6).toFixed(2)}M`;
            else volumeDisplay = `$${Number(volume).toLocaleString()}`;
            document.getElementById('volume24h').innerHTML = volumeDisplay;
            
            const changeElement = document.getElementById('priceChange');
            changeElement.innerHTML = `${change >= 0 ? '▲' : '▼'} ${Math.abs(change)}%`;
            changeElement.className = `stats-change ${change >= 0 ? 'positive' : 'negative'}`;
            retryCount = 0;
        } else {
            throw new Error('Invalid data received');
        }
    } catch(error) {
        console.error('Binance API error:', error);
        retryCount++;
        
        document.getElementById('livePrice').innerHTML = '$67,234.50';
        document.getElementById('high24h').innerHTML = '$68,500.00';
        document.getElementById('low24h').innerHTML = '$66,200.00';
        document.getElementById('volume24h').innerHTML = '$32.5B';
        document.getElementById('priceChange').innerHTML = '▲ 1.23%';
        document.getElementById('priceChange').className = 'stats-change positive';
        
        if (retryCount >= maxRetries) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Unable to fetch live data. Using cached data. Please check your connection.';
        }
    }
}

document.getElementById('refreshDataBtn').addEventListener('click', () => {
    fetchLiveMarketData();
    const btn = document.getElementById('refreshDataBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...';
    btn.disabled = true;
    setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh Market Data';
        btn.disabled = false;
    }, 2000);
});

function setupConnectionListeners() {
    window.addEventListener('online', () => {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';
        fetchLiveMarketData();
    });
    window.addEventListener('offline', () => {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '<i class="fas fa-wifi"></i> No internet connection. Using cached data.';
    });
}

function init() {
    initTheme();
    
    document.getElementById('skeletonStats').style.display = 'grid';
    document.getElementById('skeletonChart').style.display = 'block';
    document.getElementById('realContent').style.display = 'none';
    
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        console.log('User logged in:', user.email);
    });
    
    fetchLiveMarketData();
    setupConnectionListeners();
    setInterval(fetchLiveMarketData, 15000);
    
    setTimeout(() => {
        document.getElementById('skeletonStats').style.display = 'none';
        document.getElementById('skeletonChart').style.display = 'none';
        document.getElementById('realContent').style.display = 'block';
    }, 2000);
}

init();
</script>
