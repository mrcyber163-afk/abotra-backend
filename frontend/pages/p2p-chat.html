body {

}

}

/* Skeleton Loading Animations */
.skeleton-order-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}
.skeleton-row {
    height: 16px;
    background: linear-gradient(90deg, rgba(255,215,0,0.08) 25%, rgba(255,215,0,0.2) 50%, rgba(255,215,0,0.08) 75%);
    background-size: 200% 100%;
    border-radius: 8px;
    margin-bottom: 10px;
    animation: shimmer 1.5s infinite;
}
.skeleton-row.short { width: 40%; }
.skeleton-row.medium { width: 60%; }
.skeleton-row.large { width: 80%; }
.skeleton-chat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 20px;
    height: 580px;
    animation: pulseGlow 1.5s ease-in-out infinite;
}
.skeleton-message {
    display: flex;
    padding: 10px 12px;
    gap: 10px;
}
.skeleton-avatar {
    width: 28px;
    height: 28px;
    background: rgba(255,215,0,0.1);
    border-radius: 50%;
}
.skeleton-text {
    flex: 1;
}
.skeleton-line {
    height: 9px;
    background: rgba(255,215,0,0.08);
    border-radius: 5px;
    margin-bottom: 6px;
}
.skeleton-line.short { width: 30%; }
.skeleton-line.medium { width: 60%; }

@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
@keyframes pulseGlow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(4px);
    z-index: 1;
}

.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,215,0,0.2);
    padding: 10px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-area img { 
    width: 35px; 
    height: 35px; 
    border-radius: 10px; 
    object-fit: cover;
    background: transparent;
}
.logo-area h2 { color: #FFD700; font-size: 16px; margin-bottom: 2px; }
.logo-area p { color: #AAAAAA; font-size: 8px; }
.top-bar-right { display: flex; align-items: center; gap: 8px; }
.back-btn {
    background: rgba(255,215,0,0.15);
    border: none;
    border-radius: 10px;
    padding: 6px 12px;
    color: #FFD700;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
}
.back-btn:hover {
    background: rgba(255,215,0,0.3);
    transform: translateX(-3px);
}
.theme-toggle {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 10px;
    padding: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}
.theme-toggle:hover { background: rgba(255,215,0,0.2); transform: scale(1.05); }
.theme-toggle i { font-size: 16px; color: #FFFFFF; }

.main-content {
    position: relative;
    z-index: 2;
    max-width: 800px;
    margin: 75px auto 20px;
    padding: 0 15px;
}

.order-info-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 18px;
    padding: 12px;
    margin-bottom: 12px;
}
.order-info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    flex-wrap: wrap;
}
.order-label { color: #aaa; font-size: 10px; }
.order-value { color: #FFD700; font-weight: 600; }

.chat-container {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 620px;
}
.chat-header {
    background: linear-gradient(135deg, #800000, #FFD700);
    padding: 10px 14px;
    color: white;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(0,0,0,0.2);
    min-height: 0;
}
.chat-message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 16px;
    position: relative;
}
.chat-message-own { 
    align-self: flex-end; 
    background: linear-gradient(135deg, #FFD700, #FFA500); 
    border-bottom-right-radius: 4px; 
}
.chat-message-own .chat-username,
.chat-message-own .chat-message-text,
.chat-message-own .chat-message-time {
    color: #1a1a1a !important;
}
.chat-message-other { 
    align-self: flex-start; 
    background: linear-gradient(135deg, #0ECB81, #0A9E65); 
    border-bottom-left-radius: 4px; 
}
.chat-message-other .chat-username,
.chat-message-other .chat-message-text,
.chat-message-other .chat-message-time {
    color: white !important;
}
.chat-message-system {
    align-self: center;
    background: rgba(255, 215, 0, 0.15);

.chat-message-system .chat-message-text {

.chat-message-system .chat-username {

.chat-username {

    font-size: 10px;

    display: flex; 
    align-items: center;

.chat-message-text { font-size: 11px; line-height: 1.4; word-wrap: break-word; }
.chat-message-time { font-size: 7px; opacity: 0.7; margin-top: 3px; display: flex; justify-content: flex-end; gap: 6px; align-items: center; }

.verified-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 5px;
    background: #1E90FF;
    border-radius: 50%;

    height: 14px;
    font-size: 9px;
    color: white;
    vertical-align: middle;

}
.verified-badge i { font-size: 8px; color: white; }

.chat-input-area {

    border-top: 1px solid rgba(255,215,0,0.1);

}
.chat-input-area input {

    border: 1px solid rgba(255,215,0,0.3);

    font-size: 11px;
    outline: none;
}
.chat-input-area input:focus { border-color: #FFD700; }
.chat-input-area button {
    background: linear-gradient(135deg,#800000,#FFD700);

    border-radius: 25px;
    padding: 8px 16px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    font-size: 11px;
}
.image-upload-btn {
    background: rgba(255,215,0,0.2);
    border: none;
    border-radius: 25px;
    padding: 8px 12px;
    color: #FFD700;
    cursor: pointer;
    transition: 0.3s;
}
.image-upload-btn:hover { background: rgba(255,215,0,0.4); }

.chat-image {
    max-width: 180px;
    max-height: 180px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid #FFD700;
    margin-top: 3px;
}

.action-buttons {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
}
.btn-paid, .btn-release, .btn-dispute, .btn-extend, .btn-cancel {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 8px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    font-size: 11px;
}
.btn-paid { background: linear-gradient(135deg, #0ECB81, #0A9E65); color: white; }
.btn-paid-disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
.btn-release { background: linear-gradient(135deg, #FFD700, #B8860B); color: #800000; }
.btn-dispute { background: linear-gradient(135deg, #F6465D, #D43F52); color: white; }
.btn-extend { background: rgba(255,215,0,0.2); color: #FFD700; border: 1px solid #FFD700; }
.btn-cancel { background: rgba(128,128,128,0.3); color: #ff9999; border: 1px solid #ff5555; }

.countdown-timer {
    background: rgba(0,0,0,0.5);
    border-radius: 18px;
    padding: 4px 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
}
.countdown-timer.warning {
    background: rgba(246,70,93,0.3);
    color: #F6465D;
    animation: pulseWarning 1s infinite;
}
@keyframes pulseWarning {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,215,0,0.2);
    border-radius: 18px 18px 0 0;
    display: flex;
    justify-content: space-around;
    padding: 8px 12px;
    z-index: 100;
}
.bottom-nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #888;
    font-size: 8px;
    gap: 3px;
    transition: 0.3s;
}
.bottom-nav a i { font-size: 18px; }
.bottom-nav a:hover { color: #FFD700; transform: translateY(-2px); }
.bottom-nav a.active { color: #FFD700; }

.notification-popup {
    position: fixed;
    top: 75px;
    right: 20px;
    min-width: 260px;
    padding: 10px 14px;
    border-radius: 14px;
    backdrop-filter: blur(20px);
    animation: slideInRight 0.4s ease;
    border-left: 4px solid;
    z-index: 99999;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
}
.notification-popup.success { background: linear-gradient(135deg, rgba(14,203,129,0.15), rgba(14,203,129,0.08)); border-left-color: #0ECB81; color: white; }
.notification-popup.error { background: linear-gradient(135deg, rgba(255,77,77,0.15), rgba(255,77,77,0.08)); border-left-color: #FF4D4D; color: white; }
.notification-popup.info { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.08)); border-left-color: #FFD700; color: white; }
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
}
.modal-container {
    background: linear-gradient(145deg, #1e1e2e, #161626);

.modal-header {

.modal-header h3 { color: #FFD700; font-size: 16px; }
.modal-close { 
    background: none; 
    border: none; 
    color: #888;

}
.modal-body { padding: 16px; }
.modal-body p { color: #ccc; font-size: 12px; }
.modal-body textarea { 
    width: 100%; 
    padding: 10px; 
    background: rgba(255,255,255,0.08); 
    border: 1px solid rgba(255,215,0,0.3); 
    border-radius: 14px; 
    color: white; 
    min-height: 90px;
    font-family: inherit;
    font-size: 11px;
}
.modal-footer { 
    padding: 12px 16px; 
    display: flex; 
    gap: 12px; 
}
.modal-btn { 
    flex: 1; 
    padding: 8px; 
    border: none; 
    border-radius: 12px; 
    font-weight: 600; 
    cursor: pointer;
    font-size: 11px;

.modal-btn-primary { background: linear-gradient(135deg, #0ECB81, #0A9E65); color: white; }
.modal-btn-secondary { background: rgba(255,215,0,0.2); color: #FFD700; }
.modal-btn-danger { background: linear-gradient(135deg, #F6465D, #D43F52); color: white; }

@media(max-width: 600px) {
    .chat-container { height: 520px; }
    .chat-message { max-width: 95%; }
    .order-info-row { flex-direction: column; gap: 3px; }
    .action-buttons { flex-direction: column; }
}
</style>
</head>

function formatNumber(n) { return (n || 0).toLocaleString('en-US'); }

function formatTimeAgo(timestamp) {
    if (!timestamp) return '';
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 5) return "Just now";
    if (seconds < 60) return `${seconds}s ago`;
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    return new Date(timestamp).toLocaleDateString();
}

function showNotification(msg, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i> ${msg}<div class="close-notif" style="margin-left:auto; cursor:pointer;"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(toast);
    toast.querySelector('.close-notif').addEventListener('click', () => { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); });
    setTimeout(() => { if(toast.parentNode) { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); } }, 4000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function getMerchantPaymentDetailsFromOrder(order) {
    let bankName = "";
    let accountNumber = "";
    let accountName = "";
    
    if (order.merchantPaymentDetails && typeof order.merchantPaymentDetails === 'string') {
        const lines = order.merchantPaymentDetails.split('\n');
        for (const line of lines) {
            if (line.toLowerCase().startsWith('bank:')) {
                bankName = line.substring(5).trim();
            } else if (line.toLowerCase().startsWith('account:')) {
                accountNumber = line.substring(8).trim();
            } else if (line.toLowerCase().startsWith('name:')) {
                accountName = line.substring(5).trim();
            }
        }
    }
    
    if (!bankName && order.merchantBankName) {
        bankName = order.merchantBankName;
    }
    if (!accountNumber && order.merchantAccountNumber) {
        accountNumber = order.merchantAccountNumber;
    }
    if (!accountName && order.merchantAccountName) {
        accountName = order.merchantAccountName;
    }
    
    if (!accountNumber) {
        return null;
    }
    
    if (!bankName) bankName = "Bank Transfer";
    if (!accountName) accountName = "Merchant Account";
    
    return { bankName, accountNumber, accountName };
}

async function checkForImageProof(orderId) {
    const chatRef = ref(db, `p2p_chat/${orderId}`);
    const snapshot = await get(chatRef);
    let hasImage = false;
    if (snapshot.exists()) {
        snapshot.forEach(msg => {
            const msgVal = msg.val();
            if (msgVal.isImage && msgVal.senderId === currentUser?.uid) hasImage = true;
        });
    }
    return hasImage;
}

async function markAsPaid(orderId) {
    const hasImageProof = await checkForImageProof(orderId);
    if (!hasImageProof) {
        showNotification('Please upload a payment screenshot first!', 'error');
        return;
    }
    await update(ref(db, `p2p_orders/${orderId}`), { status: 'paid', paidAt: Date.now() });
    await sendSystemMessage(orderId, 'Buyer marked as PAID. Seller, please verify and release USDT.');
    showNotification('Payment marked as paid! Waiting for seller.', 'success');
    setTimeout(() => window.location.reload(), 1500);
}

async function releaseUSDT(orderId) {
    if (orderData.merchantUserId !== currentUser.uid) {
        showNotification("Not authorized", "error");
        return;
    }
    
    try {
        const buyerRef = ref(db, `users/${orderData.buyerId}`);
        const buyerSnap = await get(buyerRef);
        const buyerCurrentBalance = buyerSnap.val()?.balance || 0;
        const newBuyerBalance = buyerCurrentBalance + orderData.amount;
        await update(buyerRef, { balance: newBuyerBalance });
        
        if (orderData.merchantId) {
            const merchantRef = ref(db, `merchants/${orderData.merchantId}`);
            const merchantSnap = await get(merchantRef);
            const merchantCurrentBalance = merchantSnap.val()?.balance || 0;
            const newMerchantBalance = merchantCurrentBalance - orderData.amount;
            await update(merchantRef, { balance: newMerchantBalance });
        }
        
        await update(ref(db, `p2p_orders/${orderId}`), { status: 'completed', completedAt: Date.now() });
        await sendSystemMessage(orderId, `${formatNumber(orderData.amount)} USDT released! Trade completed. Funds added to your balance.`);
        showNotification(`${formatNumber(orderData.amount)} USDT released and added to buyer's balance!`, 'success');
        setTimeout(() => window.location.reload(), 1500);
        
    } catch (error) {
        console.error("Release USDT error:", error);
        showNotification('Error releasing USDT. Please try again.', 'error');
    }
}

async function openDispute(orderId, reason) {
    await update(ref(db, `p2p_orders/${orderId}`), { status: 'disputed', disputeReason: reason, disputeOpenedAt: Date.now() });
    await push(ref(db, 'adminDisputes'), { orderId, amount: orderData.amount, buyerId: orderData.buyerId, sellerId: orderData.merchantUserId, reason, timestamp: Date.now(), status: 'pending' });
    await sendSystemMessage(orderId, `Dispute opened: ${reason.substring(0, 150)}... Admin will review within 24 hours.`);
    showNotification('Dispute opened! Admin will review.', 'success');
    setTimeout(() => window.location.reload(), 1500);
}

async function cancelOrder(orderId) {

async function extendTime(orderId) {
    const newExpiry = Date.now() + (ORDER_TIMEOUT_MINUTES * 60 * 1000);
    await update(ref(db, `p2p_orders/${orderId}`), { 
        extendedAt: Date.now(),
        extendedBy: currentUser.uid,
        newExpiryAt: newExpiry,
        extendCount: (orderData.extendCount || 0) + 1
    });
    await sendSystemMessage(orderId, `Time extended by ${ORDER_TIMEOUT_MINUTES} minutes!`);
    showNotification(`Time extended by ${ORDER_TIMEOUT_MINUTES} minutes!`, 'success');
    if (countdownInterval) clearInterval(countdownInterval);
    startCountdown(orderId);
}

function startCountdown(orderId) {
    if (countdownInterval) clearInterval(countdownInterval);
    const countdownElement = document.getElementById('countdownTimer');
    if (!countdownElement) return;
    
    let expiryTime = orderData.newExpiryAt || (orderData.createdAtMillis + (ORDER_TIMEOUT_MINUTES * 60 * 1000));
    
    countdownInterval = setInterval(async () => {
        const now = Date.now();
        const remaining = expiryTime - now;
        
        if (remaining <= 0) {
            clearInterval(countdownInterval);
            countdownElement.innerHTML = '<i class="fas fa-hourglass-end"></i> Expired';
            countdownElement.classList.add('warning');
            
            if (orderData.status === 'pending') {
                await update(ref(db, `p2p_orders/${orderId}`), { status: 'expired', expiredAt: Date.now() });
                await sendSystemMessage(orderId, `Order expired after ${ORDER_TIMEOUT_MINUTES} minutes without payment.`);
                showNotification('Order has expired!', 'error');
                setTimeout(() => window.location.reload(), 2000);
            }
            return;
        }
        
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        countdownElement.innerHTML = `<i class="fas fa-hourglass-half"></i> ${minutes}:${seconds.toString().padStart(2, '0')}`;
        
        if (remaining < 5 * 60 * 1000) {
            countdownElement.classList.add('warning');
        } else {
            countdownElement.classList.remove('warning');
        }
    }, 1000);
}

async function uploadImageMessage(orderId, file) {
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { 
        showNotification("Image too large! Max 2MB", "error"); 
        return; 
    }
    const isBuyer = orderData.buyerId === currentUser.uid;
    
    const reader = new FileReader();
    reader.onload = async (ev) => {
        const chatRef = ref(db, `p2p_chat/${orderId}`);
        const newMsgRef = push(chatRef);
        
        await set(newMsgRef, {
            sender: isBuyer ? 'buyer' : 'seller', 
            senderId: currentUser.uid,
            senderName: currentUsername, 
            message: 'Payment Proof', 
            imageData: ev.target.result, 
            timestamp: Date.now(), 
            isImage: true
        });
        
        showNotification("Payment proof uploaded!", "success");
        const paidBtn = document.getElementById('paidBtn');
        if (paidBtn) { 
            paidBtn.disabled = false; 
            paidBtn.classList.remove('btn-paid-disabled'); 
        }
    };
    reader.readAsDataURL(file);
}

async function fetchCurrentUserData() {
    const snap = await get(ref(db, `users/${currentUser.uid}`));
    if (snap.exists()) {
        const data = snap.val();
        currentUsername = data.username || data.fullName || data.name || 'Trader';

    }
}

function setupChatListener(orderId) {
    if (chatUnsubscribe) {
        off(chatUnsubscribe);
        chatUnsubscribe = null;
    }
    
    const chatRef = ref(db, `p2p_chat/${orderId}`);
    const chatQuery = query(chatRef, orderByChild('timestamp'));
    
    chatUnsubscribe = onValue(chatQuery, (snapshot) => {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        
        if (!snapshot.exists()) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No messages yet. Start the conversation!</div>';
            return;
        }
        
        const messages = [];
        snapshot.forEach(child => {
            messages.push({ id: child.key, ...child.val() });
        });
        
        messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        container.innerHTML = '';
        
        for (const msg of messages) {
            const isSystem = msg.isSystem === true;
            let isOwn = false;
            if (!isSystem && msg.senderId) isOwn = msg.senderId === currentUser?.uid;
            
            let msgClass = '';
            if (isSystem) {
                msgClass = 'chat-message-system';
            } else if (isOwn) {
                msgClass = 'chat-message-own';
            } else {
                msgClass = 'chat-message-other';
            }
            
            const timeStr = formatTimeAgo(msg.timestamp);
            const senderName = isSystem ? 'System' : (msg.senderName || 'Trader');
            
            const div = document.createElement('div');
            div.className = `chat-message ${msgClass}`;
            
            if (msg.isImage && msg.imageData) {
                div.innerHTML = `
                    <div class="chat-username" style="${isSystem ? 'display:none;' : ''}">
                        ${!isSystem ? `<i class="fas fa-user-circle" style="font-size:24px;"></i> ${escapeHtml(senderName)}` : ''}
                    </div>
                    <img src="${escapeHtml(msg.imageData)}" class="chat-image" onclick="openImageModal('${escapeHtml(msg.imageData).replace(/'/g, "\\'")}')">
                    <div class="chat-message-time">
                        <span><i class="far fa-clock"></i> ${timeStr}</span>
                    </div>
                `;
            } else {
                let messageText = escapeHtml(msg.message || '').replace(/\n/g, '<br>');
                if (isSystem && msg.isPaymentMessage) {
                    div.innerHTML = `<div class="chat-message-text" style="font-family: monospace; white-space: pre-wrap; line-height: 1.5;">${messageText}</div><div class="chat-message-time"><span><i class="far fa-clock"></i> ${timeStr}</span></div>`;
                } else {
                    div.innerHTML = `
                        <div class="chat-username" style="${isSystem ? 'display:none;' : ''}">
                            ${!isSystem ? `<i class="fas fa-user-circle" style="font-size:24px;"></i> ${escapeHtml(senderName)}` : ''}
                        </div>
                        <div class="chat-message-text">${messageText}</div>
                        <div class="chat-message-time">
                            <span><i class="far fa-clock"></i> ${timeStr}</span>
                        </div>
                    `;
                }
            }
            container.appendChild(div);
        }
        container.scrollTop = container.scrollHeight;
    });
}

async function getPartnerName(partnerId, isBuyer) {
    if (!partnerId) return 'Trader';
    
    if (isBuyer && orderData.merchantName) {
        return orderData.merchantName;
    }
    
    try {
        const userSnap = await get(ref(db, `users/${partnerId}`));
        if (userSnap.exists()) {
            const userData = userSnap.val();
            return userData.username || userData.fullName || userData.name || 'Trader';
        }
    } catch(e) {
        console.error("Error getting partner name:", e);
    }
    return 'Trader';
}

    if (!orderSnap.exists()) { 
        document.getElementById('appContainer').innerHTML = '<div style="text-align:center; padding:60px;"><i class="fas fa-exclamation-triangle"></i><p>Order not found</p><a href="p2p-orders.html" class="back-btn" style="display:inline-flex; margin-top:20px;"><i class="fas fa-arrow-left"></i> Back to Orders</a></div>'; 
        return; 
    }

    const isSeller = orderData.merchantUserId === currentUser.uid;
    const statusMap = { pending:'Awaiting Payment', paid:'Payment Sent - Awaiting Release', completed:'Completed', disputed:'Disputed', cancelled:'Cancelled', expired:'Expired' };

    const currency = orderData.currency || 'TZS';
    const hasImageProof = await checkForImageProof(orderId);
    
    const partnerId = isBuyer ? orderData.merchantUserId : orderData.buyerId;
    const partnerName = await getPartnerName(partnerId, isBuyer);
    
    let timeRemaining = '';
    if (orderData.status === 'pending') {
        const expiryTime = orderData.newExpiryAt || (orderData.createdAtMillis + (ORDER_TIMEOUT_MINUTES * 60 * 1000));
        const remaining = expiryTime - Date.now();
        if (remaining > 0) {
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            timeRemaining = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
    }
    
    const container = document.getElementById('appContainer');
    container.innerHTML = `
        <div class="order-info-card">
            <div class="order-info-row"><span class="order-label"><i class="fas fa-hashtag"></i> Order #:</span><span class="order-value">${orderId.slice(-8)}</span></div>

            <div class="order-info-row"><span class="order-label"><i class="fas fa-chart-line"></i> Rate:</span><span class="order-value">${formatNumber(rate)} ${currency}/USDT</span></div>
            <div class="order-info-row"><span class="order-label"><i class="fas fa-calculator"></i> Total to Pay:</span><span class="order-value">${totalLocal} ${currency}</span></div>
            <div class="order-info-row"><span class="order-label"><i class="fas fa-info-circle"></i> Status:</span><span class="order-value">${statusMap[orderData.status] || orderData.status}</span></div>
            <div class="order-info-row"><span class="order-label"><i class="fas fa-user-friends"></i> Partner:</span><span class="order-value">${escapeHtml(partnerName)}</span></div>

    const sendBtn = document.getElementById('sendMsgBtn');
    if (sendBtn) sendBtn.addEventListener('click', () => sendMessage(orderId));
    
    const msgInput = document.getElementById('messageInput');
    if (msgInput) msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(orderId); });
    
    const imageUploadBtn = document.getElementById('imageUploadBtn');
    if (imageUploadBtn) {
        imageUploadBtn.addEventListener('click', () => {
            if (orderData.status !== 'pending') {
                showNotification('Cannot upload - order is no longer pending', 'error');
                return;
            }
            const input = document.createElement('input');
            input.type = 'file'; 
            input.accept = 'image/*';
            input.onchange = (e) => { if (e.target.files[0]) uploadImageMessage(orderId, e.target.files[0]); };
            input.click();
        });
    }
    
    const submitDisputeBtn = document.getElementById('submitDisputeBtn');
    if (submitDisputeBtn) {
        const newBtn = submitDisputeBtn.cloneNode(true);
        submitDisputeBtn.parentNode.replaceChild(newBtn, submitDisputeBtn);
        newBtn.onclick = () => {
            const reason = document.getElementById('disputeReason').value.trim();
            if (reason) { 
                closeDisputeModal(); 
                openDispute(orderId, reason); 
            } else { 
                showNotification('Please enter a reason for the dispute', 'error'); 
            }
        };
    }
}

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        const sunIcon = document.querySelector('#themeToggle i.fa-sun');
        const moonIcon = document.querySelector('#themeToggle i.fa-moon');
        if (sunIcon) sunIcon.style.display = 'none';
        if (moonIcon) moonIcon.style.display = 'inline-block';
    } else {
        document.body.classList.remove('light-theme');
        const sunIcon = document.querySelector('#themeToggle i.fa-sun');
        const moonIcon = document.querySelector('#themeToggle i.fa-moon');
        if (sunIcon) sunIcon.style.display = 'inline-block';
        if (moonIcon) moonIcon.style.display = 'none';
    }
}

document.getElementById('themeToggle')?.addEventListener('click', () => {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        const sunIcon = document.querySelector('#themeToggle i.fa-sun');
        const moonIcon = document.querySelector('#themeToggle i.fa-moon');
        if (sunIcon) sunIcon.style.display = 'inline-block';
        if (moonIcon) moonIcon.style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        const sunIcon = document.querySelector('#themeToggle i.fa-sun');
        const moonIcon = document.querySelector('#themeToggle i.fa-moon');
        if (sunIcon) sunIcon.style.display = 'none';
        if (moonIcon) moonIcon.style.display = 'inline-block';
    }
});

onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    await fetchCurrentUserData();
    await loadOrderAndChat();
});

initTheme();

window.addEventListener('beforeunload', () => { 
    if (chatUnsubscribe) {
        off(chatUnsubscribe);
        chatUnsubscribe = null;
    }
    if (countdownInterval) clearInterval(countdownInterval);
});
</script>
