<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Market | ABOTRA-PROAI - Live Crypto Prices</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Inter', sans-serif;
}

body {
background: #050505;
background-image: url("../assets/images/background.png");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
min-height: 100vh;
padding-bottom: 75px;
position: relative;
font-size: 11px;
}

body.light-theme {
background: #f5f5f5;
background-image: url("../assets/images/background-light.png");
}

body.light-theme .overlay {
background: rgba(255,255,255,0.85);
}

body.light-theme .top-bar,
body.light-theme .market-container,
body.light-theme .market-card,
body.light-theme .stats-card,
body.light-theme .watchlist-card {
background: rgba(255,255,255,0.95);
border: 1px solid rgba(0,0,0,0.08);
}

body.light-theme .top-bar h2,
body.light-theme .top-title {
color: #800000;
}

body.light-theme .coin-name {
color: #800000;
}

body.light-theme .price {
color: #333;
}

body.light-theme .search-box {
background: rgba(0,0,0,0.04);
border: 1px solid rgba(0,0,0,0.1);
color: #333;
}

body.light-theme .search-box::placeholder {
color: #999;
}

body.light-theme .theme-toggle {
background: rgba(0,0,0,0.08);
border-color: rgba(128,0,0,0.3);
}

body.light-theme .theme-toggle i {
color: #800000;
}

body.light-theme .bottom-nav {
background: rgba(255,255,255,0.95);
border-top: 1px solid rgba(128,0,0,0.2);
}

body.light-theme .bottom-nav a {
color: #888;
}

body.light-theme .bottom-nav a.active {
color: #800000;
}

.skeleton-stats-bar {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 12px;
margin-bottom: 16px;
}
.skeleton-stats-card {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,215,0,0.2);
border-radius: 16px;
padding: 12px;
text-align: center;
animation: skeletonPulse 1.5s ease-in-out infinite;
}
.skeleton-stats-label {
height: 10px;
width: 50px;
background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
background-size: 200% 100%;
border-radius: 5px;
margin: 0 auto 6px auto;
animation: shimmer 1.5s infinite;
}
.skeleton-stats-value {
height: 20px;
width: 70px;
background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
background-size: 200% 100%;
border-radius: 6px;
margin: 0 auto;
animation: shimmer 1.5s infinite;
}
.skeleton-tab-buttons {
display: flex;
gap: 8px;
margin-bottom: 16px;
}
.skeleton-tab-btn {
flex: 1;
height: 40px;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,215,0,0.2);
border-radius: 10px;
animation: skeletonPulse 1.5s ease-in-out infinite;
}
.skeleton-sort-options {
display: flex;
gap: 8px;
margin-bottom: 12px;
justify-content: flex-end;
}
.skeleton-sort-btn {
width: 60px;
height: 24px;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,215,0,0.2);
border-radius: 6px;
animation: skeletonPulse 1.5s ease-in-out infinite;
}
.skeleton-search {
width: 100%;
max-width: 350px;
height: 40px;
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,215,0,0.3);
border-radius: 40px;
margin: 0 auto 16px;
animation: skeletonPulse 1.5s ease-in-out infinite;
}
.skeleton-market-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 12px;
}
.skeleton-market-card {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,215,0,0.2);
border-radius: 16px;
padding: 12px 16px;
display: flex;
justify-content: space-between;
align-items: center;
animation: skeletonPulse 1.5s ease-in-out infinite;
}
.skeleton-coin-info {
display: flex;
align-items: center;
gap: 10px;
}
.skeleton-coin-icon {
width: 34px;
height: 34px;
background: linear-gradient(90deg, rgba(255,215,0,0.1) 25%, rgba(255,215,0,0.25) 50%, rgba(255,215,0,0.1) 75%);
background-size: 200% 100%;
border-radius: 50%;
animation: shimmer 1.5s infinite;
}
.skeleton-coin-text {
width: 50px;
height: 12px;
background: linear-gradient(90deg, rgba(255,215,0,0.05) 25%, rgba(255,215,0,0.1) 50%, rgba(255,215,0,0.05) 75%);
background-size: 200% 100%;
border-radius: 5px;
margin-bottom: 5px;
animation: shimmer 1.5s infinite;
}
.skeleton-coin-sub {
width: 35px;
height: 8px;
background: linear-gradient(90deg, rgba(255,215,0,0.05) 25%, rgba(255,215,0,0.1) 50%, rgba(255,215,0,0.05) 75%);
background-size: 200% 100%;
border-radius: 3px;
animation: shimmer 1.5s infinite;
}
.skeleton-price-info {
text-align: right;
}
.skeleton-price {
width: 65px;
height: 14px;
background: linear-gradient(90deg, rgba(255,215,0,0.05) 25%, rgba(255,215,0,0.1) 50%, rgba(255,215,0,0.05) 75%);
background-size: 200% 100%;
border-radius: 5px;
margin-bottom: 5px;
animation: shimmer 1.5s infinite;
}
.skeleton-change {
width: 50px;
height: 10px;
background: linear-gradient(90deg, rgba(255,215,0,0.05) 25%, rgba(255,215,0,0.1) 50%, rgba(255,215,0,0.05) 75%);
background-size: 200% 100%;
border-radius: 4px;
margin-bottom: 3px;
animation: shimmer 1.5s infinite;
}
.skeleton-volume {
width: 55px;
height: 8px;
background: linear-gradient(90deg, rgba(255,215,0,0.05) 25%, rgba(255,215,0,0.1) 50%, rgba(255,215,0,0.05) 75%);
background-size: 200% 100%;
border-radius: 3px;
animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
0% { background-position: -200% 0; }
100% { background-position: 200% 0; }
}
@keyframes skeletonPulse {
0%, 100% { opacity: 0.6; }
50% { opacity: 1; }
}

.theme-toggle {
background: rgba(0,0,0,0.7);
backdrop-filter: blur(10px);
border: 1px solid rgba(255,215,0,0.3);
border-radius: 10px;
padding: 8px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: 0.3s;
}
.theme-toggle:hover {
background: rgba(255,215,0,0.2);
transform: scale(1.05);
}
.theme-toggle i {
font-size: 15px;
color: #FFFFFF;
}
.theme-toggle span {
display: none;
}

.overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.82);
backdrop-filter: blur(4px);
z-index: 1;
}

.top-bar {
position: fixed;
top: 0;
left: 0;
right: 0;
z-index: 100;
background: rgba(10,10,10,0.95);
backdrop-filter: blur(12px);
border-bottom: 1px solid rgba(255,215,0,0.2);
padding: 8px 16px;
display: flex;
justify-content: space-between;
align-items: center;
}

.logo-area {
display: flex;
align-items: center;
gap: 8px;
}

.logo-area img {
width: 32px;
height: 32px;
border-radius: 8px;
object-fit: cover;
background: transparent;
}

.logo-area h2 {
color: #FFD700;
font-size: 14px;
margin-bottom: 2px;
}

.logo-area p {
color: #AAAAAA;
font-size: 7px;
}

.top-bar-right {
display: flex;
align-items: center;
gap: 8px;
}

.back-btn-top {
background: rgba(255,215,0,0.15);
border: none;
border-radius: 8px;
padding: 6px 12px;
color: #FFD700;
cursor: pointer;
transition: 0.3s;
display: flex;
align-items: center;
gap: 5px;
font-size: 9px;
font-weight: 500;
}

.back-btn-top:hover {
background: rgba(255,215,0,0.3);
}

.market-container {
position: relative;
z-index: 2;
max-width: 1400px;
margin: 70px auto 20px;
padding: 0 12px;
}

.top-title {
text-align: center;
font-size: 20px;
font-weight: 800;
color: #FFD700;
margin-bottom: 16px;
letter-spacing: 1px;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.stats-bar {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 12px;
margin-bottom: 16px;
}

.stats-card {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,215,0,0.2);
backdrop-filter: blur(10px);
border-radius: 16px;
padding: 12px;
text-align: center;
}

.stats-label {
color: #AAAAAA;
font-size: 9px;
margin-bottom: 4px;
display: flex;
align-items: center;
justify-content: center;
gap: 4px;
}

.stats-value {
color: #FFD700;
font-size: 18px;
font-weight: 800;
}

.tab-buttons {
display: flex;
gap: 8px;
margin-bottom: 16px;
background: rgba(0,0,0,0.3);
border-radius: 14px;
padding: 4px;
}

.tab-btn {
flex: 1;
padding: 10px;
border: none;
border-radius: 10px;
background: transparent;
color: #AAAAAA;
font-weight: 600;
cursor: pointer;
transition: 0.3s;
font-size: 11px;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}

.tab-btn.active {
background: linear-gradient(135deg, #800000, #FFD700);
color: white;
}

.sort-options {
display: flex;
gap: 8px;
margin-bottom: 12px;
justify-content: flex-end;
flex-wrap: wrap;
}

.sort-btn {
background: rgba(255,255,255,0.1);
border: 1px solid rgba(255,215,0,0.3);
border-radius: 6px;
padding: 4px 8px;
color: #AAAAAA;
font-size: 9px;
cursor: pointer;
transition: 0.3s;
}

.sort-btn.active {
background: rgba(255,215,0,0.2);
color: #FFD700;
}

.search-box {
width: 100%;
max-width: 350px;
margin: 0 auto 16px;
display: block;
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,215,0,0.3);
border-radius: 40px;
padding: 10px 16px;
color: white;
font-size: 11px;
outline: none;
transition: 0.3s;
}

.search-box:focus {
border-color: #FFD700;
box-shadow: 0 0 8px rgba(255,215,0,0.2);
}

.search-box::placeholder {
color: #888;
}

.market-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 12px;
}

.market-card {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 16px;
padding: 12px 16px;
display: flex;
justify-content: space-between;
align-items: center;
transition: 0.3s;
cursor: pointer;
position: relative;
}

.market-card:hover {
transform: translateY(-2px);
border-color: #FFD700;
background: rgba(255,215,0,0.05);
}

.coin-info {
display: flex;
align-items: center;
gap: 10px;
}

.coin-icon {
width: 36px;
height: 36px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-weight: bold;
color: white;
font-size: 13px;
flex-shrink: 0;
background: transparent !important;
overflow: hidden;
}

.coin-icon img {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 50%;
background: transparent;
}

.coin-icon .fallback {
display: flex;
align-items: center;
justify-content: center;
width: 100%;
height: 100%;
font-weight: bold;
color: #FFD700;
font-size: 16px;
background: rgba(255,215,0,0.15);
border-radius: 50%;
}

.coin-details {
display: flex;
flex-direction: column;
}

.coin-name {
color: #FFD700;
font-weight: 700;
font-size: 12px;
}

.coin-symbol {
color: #888;
font-size: 8px;
}

.price-info {
text-align: right;
}

.price {
color: white;
font-size: 13px;
font-weight: 700;
}

.change {
font-size: 10px;
margin-top: 3px;
}

.change.green {
color: #0ECB81;
}

.change.red {
color: #F6465D;
}

.volume {
font-size: 8px;
color: #888;
margin-top: 3px;
}

/* Watchlist button - star icon mbele ya jina la coin */
.watchlist-btn {
background: transparent;
border: none;
color: #888;
cursor: pointer;
font-size: 13px;
transition: 0.3s;
padding: 2px 4px;
flex-shrink: 0;
}

.watchlist-btn:hover {
color: #FFD700;
transform: scale(1.1);
}

.watchlist-btn.active {
color: #FFD700;
text-shadow: 0 0 8px rgba(255,215,0,0.3);
}

/* Top bar right for watchlist button */
.watchlist-top-btn {
background: transparent;
border: none;
color: #888;
cursor: pointer;
font-size: 14px;
transition: 0.3s;
padding: 4px 8px;
border-radius: 8px;
}

.watchlist-top-btn:hover {
color: #FFD700;
background: rgba(255,215,0,0.1);
}

.watchlist-top-btn.active {
color: #FFD700;
}

.empty-state {
text-align: center;
padding: 50px;
background: rgba(255,255,255,0.03);
border-radius: 16px;
}

.empty-state i {
font-size: 40px;
color: rgba(255,215,0,0.3);
margin-bottom: 12px;
}

.empty-state p {
color: #AAAAAA;
font-size: 10px;
}

.bottom-nav {
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: rgba(10,10,10,0.95);
backdrop-filter: blur(12px);
border-top: 1px solid rgba(255,215,0,0.2);
border-radius: 18px 18px 0 0;
display: flex;
justify-content: space-around;
padding: 6px 10px;
z-index: 100;
}

.bottom-nav a {
display: flex;
flex-direction: column;
align-items: center;
text-decoration: none;
color: #888;
font-size: 7px;
transition: 0.3s;
gap: 2px;
}

.bottom-nav a i {
font-size: 16px;
}

.bottom-nav a.active {
color: #FFD700;
}

.bottom-nav a:hover {
color: #FFD700;
}

.notification-popup {
position: fixed;
top: 70px;
right: 15px;
min-width: 240px;
max-width: 300px;
padding: 10px 14px;
border-radius: 14px;
display: flex;
align-items: center;
gap: 10px;
z-index: 99999;
backdrop-filter: blur(20px);
box-shadow: 0 12px 28px rgba(0,0,0,0.3);
animation: slideInRight 0.3s ease;
border-left: 3px solid;
}

.notification-popup.success {
background: linear-gradient(135deg,rgba(0,255,136,0.15), rgba(0,255,136,0.08));
border-left-color: #00FF88;
}

.notification-popup.error {
background: linear-gradient(135deg,rgba(255,77,77,0.15), rgba(255,77,77,0.08));
border-left-color: #FF4D4D;
}

.notification-popup.info {
background: linear-gradient(135deg,rgba(255,215,0,0.15), rgba(255,215,0,0.08));
border-left-color: #FFD700;
}

.notification-popup i {
font-size: 18px;
}

.notification-popup .popup-message {
flex: 1;
font-size: 10px;
color: #FFFFFF;
font-weight: 500;
}

@keyframes slideInRight {
from { opacity: 0; transform: translateX(100%); }
to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeOut {
from { opacity: 1; transform: translateX(0); }
to { opacity: 0; transform: translateX(100%); }
}

@media(max-width: 700px) {
.market-container {
padding: 0 12px;
margin-top: 65px;
}
.top-title {
font-size: 18px;
}
.stats-bar {
grid-template-columns: repeat(2, 1fr);
gap: 8px;
}
.stats-value {
font-size: 16px;
}
.market-grid {
grid-template-columns: 1fr;
}
.tab-btn span {
display: none;
}
.tab-btn i {
margin: 0;
}
.tab-btn {
padding: 8px;
}
.theme-toggle {
padding: 8px;
}
.logo-area h2 {
font-size: 13px;
}
.logo-area p {
display: none;
}
.bottom-nav a span {
font-size: 6px;
}
.bottom-nav a i {
font-size: 14px;
}
.skeleton-stats-bar {
grid-template-columns: repeat(2, 1fr);
}
.coin-icon {
width: 30px;
height: 30px;
}
.watchlist-btn {
font-size: 11px;
}
}
</style>
</head>

        </div>

</div>

        </button>
    </div>

    <div class="sort-options">
        <button class="sort-btn active" data-sort="rank">Rank</button>
        <button class="sort-btn" data-sort="price">Price</button>
        <button class="sort-btn" data-sort="change">24h Change</button>
        <button class="sort-btn" data-sort="volume">Volume</button>
    </div>

    <input type="text" id="searchBox" placeholder="🔍 Search coin by name (e.g., Bitcoin, Ethereum, BNB)..." class="search-box">

    <div id="marketContainer" class="market-grid">
        <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading market data...</p>
        </div>
    </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let allCoins = [];
let watchlist = [];
let currentTab = 'all';
let currentSort = 'rank';

function initTheme() {
    const savedTheme = localStorage.getItem('abotra_theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
}

document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

function showNotification(message, type, duration = 4000) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i><div class="popup-message">${message}</div>`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

function formatPrice(price) {
    if (price >= 1) return price.toFixed(2);
    if (price >= 0.01) return price.toFixed(4);
    if (price >= 0.0001) return price.toFixed(6);
    return price.toFixed(8);
}

function formatVolume(volume) {
    if (volume >= 1e9) return `$${(volume / 1e9).toFixed(2)}B`;
    if (volume >= 1e6) return `$${(volume / 1e6).toFixed(2)}M`;
    if (volume >= 1e3) return `$${(volume / 1e3).toFixed(2)}K`;
    return `$${volume.toFixed(2)}`;
}

function getFallbackSymbol(symbol) {
    const cleanSymbol = symbol.toUpperCase();
    const fallbacks = {
        'BTC': '₿', 'ETH': 'Ξ', 'BNB': 'BNB', 'SOL': '◎', 'XRP': '✕',
        'ADA': '₳', 'DOGE': 'Ð', 'TRX': 'TRX', 'DOT': '●', 'MATIC': 'MATIC',
        'SHIB': 'SHIB', 'LINK': 'LINK', 'UNI': 'UNI', 'AVAX': 'AVAX', 'ATOM': 'ATOM',
        'LTC': 'Ł', 'ETC': 'ETC', 'XLM': 'XLM', 'ALGO': 'ALGO', 'VET': 'VET',
        'FIL': 'FIL', 'THETA': 'θ', 'FTM': 'FTM', 'NEAR': 'NEAR', 'ARB': 'ARB',
        'APT': 'APT', 'OP': 'OP', 'ICP': 'ICP', 'AAVE': 'AAVE', 'MKR': 'MKR',
        'CRV': 'CRV', 'SUSHI': '🍣', 'COMP': 'COMP', 'SNX': 'SNX', 'ZEC': 'ZEC'
    };
    return fallbacks[cleanSymbol] || cleanSymbol.substring(0, 2);
}

async function loadWatchlist() {
    if (!currentUser) return;
    const watchlistRef = ref(db, `watchlist/${currentUser.uid}`);
    const snapshot = await get(watchlistRef);
    if (snapshot.exists()) {
        watchlist = snapshot.val();
    } else {
        watchlist = [];
    }
    renderMarket();
}

async function saveWatchlist() {
    if (!currentUser) return;
    const watchlistRef = ref(db, `watchlist/${currentUser.uid}`);
    await set(watchlistRef, watchlist);
}

window.toggleWatchlist = async function(symbol, event) {
    if (event) event.stopPropagation();
    if (!currentUser) {
        showNotification('Please login first', 'error');
        return;
    }
    
    const index = watchlist.indexOf(symbol);
    if (index === -1) {
        watchlist.push(symbol);
        showNotification(`${symbol} added to watchlist`, 'success');
    } else {
        watchlist.splice(index, 1);
        showNotification(`${symbol} removed from watchlist`, 'info');
    }
    await saveWatchlist();
    renderMarket();
};

async function loadMarketData() {
    const container = document.getElementById('marketContainer');
    container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading market data...</p></div>';
    
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        
        const response = await fetch(
            'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=250&page=1&sparkline=false&price_change_percentage=24h',
            { signal: controller.signal }
        );
        
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error('API error');
        
        const data = await response.json();
        
        allCoins = data.map(coin => ({
            symbol: coin.symbol.toUpperCase(),
            name: coin.name,
            price: coin.current_price || 0,
            priceChangePercent: coin.price_change_percentage_24h || 0,
            volume: coin.total_volume || 0,
            image: coin.image || '',
            marketCap: coin.market_cap || 0
        }));
        
        allCoins = allCoins.filter(coin => coin.price > 0 && coin.volume > 0);
        
        const marketRef = ref(db, 'marketSnapshot');
        await set(marketRef, {
            data: allCoins.slice(0, 200),
            timestamp: Date.now()
        });
        
        updateStats();
        renderMarket();
        
        setTimeout(() => {
            document.getElementById('skeletonContainer').style.display = 'none';
            document.getElementById('realContent').style.display = 'block';
        }, 500);
        
    } catch (error) {
        console.error('Market load error:', error);
        
        const marketRef = ref(db, 'marketSnapshot');
        const snapshot = await get(marketRef);
        if (snapshot.exists()) {
            const cached = snapshot.val();
            allCoins = cached.data;
            updateStats();
            renderMarket();
            showNotification('Using cached data. Market data will refresh shortly.', 'info');
            
            setTimeout(() => {
                document.getElementById('skeletonContainer').style.display = 'none';
                document.getElementById('realContent').style.display = 'block';
            }, 500);
        } else {
            setTimeout(() => {
                document.getElementById('skeletonContainer').style.display = 'none';
                document.getElementById('realContent').style.display = 'block';
            }, 1500);
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Failed to load market data. Please check your connection.</p>
                    <button onclick="location.reload()" style="margin-top:12px; padding:8px 16px; background:linear-gradient(135deg,#800000,#FFD700); border:none; border-radius:8px; color:white; cursor:pointer; font-size:10px;">Retry</button>
                </div>
            `;
        }
    }
}

function updateStats() {
    document.getElementById('totalCoins').textContent = allCoins.length;
    
    let totalVolume = 0;
    let topGainer = { symbol: '', change: -Infinity };
    let topLoser = { symbol: '', change: Infinity };
    
    allCoins.forEach(coin => {
        const volume = coin.volume;
        const change = coin.priceChangePercent;
        
        totalVolume += volume;
        
        if (change > topGainer.change) {
            topGainer = { symbol: coin.symbol, change: change };
        }
        if (change < topLoser.change) {
            topLoser = { symbol: coin.symbol, change: change };
        }
    });
    
    document.getElementById('totalVolume').innerHTML = formatVolume(totalVolume);
    document.getElementById('topGainer').innerHTML = `${topGainer.symbol} +${topGainer.change.toFixed(2)}%`;
    document.getElementById('topLoser').innerHTML = `${topLoser.symbol} ${topLoser.change.toFixed(2)}%`;
}

function sortCoins(coins) {
    const sorted = [...coins];
    switch(currentSort) {
        case 'price':
            sorted.sort((a, b) => b.price - a.price);
            break;
        case 'change':
            sorted.sort((a, b) => b.priceChangePercent - a.priceChangePercent);
            break;
        case 'volume':
            sorted.sort((a, b) => b.volume - a.volume);
            break;
        default:
            sorted.sort((a, b) => b.volume - a.volume);
    }
    return sorted;
}

function renderMarket() {
    const container = document.getElementById('marketContainer');
    const searchInput = document.getElementById('searchBox').value.toLowerCase();
    
    let filteredCoins = allCoins.filter(coin => {
        const name = coin.name.toLowerCase();
        const symbol = coin.symbol.toLowerCase();
        return name.includes(searchInput) || symbol.includes(searchInput);
    });
    
    if (currentTab === 'watchlist') {
        filteredCoins = filteredCoins.filter(coin => watchlist.includes(coin.symbol));
    }
    
    const sortedCoins = sortCoins(filteredCoins);
    
    if (sortedCoins.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <p>No coins found matching your search.</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = '';
    
    sortedCoins.slice(0, 150).forEach((coin) => {
        const symbol = coin.symbol;
        const name = coin.name;
        const price = coin.price;
        const change = coin.priceChangePercent;
        const volume = coin.volume;
        const isWatched = watchlist.includes(coin.symbol);
        const logoUrl = coin.image;
        const fallbackSymbol = getFallbackSymbol(coin.symbol);
        
        const card = document.createElement('div');
        card.className = 'market-card';
        
        card.onclick = (e) => {
            if (e.target.tagName !== 'BUTTON' && !e.target.closest('.watchlist-btn')) {
                const selectedCoin = {
                    symbol: symbol,
                    name: name,
                    price: price,
                    image: logoUrl,
                    change: change
                };
                localStorage.setItem('selectedCoin', JSON.stringify(selectedCoin));
                window.location.href = `trade.html?symbol=${symbol}`;
            }
        };
        
        card.innerHTML = `
            <div class="coin-info">
                <div class="coin-icon">
                    <img src="${logoUrl}" alt="${symbol}" 
                         onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\\'fallback\\'>${fallbackSymbol}</span>'"
                         loading="lazy">
                </div>
                <div class="coin-details">
                    <div class="coin-name">${symbol}</div>
                    <div class="coin-symbol">${name}</div>
                </div>
                <button class="watchlist-btn ${isWatched ? 'active' : ''}" onclick="event.stopPropagation(); toggleWatchlist('${symbol}')">
                    <i class="fas ${isWatched ? 'fa-star' : 'fa-star-o'}"></i>
                </button>
            </div>
            <div class="price-info">
                <div class="price">$${formatPrice(price)}</div>
                <div class="change ${change >= 0 ? 'green' : 'red'}">
                    ${change >= 0 ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%
                </div>
                <div class="volume">Vol: ${formatVolume(volume)}</div>
            </div>
        `;
        container.appendChild(card);
    });
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-tab') === tab) btn.classList.add('active');
    });
    renderMarket();
}

function switchSort(sort) {
    currentSort = sort;
    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-sort') === sort) btn.classList.add('active');
    });
    renderMarket();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
});

document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => switchSort(btn.getAttribute('data-sort')));
});

document.getElementById('searchBox').addEventListener('input', () => renderMarket());

function startAutoRefresh() {
    setInterval(() => {
        loadMarketData();
    }, 60000);
}

function init() {
    initTheme();
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        currentUser = user;
        await loadWatchlist();
        await loadMarketData();
        startAutoRefresh();
    });
}

init();
</script>
</body>
