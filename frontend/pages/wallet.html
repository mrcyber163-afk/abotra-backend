}

100% { transform: rotate(360deg); }
}

.empty-state {

right: 0;

border-top: 1px solid rgba(255,215,0,0.2);
border-radius: 18px 18px 0 0;

justify-content: space-around;
padding: 6px 10px;
z-index: 100;
}

.bottom-nav a {
display: flex;
flex-direction: column;
align-items: center;
text-decoration: none;
color: #888;
font-size: 7px;
transition: 0.3s;
gap: 2px;
}

.bottom-nav a i {
font-size: 16px;
}

.bottom-nav a.active {
color: #FFD700;
}

/* NOTIFICATION POPUP */
.notification-popup {
position: fixed;
top: 70px;
right: 15px;
min-width: 240px;
max-width: 300px;
padding: 8px 12px;
border-radius: 12px;
display: flex;
align-items: center;
gap: 10px;
z-index: 99999;
backdrop-filter: blur(20px);
box-shadow: 0 12px 28px rgba(0,0,0,0.3);
animation: slideInRight 0.3s ease;
border-left: 3px solid;
}

.notification-popup.success {
background: linear-gradient(135deg,rgba(0,255,136,0.15), rgba(0,255,136,0.08));
border-left-color: #00FF88;
}

.notification-popup.error {
background: linear-gradient(135deg,rgba(255,77,77,0.15), rgba(255,77,77,0.08));
border-left-color: #FF4D4D;
}

.notification-popup.info {
background: linear-gradient(135deg,rgba(255,215,0,0.15), rgba(255,215,0,0.08));
border-left-color: #FFD700;
}

.notification-popup i {
font-size: 18px;
}

.notification-popup .popup-message {
flex: 1;
font-size: 10px;
color: #FFFFFF;
font-weight: 500;
}

@keyframes slideInRight {
from { opacity: 0; transform: translateX(100%); }
to { opacity: 1; transform: translateX(0); }
}

@keyframes fadeOut {
from { opacity: 1; transform: translateX(0); }
to { opacity: 0; transform: translateX(100%); }
}

}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update, push, off } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getFirestore, doc, getDoc, updateDoc, increment, collection, query as fsQuery, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const firestore = getFirestore(app);
const auth = getAuth(app);

// ========== GLOBAL VARIABLES ==========
let currentUser = null;
let allTransactions = [];
let rtdbBalanceListener = null;

// ========== THEME TOGGLE ==========
function initTheme() {
    const savedTheme = localStorage.getItem('abotra_theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    } else {
        document.body.classList.remove('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    }
}

document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

// ========== SHOW NOTIFICATION ==========
function showNotification(message, type, duration = 4000) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i><div class="popup-message">${message}</div>`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

// ========== ADD NOTIFICATION ==========
async function addNotification(userId, title, message, type = 'info') {
    if (!userId) return;
    const notificationRef = push(ref(db, `notifications/${userId}`));
    await set(notificationRef, {
        title: title,
        message: message,
        type: type,
        read: false,
        timestamp: Date.now()
    });
}

// ========== LOAD WALLET BALANCE FROM RTDB ==========
async function loadWalletBalanceFromRTDB() {
    if (!currentUser) return 0;
    try {
        const userRTDBRef = ref(db, `users/${currentUser.uid}`);
        const snapshot = await get(userRTDBRef);
        if (snapshot.exists()) {
            const balance = snapshot.val().balance || 0;
            document.getElementById('walletBalance').innerHTML = `$${balance.toFixed(2)}`;
            return balance;
        } else {
            await set(ref(db, `users/${currentUser.uid}`), {
                uid: currentUser.uid,
                email: currentUser.email,
                balance: 0,
                createdAt: Date.now()
            });
            document.getElementById('walletBalance').innerHTML = `$0.00`;
            return 0;
        }
    } catch (error) {
        console.error("Error loading balance:", error);
        return 0;
    }
}

// ========== SETUP REAL-TIME BALANCE LISTENER ==========
function setupRealtimeBalance() {
    if (!currentUser) return;
    if (rtdbBalanceListener) off(rtdbBalanceListener);
    const userRTDBRef = ref(db, `users/${currentUser.uid}`);
    rtdbBalanceListener = onValue(userRTDBRef, (snapshot) => {
        if (snapshot.exists()) {
            const balance = snapshot.val().balance || 0;
            document.getElementById('walletBalance').innerHTML = `$${balance.toFixed(2)}`;
        }
    });
}

// ========== LOAD TRANSACTION HISTORY ==========
async function loadTransactionHistory() {
    if (!currentUser) return;
    allTransactions = [];
    
    // Load deposits
    const depositsRef = ref(db, `deposits/${currentUser.uid}`);
    const depositsSnapshot = await get(depositsRef);
    if (depositsSnapshot.exists()) {
        depositsSnapshot.forEach(child => {
            const deposit = child.val();
            if (deposit.status === 'approved' || deposit.status === 'completed') {
                allTransactions.push({
                    id: child.key,
                    type: 'deposit',
                    amount: deposit.amount,
                    status: 'completed',
                    timestamp: deposit.approvedAt || deposit.createdAt || Date.now(),
                    method: deposit.method || 'Bank Transfer'
                });
            } else if (deposit.status === 'pending') {
                allTransactions.push({
                    id: child.key,
                    type: 'deposit',
                    amount: deposit.amount,
                    status: 'pending',
                    timestamp: deposit.createdAt || Date.now(),
                    method: deposit.method || 'Bank Transfer'
                });
            }
        });
    }
    
    // Load withdrawals
    const withdrawalsRef = ref(db, `withdrawals/${currentUser.uid}`);
    const withdrawalsSnapshot = await get(withdrawalsRef);
    if (withdrawalsSnapshot.exists()) {
        withdrawalsSnapshot.forEach(child => {
            const withdrawal = child.val();
            allTransactions.push({
                id: child.key,
                type: 'withdraw',
                amount: withdrawal.amount,
                status: withdrawal.status || 'pending',
                timestamp: withdrawal.createdAt || Date.now(),
                method: withdrawal.method || 'Bank Transfer'
            });
        });
    }
    
    // Load received transfers
    const receivedRef = ref(db, `transfers/received/${currentUser.uid}`);
    const receivedSnapshot = await get(receivedRef);
    if (receivedSnapshot.exists()) {
        receivedSnapshot.forEach(child => {
            const transfer = child.val();
            allTransactions.push({
                id: child.key,
                type: 'transfer_received',
                amount: transfer.amount,
                sender: transfer.senderEmail,
                status: 'completed',
                timestamp: transfer.timestamp || Date.now()
            });
        });
    }
    
    // Load sent transfers
    const sentRef = ref(db, `transfers/sent/${currentUser.uid}`);
    const sentSnapshot = await get(sentRef);
    if (sentSnapshot.exists()) {
        sentSnapshot.forEach(child => {
            const transfer = child.val();
            allTransactions.push({
                id: child.key,
                type: 'transfer_sent',
                amount: transfer.amount,
                recipient: transfer.recipientEmail,
                status: transfer.status || 'completed',
                timestamp: transfer.timestamp || Date.now()
            });
        });
    }
    
    // Sort by timestamp (newest first)
    allTransactions.sort((a, b) => b.timestamp - a.timestamp);
    renderHistory();
}

// ========== RENDER HISTORY ==========
function renderHistory() {
    const container = document.getElementById('historyContainer');
    if (allTransactions.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i><p>No transactions yet</p></div>`;
        return;
    }
    container.innerHTML = '';
    allTransactions.slice(0, 50).forEach(tx => {
        const isPositive = tx.type === 'deposit' || tx.type === 'transfer_received';
        const amountClass = isPositive ? 'positive' : 'negative';
        const amountPrefix = isPositive ? '+' : '-';
        let typeIcon = '', typeText = '';
        switch(tx.type) {
            case 'deposit': typeIcon = '<i class="fas fa-arrow-down" style="color:#0ECB81;"></i>'; typeText = 'Deposit'; break;
            case 'withdraw': typeIcon = '<i class="fas fa-arrow-up" style="color:#F6465D;"></i>'; typeText = 'Withdrawal'; break;
            case 'transfer_received': typeIcon = '<i class="fas fa-exchange-alt" style="color:#0ECB81;"></i>'; typeText = `Received from ${tx.sender ? tx.sender.split('@')[0] : 'User'}`; break;
            case 'transfer_sent': typeIcon = '<i class="fas fa-exchange-alt" style="color:#F6465D;"></i>'; typeText = `Sent to ${tx.recipient ? tx.recipient.split('@')[0] : 'User'}`; break;
            default: typeIcon = '<i class="fas fa-receipt"></i>'; typeText = 'Transaction';
        }
        let statusClass = tx.status === 'pending' ? 'status-pending' : (tx.status === 'completed' ? 'status-completed' : 'status-failed');
        let statusText = tx.status === 'pending' ? 'Pending' : (tx.status === 'completed' ? 'Completed' : 'Failed');
        const date = new Date(tx.timestamp);
        const formattedDate = `${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
        const txCard = document.createElement('div');
        txCard.className = 'history-card';
        txCard.innerHTML = `
            <div class="history-left"><div class="type">${typeIcon} ${typeText}</div><div class="date">${formattedDate}</div></div>
            <div class="history-right"><div class="amount ${amountClass}">${amountPrefix}$${Math.abs(tx.amount).toFixed(2)}</div><div class="status ${statusClass}">${statusText}</div></div>
        `;
        container.appendChild(txCard);
    });
}

// ========== FIND USER BY EMAIL ==========
async function findUserByEmail(email) {
    if (!email) return null;
    const searchEmail = email.toLowerCase().trim();
    try {
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        if (snapshot.exists()) {
            let found = null;
            snapshot.forEach(child => {
                const user = child.val();
                if (user.email && user.email.toLowerCase() === searchEmail) {
                    found = { uid: child.key, email: user.email, balance: user.balance || 0 };
                }
            });
            if (found) return found;
        }
        return null;
    } catch (error) { console.error("Error finding user:", error); return null; }
}

// ========== SEND TRANSFER ==========
async function sendTransfer() {
    const recipientEmail = document.getElementById('transferEmail').value.trim().toLowerCase();
    const amount = parseFloat(document.getElementById('transferAmount').value);
    const note = document.getElementById('transferNote').value;
    
    if (!recipientEmail) { showNotification('Enter recipient email', 'error'); return; }
    if (!amount || amount <= 0) { showNotification('Enter valid amount', 'error'); return; }
    if (amount < 1) { showNotification('Minimum $1', 'error'); return; }
    if (recipientEmail === currentUser.email.toLowerCase()) { showNotification('Cannot transfer to yourself', 'error'); return; }
    
    const currentBalance = await loadWalletBalanceFromRTDB();
    if (amount > currentBalance) { showNotification('Insufficient balance', 'error'); return; }
    
    const transferBtn = document.getElementById('transferBtn');
    transferBtn.disabled = true;
    transferBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking recipient...';
    
    try {
        const recipient = await findUserByEmail(recipientEmail);
        if (!recipient) { 
            showNotification(`User "${recipientEmail}" not found`, 'error'); 
            transferBtn.disabled = false; 
            transferBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Transfer'; 
            return; 
        }
        
        transferBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        
        const senderRTDBRef = ref(db, `users/${currentUser.uid}`);
        const recipientRTDBRef = ref(db, `users/${recipient.uid}`);
        const senderSnap = await get(senderRTDBRef);
        const recipientSnap = await get(recipientRTDBRef);
        
        const senderBalance = senderSnap.exists() ? (senderSnap.val().balance || 0) : 0;
        const recipientBalance = recipientSnap.exists() ? (recipientSnap.val().balance || 0) : 0;
        
        if (senderBalance < amount) { 
            showNotification('Insufficient balance', 'error'); 
            transferBtn.disabled = false; 
            transferBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Transfer'; 
            return; 
        }
        
        // Update balances
        await update(senderRTDBRef, { balance: senderBalance - amount });
        await update(recipientRTDBRef, { balance: recipientBalance + amount });
        
        const transferId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const transferData = {
            id: transferId,
            amount: amount,
            senderId: currentUser.uid,
            senderEmail: currentUser.email,
            recipientId: recipient.uid,
            recipientEmail: recipient.email,
            note: note || '',
            timestamp: Date.now(),
            status: 'completed'
        };
        
        // Save to both sent and received paths
        await set(ref(db, `transfers/sent/${currentUser.uid}/${transferId}`), transferData);
        await set(ref(db, `transfers/received/${recipient.uid}/${transferId}`), transferData);
        
        // Add notifications
        await addNotification(currentUser.uid, 'Transfer Sent', `You sent $${amount.toFixed(2)} to ${recipient.email}.`, 'info');
        await addNotification(recipient.uid, 'Transfer Received', `You received $${amount.toFixed(2)} from ${currentUser.email}.`, 'success');
        
        showNotification(`$${amount.toFixed(2)} sent to ${recipient.email}!`, 'success');
        
        document.getElementById('transferEmail').value = '';
        document.getElementById('transferAmount').value = '';
        document.getElementById('transferNote').value = '';
        
        await loadTransactionHistory();
        
    } catch (error) { 
        console.error("Transfer error:", error); 
        showNotification('Error processing transfer', 'error'); 
    } finally { 
        transferBtn.disabled = false; 
        transferBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Transfer'; 
    }
}

// ========== INITIALIZE ==========
async function init() {
    initTheme();
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        
        document.getElementById('skeletonContainer').style.display = 'block';
        document.getElementById('realContent').style.display = 'none';
        
        await loadWalletBalanceFromRTDB();
        setupRealtimeBalance();
        await loadTransactionHistory();
        setInterval(loadTransactionHistory, 30000);
        
        setTimeout(() => {
            document.getElementById('skeletonContainer').style.display = 'none';
            document.getElementById('realContent').style.display = 'block';
        }, 1500);
    });
}

document.getElementById('transferBtn').addEventListener('click', sendTransfer);
init();
</script>
