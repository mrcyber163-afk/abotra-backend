<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, get, set, update, push, off } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let allTransactions = [];
let rtdbBalanceListener = null;
let isLoading = false;
let loadTimeout = null;

function initTheme() {
    const savedTheme = localStorage.getItem('abotra_theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
}
document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
});

function showNotification(message, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';
    toast.innerHTML = `<i class="fas ${icon}"></i><div class="popup-message">${message}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.animation = 'fadeOut 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 4000);
}

async function addNotification(userId, title, message, type = 'info', link = 'wallet.html') {
    if (!userId) return;
    try {
        const notifRef = push(ref(db, `notifications/${userId}`));
        await set(notifRef, { 
            title, 
            message, 
            type, 
            link: link,
            read: false, 
            timestamp: Date.now(),
            date: new Date().toISOString()
        });
    } catch(e) { console.error('Add notification error:', e); }
}

async function loadWalletBalance() {
    if (!currentUser) return 0;
    try {
        const snapshot = await get(ref(db, `users/${currentUser.uid}`));
        if (snapshot.exists()) {
            const balance = snapshot.val().balance || 0;
            document.getElementById('walletBalance').textContent = `$${balance.toFixed(2)}`;
            return balance;
        }
        return 0;
    } catch (error) { 
        console.error("Error loading balance:", error); 
        return 0; 
    }
}

function setupRealtimeBalance() {
    if (!currentUser) return;
    if (rtdbBalanceListener) {
        off(rtdbBalanceListener);
        rtdbBalanceListener = null;
    }
    const userRef = ref(db, `users/${currentUser.uid}`);
    rtdbBalanceListener = onValue(userRef, (snapshot) => {
        if (snapshot.exists()) {
            const balance = snapshot.val().balance || 0;
            document.getElementById('walletBalance').textContent = `$${balance.toFixed(2)}`;
        }
    });
}

// ============================================================
// LOAD TRANSACTION HISTORY - SIMPLIFIED & FIXED
// ============================================================
async function loadTransactionHistory() {
    if (!currentUser || isLoading) return;
    
    isLoading = true;
    allTransactions = [];
    const seenIds = new Set();

    try {
        // ✅ 1. Load deposit_requests (Binance & Mobile Money) - PRIMARY SOURCE
        const requestsRef = ref(db, `deposit_requests/${currentUser.uid}`);
        const requestsSnapshot = await get(requestsRef).catch(() => null);
        
        if (requestsSnapshot && requestsSnapshot.exists()) {
            requestsSnapshot.forEach(child => {
                const request = child.val();
                const depositId = request.depositId || request.id || child.key;
                
                if (seenIds.has(depositId)) return;
                seenIds.add(depositId);

                let status = request.status || 'pending';
                let displayStatus = status;
                if (status === 'pending_payment' || status === 'pending_verification') displayStatus = 'pending';
                else if (status === 'waiting_verification') displayStatus = 'waiting_verification';
                else if (status === 'approved' || status === 'completed' || status === 'verified') displayStatus = 'approved';
                else if (status === 'rejected') displayStatus = 'rejected';
                else if (status === 'cancelled') displayStatus = 'cancelled';
                else if (status === 'expired') displayStatus = 'expired';

                const timestamp = request.approvedAt || request.submittedAt || request.createdAt || Date.now();

                allTransactions.push({
                    id: child.key,
                    type: 'deposit',
                    amount: request.amount || 0,
                    status: displayStatus,
                    timestamp: timestamp,
                    method: request.method === 'binance_usdt' || request.method === 'Binance USDT' ? 'Binance USDT' : (request.network || 'Mobile Money'),
                    depositId: depositId,
                    _source: 'deposit_requests'
                });
            });
        }

        // ✅ 2. Load withdrawals
        const withdrawalsRef = ref(db, `withdrawals/${currentUser.uid}`);
        const withdrawalsSnapshot = await get(withdrawalsRef).catch(() => null);
        
        if (withdrawalsSnapshot && withdrawalsSnapshot.exists()) {
            withdrawalsSnapshot.forEach(child => {
                const withdrawal = child.val();
                const id = child.key;
                
                if (seenIds.has(id)) return;
                seenIds.add(id);

                allTransactions.push({
                    id: id,
                    type: 'withdraw',
                    amount: withdrawal.amount || 0,
                    status: withdrawal.status || 'pending',
                    timestamp: withdrawal.createdAt || Date.now(),
                    method: withdrawal.method || 'Withdrawal',
                    _source: 'withdrawals'
                });
            });
        }

        // ✅ 3. Load transfers received
        const receivedRef = ref(db, `transfers/received/${currentUser.uid}`);
        const receivedSnapshot = await get(receivedRef).catch(() => null);
        
        if (receivedSnapshot && receivedSnapshot.exists()) {
            receivedSnapshot.forEach(child => {
                const transfer = child.val();
                const id = child.key;
                
                if (seenIds.has(id)) return;
                seenIds.add(id);

                allTransactions.push({
                    id: id,
                    type: 'transfer_received',
                    amount: transfer.amount || 0,
                    sender: transfer.senderEmail,
                    status: 'completed',
                    timestamp: transfer.timestamp || Date.now(),
                    _source: 'transfers/received'
                });
            });
        }

        // ✅ 4. Load transfers sent
        const sentRef = ref(db, `transfers/sent/${currentUser.uid}`);
        const sentSnapshot = await get(sentRef).catch(() => null);
        
        if (sentSnapshot && sentSnapshot.exists()) {
            sentSnapshot.forEach(child => {
                const transfer = child.val();
                const id = child.key;
                
                if (seenIds.has(id)) return;
                seenIds.add(id);

                allTransactions.push({
                    id: id,
                    type: 'transfer_sent',
                    amount: transfer.amount || 0,
                    recipient: transfer.recipientEmail,
                    status: transfer.status || 'completed',
                    timestamp: transfer.timestamp || Date.now(),
                    _source: 'transfers/sent'
                });
            });
        }

        // ✅ Sort by timestamp (newest first)
        allTransactions.sort((a, b) => b.timestamp - a.timestamp);
        
        renderHistory();
        
    } catch (error) {
        console.error('Error loading history:', error);
    } finally {
        isLoading = false;
    }
}

function getStatusDisplay(status) {
    const statusMap = {
        'pending': { label: 'Pending', class: 'status-pending' },
        'pending_payment': { label: 'Pending Payment', class: 'status-pending' },
        'pending_verification': { label: 'Pending', class: 'status-pending' },
        'waiting_verification': { label: 'Waiting Verification', class: 'status-waiting' },
        'waiting': { label: 'Waiting Verification', class: 'status-waiting' },
        'approved': { label: 'Approved ✓', class: 'status-approved' },
        'completed': { label: 'Completed ✓', class: 'status-completed' },
        'verified': { label: 'Verified ✓', class: 'status-approved' },
        'rejected': { label: 'Rejected ✗', class: 'status-rejected' },
        'failed': { label: 'Failed ✗', class: 'status-failed' },
        'cancelled': { label: 'Cancelled', class: 'status-cancelled' },
        'expired': { label: 'Expired', class: 'status-expired' }
    };
    return statusMap[status] || { label: status || 'Unknown', class: 'status-pending' };
}

function renderHistory() {
    const container = document.getElementById('historyContainer');
    if (allTransactions.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i><p>No transactions yet</p></div>`;
        return;
    }
    
    container.innerHTML = '';
    const displayCount = Math.min(allTransactions.length, 50);
    
    for (let i = 0; i < displayCount; i++) {
        const tx = allTransactions[i];
        const isPositive = tx.type === 'deposit' || tx.type === 'transfer_received';
        const amountClass = isPositive ? 'positive' : 'negative';
        const amountPrefix = isPositive ? '+' : '-';
        
        let typeIcon = '', typeText = '';
        switch(tx.type) {
            case 'deposit': 
                typeIcon = '<i class="fas fa-arrow-down" style="color:#0ECB81;"></i>'; 
                typeText = tx.method || 'Deposit';
                break;
            case 'withdraw': 
                typeIcon = '<i class="fas fa-arrow-up" style="color:#F6465D;"></i>'; 
                typeText = tx.method || 'Withdrawal';
                break;
            case 'transfer_received': 
                typeIcon = '<i class="fas fa-exchange-alt" style="color:#0ECB81;"></i>'; 
                typeText = tx.sender ? `Received from ${tx.sender.split('@')[0]}` : 'Transfer Received';
                break;
            case 'transfer_sent': 
                typeIcon = '<i class="fas fa-exchange-alt" style="color:#F6465D;"></i>'; 
                typeText = tx.recipient ? `Sent to ${tx.recipient.split('@')[0]}` : 'Transfer Sent';
                break;
            default: 
                typeIcon = '<i class="fas fa-receipt"></i>'; 
                typeText = 'Transaction';
        }
        
        const statusInfo = getStatusDisplay(tx.status);
        const date = new Date(tx.timestamp);
        const formattedDate = `${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
        
        const txCard = document.createElement('div');
        txCard.className = 'history-card';
        txCard.innerHTML = `
            <div class="history-left">
                <div class="type">${typeIcon} ${typeText}</div>
                <div class="date">${formattedDate}</div>
                ${tx.depositId ? `<div class="date" style="font-family:monospace;font-size:8px;color:#666;">ID: ${tx.depositId}</div>` : ''}
            </div>
            <div class="history-right">
                <div class="amount ${amountClass}">${amountPrefix}$${Math.abs(tx.amount).toFixed(2)}</div>
                <div class="status ${statusInfo.class}">${statusInfo.label}</div>
            </div>
        `;
        container.appendChild(txCard);
    }
    
    if (allTransactions.length > 50) {
        const more = document.createElement('div');
        more.style.cssText = 'text-align:center;padding:12px 0;color:#888;font-size:10px;';
        more.textContent = `Showing 50 of ${allTransactions.length} transactions`;
        container.appendChild(more);
    }
}

async function findUserByEmail(email) {
    if (!email) return null;
    const searchEmail = email.toLowerCase().trim();
    try {
        const snapshot = await get(ref(db, 'users'));
        if (snapshot.exists()) {
            let found = null;
            snapshot.forEach(child => {
                const user = child.val();
                if (user.email && user.email.toLowerCase() === searchEmail) {
                    found = { uid: child.key, email: user.email, balance: user.balance || 0 };
                }
            });
            return found;
        }
        return null;
    } catch (error) { 
        console.error("Error finding user:", error); 
        return null; 
    }
}

async function sendTransfer() {
    const recipientEmail = document.getElementById('transferEmail').value.trim().toLowerCase();
    const amount = parseFloat(document.getElementById('transferAmount').value);
    const note = document.getElementById('transferNote').value;
    
    if (!recipientEmail) { showNotification('Enter recipient email', 'error'); return; }
    if (!amount || amount <= 0) { showNotification('Enter valid amount', 'error'); return; }
    if (amount < 1) { showNotification('Minimum $1', 'error'); return; }
    if (recipientEmail === currentUser.email.toLowerCase()) { showNotification('Cannot transfer to yourself', 'error'); return; }
    
    const currentBalance = await loadWalletBalance();
    if (amount > currentBalance) { showNotification('Insufficient balance', 'error'); return; }
    
    const transferBtn = document.getElementById('transferBtn');
    transferBtn.disabled = true;
    transferBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    
    try {
        const recipient = await findUserByEmail(recipientEmail);
        if (!recipient) { 
            showNotification(`User "${recipientEmail}" not found`, 'error'); 
            transferBtn.disabled = false; 
            transferBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Transfer'; 
            return; 
        }
        
        const senderRef = ref(db, `users/${currentUser.uid}`);
        const recipientRef = ref(db, `users/${recipient.uid}`);
        const senderSnap = await get(senderRef);
        const recipientSnap = await get(recipientRef);
        const senderBalance = senderSnap.exists() ? (senderSnap.val().balance || 0) : 0;
        const recipientBalance = recipientSnap.exists() ? (recipientSnap.val().balance || 0) : 0;
        
        if (senderBalance < amount) { 
            showNotification('Insufficient balance', 'error'); 
            transferBtn.disabled = false; 
            transferBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Transfer'; 
            return; 
        }
        
        await update(senderRef, { balance: senderBalance - amount });
        await update(recipientRef, { balance: recipientBalance + amount });
        
        const transferId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const transferData = {
            id: transferId, 
            amount: amount, 
            senderId: currentUser.uid, 
            senderEmail: currentUser.email,
            recipientId: recipient.uid, 
            recipientEmail: recipient.email, 
            note: note || '',
            timestamp: Date.now(), 
            status: 'completed'
        };
        
        await set(ref(db, `transfers/sent/${currentUser.uid}/${transferId}`), transferData);
        await set(ref(db, `transfers/received/${recipient.uid}/${transferId}`), transferData);
        
        await addNotification(currentUser.uid, 
            '💸 Transfer Sent', 
            `You sent $${amount.toFixed(2)} to ${recipient.email}.`, 
            'wallet', 
            'wallet.html');
        
        await addNotification(recipient.uid, 
            '💰 Transfer Received', 
            `You received $${amount.toFixed(2)} from ${currentUser.email}.`, 
            'wallet', 
            'wallet.html');
        
        showNotification(`$${amount.toFixed(2)} sent to ${recipient.email}!`, 'success');
        document.getElementById('transferEmail').value = '';
        document.getElementById('transferAmount').value = '';
        document.getElementById('transferNote').value = '';
        
        // Reload history
        await loadTransactionHistory();
        
    } catch (error) { 
        console.error("Transfer error:", error); 
        showNotification('Error processing transfer', 'error'); 
    } finally { 
        transferBtn.disabled = false; 
        transferBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Transfer'; 
    }
}

document.getElementById('transferBtn').addEventListener('click', sendTransfer);

async function init() {
    initTheme();
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) { 
            window.location.href = 'login.html'; 
            return; 
        }
        currentUser = user;
        
        // Show skeleton
        document.getElementById('skeletonContainer').style.display = 'block';
        document.getElementById('realContent').style.display = 'none';
        
        // Load data
        await loadWalletBalance();
        setupRealtimeBalance();
        await loadTransactionHistory();
        
        // Show content
        setTimeout(() => {
            document.getElementById('skeletonContainer').style.display = 'none';
            document.getElementById('realContent').style.display = 'block';
        }, 800);
    });
}

init();
