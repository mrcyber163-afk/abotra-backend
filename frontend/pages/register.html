<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Register | ABOTRA-PROAI - Create Your Trading Account</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/styles/choices.min.css" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/choices.js@10.2.0/public/assets/scripts/choices.min.js"></script>

<style>
/* ============================================================
   CSS VARIABLES & BASE
   ============================================================ */
:root {
    --bg-primary: #0A0A0A;
    --bg-card: rgba(18,18,18,0.95);
    --bg-input: rgba(255,255,255,0.04);
    --bg-glass: rgba(255,255,255,0.03);
    --text-primary: #FFFFFF;
    --text-muted: #999999;
    --text-secondary: #CCCCCC;
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --gold-glow: rgba(255,215,0,0.35);
    --gold-gradient: linear-gradient(135deg, #FFD700, #FFB800);
    --border-color: rgba(255,255,255,0.08);
    --border-focus: rgba(255,215,0,0.5);
    --shadow-card: 0 15px 40px rgba(0,0,0,0.6);
    --shadow-glow: 0 0 30px rgba(255,215,0,0.1);
    --radius: 18px;
    --radius-sm: 12px;
    --radius-xs: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --font: 'Inter', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }

body {
    background: var(--bg-primary);
    background-image: url("../assets/images/background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
    transition: background var(--transition);
    font-size: 12px;
    color: var(--text-primary);
}

/* ============================================================
   LIGHT THEME
   ============================================================ */
body.light-theme {
    background: #f5f5f5;
    --bg-primary: #f5f5f5;
    --bg-card: rgba(255,255,255,0.95);
    --bg-input: rgba(0,0,0,0.04);
    --bg-glass: rgba(255,255,255,0.8);
    --text-primary: #1a1a2e;
    --text-muted: #666666;
    --text-secondary: #555555;
    --border-color: rgba(0,0,0,0.08);
    --border-focus: rgba(128,0,0,0.4);
    --shadow-card: 0 15px 40px rgba(0,0,0,0.12);
}
body.light-theme .overlay { background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); }
body.light-theme .register-box {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
}
body.light-theme .input-box input { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); }
body.light-theme .input-box input::placeholder { color: #999999; }
body.light-theme .sub-text { color: var(--text-muted); }
body.light-theme .terms-text { color: var(--text-secondary); }
body.light-theme .terms-text a { color: #800000; }
body.light-theme .bottom-text { color: var(--text-muted); }
body.light-theme .bottom-text a { color: #800000; }
body.light-theme .register-option { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); }
body.light-theme .register-option:hover { background: rgba(128,0,0,0.08); border-color: #800000; }
body.light-theme .register-option.active { background: var(--gold-gradient); color: #0A0A0A; }

/* ============================================================
   CHOICES.JS - DARK THEME (Premium)
   ============================================================ */
body:not(.light-theme) .choices__inner {
    background: rgba(255,255,255,0.06) !important;
    border-color: var(--border-color) !important;
    color: var(--text-primary) !important;
}
body:not(.light-theme) .choices__list--dropdown {
    background: #1a1a1a !important;
    border-color: var(--border-color) !important;
}
body:not(.light-theme) .choices__list--dropdown .choices__item {
    color: var(--text-primary) !important;
}
body:not(.light-theme) .choices__list--dropdown .choices__item--selectable.is-highlighted {
    background: rgba(255,215,0,0.15) !important;
}
body:not(.light-theme) .choices__list--dropdown .choices__input {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,215,0,0.3) !important;
    color: var(--text-primary) !important;
}
body:not(.light-theme) .choices__list--dropdown .choices__input:focus {
    border-color: var(--gold) !important;
    box-shadow: 0 0 0 3px rgba(255,215,0,0.15) !important;
}
body:not(.light-theme) .choices__placeholder { color: var(--text-muted) !important; }

/* ============================================================
   CHOICES.JS - LIGHT THEME (Clean White)
   ============================================================ */
body.light-theme .choices__inner {
    background: rgba(0,0,0,0.04) !important;
    border-color: rgba(0,0,0,0.1) !important;
    color: var(--text-primary) !important;
}
body.light-theme .choices__list--dropdown {
    background: #ffffff !important;
    border-color: rgba(0,0,0,0.1) !important;
}
body.light-theme .choices__list--dropdown .choices__item {
    color: #1a1a1a !important;
}
body.light-theme .choices__list--dropdown .choices__item--selectable.is-highlighted {
    background: rgba(128,0,0,0.08) !important;
}
body.light-theme .choices__list--dropdown .choices__input {
    background: rgba(0,0,0,0.04) !important;
    border: 1px solid rgba(128,0,0,0.2) !important;
    color: #1a1a1a !important;
}
body.light-theme .choices__list--dropdown .choices__input:focus {
    border-color: #800000 !important;
    box-shadow: 0 0 0 3px rgba(128,0,0,0.1) !important;
}
body.light-theme .choices__placeholder { color: #999999 !important; }

/* ============================================================
   COMMON STYLES
   ============================================================ */
.theme-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 10000;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    border-radius: 50px;
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    gap: 8px;
}
.theme-toggle:hover { background: rgba(255,215,0,0.15); transform: scale(1.05); border-color: var(--gold); }
.theme-toggle i { font-size: 16px; color: var(--gold); transition: var(--transition); }
.theme-toggle .theme-label { font-size: 10px; font-weight: 600; color: var(--text-muted); display: none; }
@media(min-width: 480px) { .theme-toggle .theme-label { display: inline; } }

.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 1;
}

.register-container { position: relative; z-index: 2; width: 100%; display: flex; justify-content: center; animation: fadeInUp 0.6s ease; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

.register-box {
    width: 100%; max-width: 480px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-color);
    backdrop-filter: blur(20px);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-card), var(--shadow-glow);
    position: relative;
}
.register-box::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(255,215,0,0.03) 0%, transparent 70%);
    pointer-events: none;
}

.logo { width: 100%; height: 120px; object-fit: cover; display: block; background: var(--bg-primary); }
.content { padding: 24px 28px 28px; position: relative; z-index: 1; }

h1 {
    text-align: center; font-size: 24px; font-weight: 800;
    background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 4px; letter-spacing: -0.5px;
}
.sub-text { text-align: center; color: var(--text-muted); font-size: 11px; margin-bottom: 22px; font-weight: 400; }

/* ============================================================
   REGISTER OPTIONS (Segmented Control)
   ============================================================ */
.register-options {
    display: flex; gap: 6px; margin-bottom: 22px;
    background: rgba(255,255,255,0.04);
    border-radius: 14px; padding: 4px;
    border: 1px solid var(--border-color);
}
.register-option {
    flex: 1; text-align: center; padding: 10px 8px; border: none; border-radius: 11px;
    cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all var(--transition);
    background: transparent; color: var(--text-muted);
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
}
.register-option i { font-size: 14px; transition: var(--transition); }
.register-option:hover { color: var(--gold); }
.register-option.active {
    background: var(--gold-gradient); color: #0A0A0A; box-shadow: 0 4px 15px rgba(255,215,0,0.3);
}
.register-option.active i { color: #0A0A0A; }

/* ============================================================
   INPUT FIELDS
   ============================================================ */
.input-box { width: 100%; margin-bottom: 16px; position: relative; }
.input-box input {
    width: 100%; height: 50px; border: none; outline: none; padding: 0 14px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border-color);
    color: var(--text-primary);
    font-size: 13px;
    transition: all var(--transition);
    font-family: var(--font);
}
.input-box input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(255,215,0,0.1);
    background: rgba(255,255,255,0.06);
}
.input-box input::placeholder { color: var(--text-muted); font-size: 12px; }

.password-box .toggle-password {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 14px; cursor: pointer; transition: var(--transition);
}
.password-box .toggle-password:hover { color: var(--gold); }

/* ============================================================
   PHONE CONTAINER
   ============================================================ */
.phone-container { display: flex; gap: 10px; margin-bottom: 12px; }
.country-code-select { width: 150px; flex-shrink: 0; }
.country-code-select .choices__inner { height: 50px; border-radius: var(--radius-sm); padding: 8px 12px; display: flex; align-items: center; }
.phone-number-input { flex: 1; }
.phone-number-input input {
    width: 100%; height: 50px; border: none; outline: none; padding: 0 14px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border-color);
    color: var(--text-primary);
    font-size: 13px;
    transition: all var(--transition);
}
.phone-number-input input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(255,215,0,0.1);
}
.phone-hint { font-size: 9px; color: var(--text-muted); margin-top: 4px; padding-left: 4px; transition: var(--transition); }
.phone-hint.active { color: var(--gold); }

/* ============================================================
   TERMS
   ============================================================ */
.terms-area { display: flex; align-items: flex-start; gap: 10px; margin: 18px 0 20px; }
.checkbox-container { position: relative; width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; }
.checkbox-container input {
    position: absolute; opacity: 0; cursor: pointer; width: 20px; height: 20px; z-index: 2; margin: 0;
}
.checkmark {
    position: absolute; top: 0; left: 0; width: 20px; height: 20px;
    border-radius: 6px; background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border-color);
    transition: all var(--transition);
    pointer-events: none;
}
.checkbox-container input:checked + .checkmark { background: var(--gold); border-color: var(--gold); }
.checkbox-container input:checked + .checkmark::after {
    content: "✓"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 12px; font-weight: 700; color: #0A0A0A;
}
.terms-text { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
.terms-text a { color: var(--gold); text-decoration: none; font-weight: 600; transition: var(--transition); }
.terms-text a:hover { color: var(--gold-dark); text-decoration: underline; }

/* ============================================================
   REGISTER BUTTON
   ============================================================ */
.register-btn {
    width: 100%; height: 52px; border: none; outline: none; border-radius: var(--radius-sm);
    background: var(--gold-gradient); color: #0A0A0A;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all var(--transition);
    box-shadow: 0 4px 20px rgba(255,215,0,0.25);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    position: relative; overflow: hidden;
    font-family: var(--font);
}
.register-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,215,0,0.4); }
.register-btn:active { transform: scale(0.98); }
.register-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.register-btn .spinner {
    width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.1); border-top-color: #0A0A0A;
    border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.google-btn { background: linear-gradient(135deg, #DB4437, #C23321) !important; color: white !important; box-shadow: 0 4px 20px rgba(219,68,55,0.3) !important; }
.google-btn:hover { box-shadow: 0 6px 30px rgba(219,68,55,0.5) !important; }
.google-btn i { font-size: 18px; }

.bottom-text { text-align: center; margin-top: 18px; font-size: 11px; color: var(--text-muted); }
.bottom-text a { color: var(--gold); text-decoration: none; font-weight: 700; transition: var(--transition); }
.bottom-text a:hover { text-decoration: underline; }

/* ============================================================
   NOTIFICATION
   ============================================================ */
.notification {
    position: fixed; top: 80px; right: 25px; min-width: 280px; max-width: 380px;
    padding: 14px 18px; border-radius: var(--radius-sm);
    display: flex; align-items: center; gap: 12px;
    z-index: 99999; backdrop-filter: blur(20px);
    background: rgba(18,18,18,0.95); border: 1px solid var(--border-color);
    box-shadow: var(--shadow-card);
    animation: slideInRight 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    border-left: 4px solid;
}
.notification.success { border-left-color: #0ECB81; }
.notification.success i { color: #0ECB81; }
.notification.error { border-left-color: #F6465D; }
.notification.error i { color: #F6465D; }
.notification.info { border-left-color: var(--gold); }
.notification.info i { color: var(--gold); }
.notification i { font-size: 20px; flex-shrink: 0; }
.notification .message { flex: 1; font-size: 12px; line-height: 1.4; color: var(--text-primary); font-weight: 500; }
.notification .close-notif { cursor: pointer; opacity: 0.5; transition: var(--transition); font-size: 14px; color: var(--text-muted); }
.notification .close-notif:hover { opacity: 1; color: var(--text-primary); }
@keyframes slideInRight { from { opacity: 0; transform: translateX(100%) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes fadeOut { from { opacity: 1; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(100%) scale(0.95); } }

/* ============================================================
   OTP MODAL
   ============================================================ */
.otp-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
    z-index: 999999; display: none; align-items: center; justify-content: center; padding: 20px;
    animation: modalFadeIn 0.3s ease;
}
.otp-modal.active { display: flex; }
@keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.otp-modal-content {
    background: var(--bg-card); border-radius: var(--radius);
    max-width: 420px; width: 100%; padding: 32px 28px;
    border: 1px solid var(--border-color); text-align: center;
    box-shadow: var(--shadow-card);
    position: relative; overflow: hidden;
}
.otp-modal-content .otp-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,215,0,0.12);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
}
.otp-modal-content .otp-icon i { font-size: 28px; color: var(--gold); }
.otp-modal-content h3 { color: var(--gold); font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.otp-modal-content p { color: var(--text-muted); font-size: 12px; margin-bottom: 24px; }
.otp-modal-content p strong { color: var(--text-primary); }

.otp-input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
.otp-input-group input {
    width: 48px; height: 56px; text-align: center; font-size: 22px; font-weight: 700;
    border-radius: var(--radius-xs);
    background: rgba(255,255,255,0.04);
    border: 2px solid var(--border-color);
    color: var(--text-primary);
    outline: none;
    transition: all var(--transition);
    font-family: var(--font);
}
.otp-input-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(255,215,0,0.1);
    transform: translateY(-2px);
}
.otp-input-group input:disabled { opacity: 0.3; cursor: not-allowed; }
.otp-input-group input.error { border-color: #F6465D; animation: shake 0.3s ease; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.otp-actions { display: flex; gap: 12px; }
.otp-actions button { flex: 1; padding: 12px; border: none; border-radius: var(--radius-xs); font-weight: 700; cursor: pointer; transition: all var(--transition); font-size: 13px; font-family: var(--font); }
.otp-actions .otp-verify { background: var(--gold-gradient); color: #0A0A0A; box-shadow: 0 4px 20px rgba(255,215,0,0.25); }
.otp-actions .otp-verify:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,215,0,0.4); }
.otp-actions .otp-verify:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.otp-actions .otp-cancel { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid var(--border-color); }
.otp-actions .otp-cancel:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

.otp-resend { margin-top: 16px; font-size: 11px; color: var(--text-muted); }
.otp-resend button { background: none; border: none; color: var(--gold); cursor: pointer; font-weight: 600; transition: var(--transition); font-family: var(--font); font-size: 11px; }
.otp-resend button:hover { text-decoration: underline; }
.otp-resend button:disabled { opacity: 0.4; cursor: not-allowed; text-decoration: none; }
.otp-resend .timer { color: var(--gold); font-weight: 600; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width: 480px) {
    body { padding: 10px; }
    .content { padding: 18px 16px 20px; }
    h1 { font-size: 20px; }
    .register-box { max-width: 100%; border-radius: var(--radius-sm); }
    .logo { height: 90px; }
    .input-box input { height: 46px; font-size: 12px; }
    .phone-container { flex-direction: column; gap: 6px; }
    .country-code-select { width: 100%; }
    .country-code-select .choices__inner { height: 46px; }
    .register-btn { height: 48px; font-size: 13px; }
    .otp-input-group input { width: 40px; height: 48px; font-size: 18px; }
    .otp-modal-content { padding: 24px 16px; }
    .notification { right: 10px; left: 10px; min-width: auto; max-width: none; top: 70px; }
    .theme-toggle { top: 12px; right: 12px; padding: 8px 10px; }
    .theme-toggle .theme-label { display: none; }
    .register-option { padding: 6px 4px; font-size: 9px; }
    .register-option i { font-size: 14px; }
}
@media(max-width: 360px) {
    .content { padding: 14px 12px 16px; }
    h1 { font-size: 18px; }
    .register-option { font-size: 8px; padding: 4px 2px; }
    .register-option i { font-size: 12px; }
    .otp-input-group { gap: 6px; }
    .otp-input-group input { width: 34px; height: 42px; font-size: 16px; }
}
</style>
</head>
<body>

<div class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun" id="sunIcon"></i>
    <i class="fas fa-moon" id="moonIcon" style="display:none;"></i>
    <span class="theme-label" id="themeLabel">Light</span>
</div>

<div class="overlay"></div>

<div class="register-container">
    <div class="register-box">
        <img src="../assets/images/logo.png" alt="ABOTRA-PROAI" class="logo" onerror="this.src='https://placehold.co/480x120/800000/FFD700?text=ABOTRA-PROAI'">
        <div class="content">
            <h1>Create Account</h1>
            <p class="sub-text">Join ABOTRA-PROAI &amp; start earning with AI Robots</p>

            <div class="register-options">
                <div class="register-option active" data-method="email"><i class="fas fa-envelope"></i><span class="opt-label">Email</span></div>
                <div class="register-option" data-method="phone"><i class="fas fa-phone"></i><span class="opt-label">Phone</span></div>
                <div class="register-option" data-method="google"><i class="fab fa-google"></i><span class="opt-label">Google</span></div>
            </div>

            <!-- EMAIL SECTION -->
            <div id="emailSection">
                <div class="input-box"><input type="text" id="fullName" placeholder="Full Name" autocomplete="name"></div>
                <div class="input-box"><input type="text" id="username" placeholder="Username" autocomplete="username"></div>
                <div class="input-box"><input type="email" id="email" placeholder="Email Address" autocomplete="email"></div>
                <div class="input-box password-box">
                    <input type="password" id="password" placeholder="Password (min 8 characters)" autocomplete="new-password">
                    <i class="fas fa-eye-slash toggle-password" id="togglePassword"></i>
                </div>
                <div class="input-box" id="emailCountryContainer">
                    <select id="emailCountry"></select>
                </div>
            </div>

            <!-- PHONE SECTION -->

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const label = document.getElementById('themeLabel');
    if (saved === 'light') {

        sunIcon.style.display = 'none';

        label.textContent = 'Dark';

        moonIcon.style.display = 'none';

// ============================================================

// ============================================================
function showNotification(msg, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    const iconMap = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
    };
    notif.innerHTML = `
        <i class="fas ${iconMap[type] || 'fa-info-circle'}"></i>
        <div class="message">${msg}</div>
        <div class="close-notif"><i class="fas fa-times"></i></div>
    `;
    document.body.appendChild(notif);
    notif.querySelector('.close-notif').onclick = () => {
        notif.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => notif.remove(), 300);
    };
    setTimeout(() => {
        if (notif.parentNode) {
            notif.style.animation = 'fadeOut 0.3s ease';
            setTimeout(() => notif.remove(), 300);
        }
    }, 5000);
}

// ============================================================
// AUTO-DETECT COUNTRY
// ============================================================
async function autoDetectCountry() {
    try {
        const res = await fetch('https://ipapi.co/json/');
        if (res.ok) {
            const data = await res.json();
            const matched = countriesData.find(c =>
                c.name.toLowerCase() === data.country_name?.toLowerCase() ||
                c.iso === data.country_code?.toUpperCase()
            );
            if (matched) { setSelectedCountry(matched); return; }
        }
    } catch (e) {}

    try {
        const locale = navigator.language || navigator.languages?.[0] || 'en-US';
        const parts = locale.split('-');
        if (parts.length > 1) {
            const code = parts[1].toUpperCase();
            const matched = countriesData.find(c => c.iso === code);
            if (matched) { setSelectedCountry(matched); return; }
        }
    } catch (e) {}

    try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const matched = countriesData.find(c => c.timezone === tz);
        if (matched) { setSelectedCountry(matched); return; }
    } catch (e) {}

    const defaultCountry = countriesData.find(c => c.code === '+255');
    if (defaultCountry) setSelectedCountry(defaultCountry);
}

function setSelectedCountry(country) {
    if (!country) return;
    selectedCountry = country;
    if (emailCountryChoices) emailCountryChoices.setChoiceByValue(country.code);
    if (phoneCountryChoices) phoneCountryChoices.setChoiceByValue(country.code);
    updatePhoneHint(country);
}

// ============================================================
// STATIC REFERRAL CODE GENERATION
// ============================================================
function generateStaticReferralCode(uid) {
    // Static: uses uid to generate deterministic code
    const prefix = 'ABOTRA';
    const uidPart = uid.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 6);
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let suffix = '';
    for (let i = 0; i < 3; i++) {
        suffix += chars.charAt(parseInt(uidPart[i] || '0', 36) % chars.length);
    }
    return prefix + uidPart + suffix;
}

// ============================================================
// SAVE USER TO FIREBASE (with static referral code)
// ============================================================
async function saveUserToFirebase(user, userData) {
    const userRef = ref(rtdb, `users/${user.uid}`);
    
    // Generate static referral code (based on uid, never changes)
    let referralCode = generateStaticReferralCode(user.uid);
    
    // Ensure code is unique
    let attempts = 0;
    while (await checkReferralCodeExists(referralCode) && attempts < 10) {
        referralCode = generateStaticReferralCode(user.uid + '_' + attempts);
        attempts++;
    }
    
    await set(userRef, {
        uid: user.uid,
        email: user.email || null,
        username: userData.username.toLowerCase(),
        fullName: userData.fullName,
        country: userData.country || selectedCountry?.name || 'Tanzania',
        countryCode: userData.countryCode || selectedCountry?.code || '+255',
        phone: userData.phone || null,
        referralCode: referralCode,
        referredBy: userData.referredBy || null,
        balance: 0,
        totalDeposited: 0,
        totalWithdrawn: 0,
        isVerified: false,
        isActive: true,
        createdAt: Date.now(),
        updatedAt: Date.now()
    });
    
    // Store referral code index
    await set(ref(rtdb, `referrals/${referralCode}`), {
        uid: user.uid,
        username: userData.username.toLowerCase(),
        createdAt: Date.now()
    });
    
    // Store username lookup
    await set(ref(rtdb, `usernames/${userData.username.toLowerCase()}`), { 
        uid: user.uid, 
        username: userData.username.toLowerCase() 
    });
    
    if (user.email) {
        const emailHash = await hashString(user.email.toLowerCase());
        await set(ref(rtdb, `emails/${emailHash}`), { 
            uid: user.uid, 
            email: user.email.toLowerCase() 
        });
    }
    
    return referralCode;
}

async function hashString(str) {
    const encoder = new TextEncoder();
    const data = encoder.encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// HANDLE REFERRAL
// ============================================================
async function handleReferral(newUserId) {
    if (!referredByCode) return;
    try {
        const referralRef = ref(rtdb, `referrals/${referredByCode}`);
        const snap = await get(referralRef);
        if (!snap.exists()) {
            console.log('[REFERRAL] Invalid referral code:', referredByCode);
            return;
        }
        const referrerData = snap.val();
        const referrerUid = referrerData.uid;
        
        await runTransaction(ref(rtdb, `users/${referrerUid}/referrals`), (current) => {
            if (!current) current = { count: 0, list: [] };
            current.count = (current.count || 0) + 1;
            if (!current.list) current.list = [];
            current.list.push({
                userId: newUserId,
                joinedAt: Date.now(),
                referralCode: referredByCode
            });
            return current;
        });
        
        const refListRef = push(ref(rtdb, `referralHistory`));
        await set(refListRef, {
            referrer: referrerUid,
            referred: newUserId,
            referralCode: referredByCode,
            date: Date.now()
        });
        console.log('[REFERRAL] Recorded successfully');
    } catch (e) {
        console.error('[REFERRAL] Error:', e);
    }
}

        showNotification('All fields are required', 'error');
        return;
    }
    if (password.length < 8) {
        showNotification('Password must be at least 8 characters', 'error');
        return;
    }
    if (!validatePassword(password)) {
        showNotification('Password must contain uppercase, lowercase, number and special character', 'error');
        return;
    }

    const btn = registerBtn;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating Account...';

    try {
        // Check username
        const usernameRef = ref(rtdb, `usernames/${username}`);
        const usernameSnap = await get(usernameRef);
        if (usernameSnap.exists()) {
            throw new Error('Username already taken');
        }
        
        // Check email with hash
        const emailHash = await hashString(email);
        const emailRef = ref(rtdb, `emails/${emailHash}`);
        const emailSnap = await get(emailRef);
        if (emailSnap.exists()) {
            throw new Error('Email already registered');
        }

        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        await updateProfile(user, { displayName: fullName });
        
        const referralCode = await saveUserToFirebase(user, {
            fullName,
            username,
            country: country.name,
            countryCode: country.code,
            referredBy: referredByCode || null,
            phone: null
        });
        
        await handleReferral(user.uid);
        await sendEmailVerification(user);
        
        showNotification(`✅ Account created! Your referral code: ${referralCode}. Please verify your email.`, 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 4000);

    } catch (error) {
        console.error('[REGISTER] Error:', error);
        let message = error.message;
        if (error.code === 'auth/email-already-in-use') message = 'Email already registered';
        else if (error.code === 'auth/weak-password') message = 'Password too weak';
        else if (error.code === 'auth/operation-not-allowed') message = 'Email/password accounts are not enabled';
        showNotification(message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Register with Email';
    }
}

    const phoneNumber = document.getElementById('phoneNumber').value.trim();
    const password = document.getElementById('phonePassword').value;
    const countryCode = document.getElementById('phoneCountryCode').value;
    const country = countriesData.find(c => c.code === countryCode);

    if (!fullName || !username || !phoneNumber || !password || !country) {
        showNotification('All fields are required', 'error');
        return;
    }
    if (password.length < 8) {
        showNotification('Password must be at least 8 characters', 'error');
        return;
    }
    if (!validatePassword(password)) {
        showNotification('Password must contain uppercase, lowercase, number and special character', 'error');
        return;
    }
    if (phoneNumber.length < country.digits) {
        showNotification(`Phone number must have ${country.digits} digits`, 'error');
        return;
    }

    const btn = registerBtn;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sending OTP...';

    try {
        // Check username
        const usernameRef = ref(rtdb, `usernames/${username}`);
        const usernameSnap = await get(usernameRef);
        if (usernameSnap.exists()) {
            throw new Error('Username already taken');
        }

        if (!recaptchaVerifier) {
            recaptchaVerifier = new RecaptchaVerifier(auth, 'registerBtn', {
                size: 'invisible',
                callback: () => console.log("[RECAPTCHA] Resolved")
            });
            await recaptchaVerifier.render();
        }

        const fullPhoneNumber = countryCode + phoneNumber;
        const confirmation = await signInWithPhoneNumber(auth, fullPhoneNumber, recaptchaVerifier);
        phoneConfirmation = confirmation;
        
        window._pendingPhoneRegistration = {
            fullName, username, country, countryCode, phoneNumber, fullPhoneNumber, password
        };
        
        showOtpModal(fullPhoneNumber);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-phone"></i> Register with Phone';

    } catch (error) {
        console.error('[PHONE] Error:', error);
        let message = error.message;
        if (error.code === 'auth/invalid-phone-number') message = 'Invalid phone number';
        else if (error.code === 'auth/too-many-requests') message = 'Too many attempts. Try again later';
        showNotification(message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-phone"></i> Register with Phone';
    }
}

// ============================================================
// OTP MODAL
// ============================================================
function showOtpModal(phoneNumber) {
    const modal = document.getElementById('otpModal');
    document.getElementById('otpPhoneDisplay').textContent = phoneNumber;
    modal.classList.add('active');
    
    const inputs = document.querySelectorAll('#otpInputGroup input');
    inputs.forEach((input, index) => {
        input.value = '';
        input.disabled = false;
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < 5) {
                inputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
            }
            if (e.key === 'Enter') {
                document.getElementById('otpVerifyBtn').click();
            }
        });
        // Paste support
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData('text');
            const digits = paste.replace(/\D/g, '').slice(0, 6);
            digits.split('').forEach((d, i) => {
                if (i < 6) inputs[i].value = d;
            });
            if (digits.length === 6) {
                inputs[5].focus();
                document.getElementById('otpVerifyBtn').click();
            } else if (digits.length > 0) {
                inputs[Math.min(digits.length, 5)].focus();
            }
        });
    });
    inputs[0].focus();
}

function hideOtpModal() {
    document.getElementById('otpModal').classList.remove('active');
    phoneConfirmation = null;
}

async function verifyOtp() {
    if (otpVerificationInProgress) return;
    
    const inputs = document.querySelectorAll('#otpInputGroup input');
    const otp = Array.from(inputs).map(inp => inp.value).join('');
    
    if (otp.length !== 6) {
        showNotification('Please enter 6-digit code', 'error');
        return;
    }
    
    otpVerificationInProgress = true;
    const verifyBtn = document.getElementById('otpVerifyBtn');
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<span class="spinner"></span> Verifying...';
    
    try {
        if (!phoneConfirmation) {
            throw new Error('No verification in progress');
        }
        
        const result = await phoneConfirmation.confirm(otp);
        const user = result.user;
        
        const pending = window._pendingPhoneRegistration || {};
        await updateProfile(user, { displayName: pending.fullName || 'User' });
        
        await saveUserToFirebase(user, {
            fullName: pending.fullName || 'User',
            username: pending.username || 'user' + Date.now(),
            country: pending.country?.name || 'Tanzania',
            countryCode: pending.countryCode || '+255',
            phone: pending.fullPhoneNumber || '',
            referredBy: referredByCode || null
        });
        
        await handleReferral(user.uid);
        hideOtpModal();
        showNotification('✅ Account created successfully!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        
    } catch (error) {
        console.error('[OTP] Error:', error);
        let message = error.message;
        if (error.code === 'auth/invalid-verification-code') {
            message = 'Invalid OTP code. Please try again.';
        }
        showNotification(message, 'error');
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = 'Verify';
    } finally {
        otpVerificationInProgress = false;
    }
}

async function resendOtp() {
    if (otpResendCount >= 3) {
        showNotification('Maximum resend attempts reached. Please try again later.', 'error');
        return;
    }
    
    const resendBtn = document.getElementById('otpResendBtn');
    resendBtn.disabled = true;
    
    try {
        if (!phoneConfirmation) {
            throw new Error('No verification in progress');
        }
        const pending = window._pendingPhoneRegistration || {};
        const fullPhoneNumber = pending.fullPhoneNumber || '';
        const confirmation = await signInWithPhoneNumber(auth, fullPhoneNumber, recaptchaVerifier);
        phoneConfirmation = confirmation;
        otpResendCount++;
        showNotification('📱 New OTP sent!', 'info');
        
        let seconds = 30;
        const timerSpan = document.getElementById('otpTimer');
        timerSpan.textContent = ` (${seconds}s)`;
        const interval = setInterval(() => {
            seconds--;
            timerSpan.textContent = ` (${seconds}s)`;
            if (seconds <= 0) {
                clearInterval(interval);
                timerSpan.textContent = '';
                resendBtn.disabled = false;
            }
        }, 1000);
        
    } catch (error) {
        console.error('[OTP] Resend error:', error);
        showNotification('Failed to resend OTP. Try again.', 'error');
        resendBtn.disabled = false;
    }
}

// ============================================================
// GOOGLE REGISTRATION - Using signInWithRedirect for Android/WebView
// ============================================================
document.getElementById('googleSignUpBtn')?.addEventListener('click', async () => {
    if (!termsCheckbox.checked) {
        showNotification('Please accept Terms & Conditions', 'error');
        return;
    }

    const provider = new GoogleAuthProvider();
    const btn = document.getElementById('googleSignUpBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Connecting...';

    try {
        // Use signInWithRedirect for better Android/WebView compatibility
        await signInWithRedirect(auth, provider);
        // The redirect will take the user to Google, then back to the app
        // The result will be handled by onAuthStateChanged below
        isGoogleRedirect = true;
        showNotification('Redirecting to Google...', 'info');
    } catch (err) {
        console.error("[GOOGLE] Redirect error:", err);
        // Fallback to popup if redirect fails
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            await handleGoogleUser(user);
        } catch (popupErr) {
            console.error("[GOOGLE] Popup error:", popupErr);
            showNotification('Google signup failed: ' + popupErr.message, 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
        }
    }
});

// Handle Google user after redirect or popup
async function handleGoogleUser(user) {
    if (!user) return;
    console.log("[GOOGLE] User:", user.uid);

    const userRef = ref(rtdb, `users/${user.uid}`);
    const userSnap = await get(userRef);
    
    if (!userSnap.exists()) {
        let username = user.email.split('@')[0].toLowerCase();
        // Check if username exists
        const usernameRef = ref(rtdb, `usernames/${username}`);
        const usernameSnap = await get(usernameRef);
        if (usernameSnap.exists()) {
            username = username + Math.floor(Math.random() * 1000);
        }
        
        await saveUserToFirebase(user, {
            fullName: user.displayName || user.email.split('@')[0],
            username: username,
            country: selectedCountry?.name || 'Tanzania',
            countryCode: selectedCountry?.code || '+255',
            referredBy: referredByCode || null,
            phone: null
        });
        
        await handleReferral(user.uid);
    }

    showNotification(`✅ Welcome ${user.displayName || 'User'}!`, 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
}

// ============================================================
// PASSWORD VALIDATION
// ============================================================
function validatePassword(password) {
    const hasUpperCase = /[A-Z]/.test(password);
    const hasLowerCase = /[a-z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    return hasUpperCase && hasLowerCase && hasNumber && hasSpecial;
}

// ============================================================
// METHOD SWITCHING
// ============================================================
document.querySelectorAll('.register-option').forEach(opt => {
    opt.addEventListener('click', function() {
        document.querySelectorAll('.register-option').forEach(o => o.classList.remove('active'));
        this.classList.add('active');
        const method = this.dataset.method;
        document.getElementById('emailSection').style.display = 'none';
        document.getElementById('phoneSection').style.display = 'none';
        document.getElementById('googleSection').style.display = 'none';

        const btn = registerBtn;
        if (method === 'email') {
            document.getElementById('emailSection').style.display = 'block';
            btn.style.display = 'flex';
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Register with Email';
            btn.onclick = registerWithEmail;
        } else if (method === 'phone') {
            document.getElementById('phoneSection').style.display = 'block';
            btn.style.display = 'flex';
            btn.innerHTML = '<i class="fas fa-phone"></i> Register with Phone';
            btn.onclick = registerWithPhone;
        } else {
            document.getElementById('googleSection').style.display = 'block';
            btn.style.display = 'none';
        }
    });
});

document.getElementById('otpVerifyBtn').addEventListener('click', verifyOtp);
document.getElementById('otpCancelBtn').addEventListener('click', () => {
    hideOtpModal();

    btn.disabled = false;

// ============================================================
registerBtn.onclick = registerWithEmail;
initTheme();

setTimeout(() => {
    initCountryDropdowns();
    setTimeout(autoDetectCountry, 500);
}, 100);

// Handle Google redirect result
onAuthStateChanged(auth, async (user) => {
    if (user && window.location.pathname.includes('register.html')) {
        // If this was a Google redirect, handle the user
        if (isGoogleRedirect || sessionStorage.getItem('google_redirect')) {
            sessionStorage.removeItem('google_redirect');
            await handleGoogleUser(user);
        } else {
            // Already logged in, redirect to dashboard
            window.location.href = 'dashboard.html';
        }
    }
});

// If coming back from Google redirect, set flag
if (document.referrer && document.referrer.includes('google')) {
    sessionStorage.setItem('google_redirect', 'true');
}
