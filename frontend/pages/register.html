/* LIGHT THEME */

}

body.light-theme .overlay {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
}

body.light-theme .register-box {
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.08);
}

body.light-theme .input-box input,
body.light-theme .input-box select {
    background: rgba(0,0,0,0.04);

    color: #1a1a1a;
}

body.light-theme .input-box input::placeholder {

}

body.light-theme .sub-text {
    color: #666666;
}

body.light-theme .terms-text {
    color: #555555;
}

body.light-theme .terms-text a {
    color: #800000;
}

body.light-theme .bottom-text {

}

body.light-theme .bottom-text a {
    color: #800000;
}

body.light-theme .register-option {

    color: #1a1a1a;
}

body.light-theme .register-option:hover {
    background: rgba(128,0,0,0.08);

}

body.light-theme .register-option.active {

    color: white;
}

/* THEME TOGGLE BUTTON */
.theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50px;
    padding: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    z-index: 10000;
}

.theme-toggle:hover {
    background: rgba(255,215,0,0.2);
    transform: scale(1.05);
}

.theme-toggle i {
    font-size: 18px;
    color: #FFD700;
}

body.light-theme .theme-toggle {
    background: rgba(0,0,0,0.1);
    border-color: rgba(128,0,0,0.3);
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(4px);
    z-index: 1;
}

.register-container {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    justify-content: center;
}

.register-box {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.logo {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
}

.content {
    padding: 18px 22px 24px;
}

h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: #FFD700;
    margin-bottom: 5px;
}

.sub-text {
    text-align: center;
    color: #BBBBBB;
    font-size: 11px;
    margin-bottom: 18px;
}

.register-options {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.2);
    border-radius: 50px;
    padding: 4px;
}

.register-option {
    flex: 1;
    text-align: center;
    padding: 10px 6px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: 0.3s;
    background: transparent;
    color: #CCCCCC;
}

.register-option:hover {
    background: rgba(255,215,0,0.15);
    color: #FFD700;
}

.register-option.active {
    background: linear-gradient(135deg, #800000, #FFD700);
    color: #FFFFFF;
}

.input-box {
    width: 100%;
    margin-bottom: 12px;
    position: relative;
}

.input-box input,
.input-box select {
    width: 100%;
    height: 46px;
    border: none;
    outline: none;
    padding: 0 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #FFFFFF;
    font-size: 12px;
    transition: 0.3s;
}

.input-box input:focus,
.input-box select:focus {
    border-color: #FFD700;
    box-shadow: 0 0 8px rgba(255,215,0,0.2);
}

.input-box input::placeholder {
    color: #999999;
    font-size: 11px;
}

.input-box select {
    color: #CCCCCC;
    font-size: 12px;
    cursor: pointer;
}

.input-box select option {
    background: #1a1a1a;
    color: #FFFFFF;
}

/* Phone container styling */
.phone-container {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
}

.country-code-select {
    width: 110px;
    flex-shrink: 0;
}

.country-code-select select {

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);

.country-code-select select:focus {

}

.country-code-select select option {

}

.phone-number-input {

.phone-number-input input {

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #FFFFFF;
    font-size: 12px;

}

.phone-number-input input:focus {
    border-color: #FFD700;
    box-shadow: 0 0 8px rgba(255,215,0,0.2);
}

.phone-hint {
    font-size: 9px;
    color: #888;
    margin-top: 4px;
    padding-left: 10px;
}

/* Password icon */
.password-box i {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #FFD700;
    font-size: 14px;
    cursor: pointer;
}

.terms-area {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 18px;
}

.checkbox-container {
    position: relative;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
}

.checkbox-container input {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    width: 18px;
    height: 18px;
    z-index: 2;
    margin: 0;
}

.checkmark {
    position: absolute;
    top: 0;
    left: 0;
    width: 18px;
    height: 18px;
    border-radius: 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s;
    pointer-events: none;
}

.checkbox-container input:checked + .checkmark {
    background: #FFD700;
    border-color: #FFD700;
}

.checkbox-container input:checked + .checkmark::after {
    content: "✓";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    font-weight: bold;
    color: #000000;
}

.terms-text {
    font-size: 11px;
    color: #CCCCCC;
    line-height: 1.4;
    cursor: pointer;
}

.terms-text a {
    color: #FFFFFF;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.terms-text a:hover {
    color: #FFD700;
}

.register-btn {

    height: 48px;
    border: none;
    outline: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #800000, #FFD700);

.register-btn:hover {

}

.register-btn:disabled {

.bottom-text {

    font-size: 11px;
    color: #BBBBBB;

.bottom-text a {

    text-decoration: none;
    font-weight: 700;

    top: 80px;
    right: 25px;
    min-width: 280px;
    max-width: 380px;
    padding: 12px 16px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 99999;
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    animation: slideInRight 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    border-left: 4px solid;
}

.notification.success {
    background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,255,136,0.08));
    border-left-color: #00FF88;
}

.notification.success i {
    color: #00FF88;
}

.notification.error {
    background: linear-gradient(135deg, rgba(255,77,77,0.15), rgba(255,77,77,0.08));
    border-left-color: #FF4D4D;
}

.notification.error i {
    color: #FF4D4D;
}

.notification.info {
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.08));
    border-left-color: #FFD700;
}

.notification.info i {
    color: #FFD700;
}

.notification i {
    font-size: 20px;
}

.notification .message {
    flex: 1;
    font-size: 12px;
    line-height: 1.4;
    color: #FFFFFF;
    font-weight: 500;
}

.notification .close-notif {
    cursor: pointer;
    opacity: 0.7;
    transition: 0.3s;
    font-size: 13px;
}

.notification .close-notif:hover {
    opacity: 1;
}

@keyframes slideInRight {
    from {
        opacity: 0;
        transform: translateX(100%);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes fadeOut {
    from {
        opacity: 1;
        transform: translateX(0);
    }
    to {
        opacity: 0;
        transform: translateX(100%);
    }
}

@media(max-width: 480px) {
    .logo {

    .theme-toggle {

        padding: 8px;

    .register-option {

    .country-code-select {

        height: 42px;
    }
    .country-code-select select {
        height: 42px;
    }
    .terms-text {
        font-size: 10px;
    }
    .register-btn {
        height: 44px;
        font-size: 12px;
    }
}

function populateCountryDropdowns() {
    const countrySelect = document.getElementById('country');
    const phoneCodeSelect = document.getElementById('phoneCountryCode');
    const sorted = [...countriesData].sort((a, b) => a.name.localeCompare(b.name));
    sorted.forEach(c => {
        const option1 = new Option(`${c.flag} ${c.name} (${c.code})`, c.name);
        countrySelect.appendChild(option1);
        const option2 = new Option(`${c.flag} ${c.name} (${c.code})`, c.name);
        phoneCodeSelect.appendChild(option2);
    });
}
populateCountryDropdowns();

// Phone digit validation and hint
const phoneCountrySelect = document.getElementById('phoneCountryCode');
const phoneInput = document.getElementById('phoneNumber');
const phoneHint = document.getElementById('phoneHint');

function updatePhoneHint() {
    const selectedText = phoneCountrySelect.options[phoneCountrySelect.selectedIndex]?.text || '';
    const matched = countriesData.find(c => selectedText.includes(c.name));
    if (matched) {
        phoneHint.innerHTML = `${matched.flag} ${matched.name} requires ${matched.digits} digits (excluding country code)`;
        phoneHint.style.color = '#FFD700';
    } else {
        phoneHint.innerHTML = 'Select country to see required digits';
        phoneHint.style.color = '#888';
    }
}
phoneCountrySelect.addEventListener('change', updatePhoneHint);
updatePhoneHint();

// Auto-detect country
async function autoDetectCountry() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        const detectedName = data.country_name;
        const matched = countriesData.find(c => c.name === detectedName);
        if (matched) {
            const countrySelect = document.getElementById('country');
            const phoneSelect = document.getElementById('phoneCountryCode');
            for (let i = 0; i < countrySelect.options.length; i++) {
                if (countrySelect.options[i].value === matched.name) {
                    countrySelect.selectedIndex = i;
                    phoneSelect.selectedIndex = i;
                    updatePhoneHint();
                    break;
                }
            }
        }
    } catch (e) { console.log("Auto-detect failed"); }
}
autoDetectCountry();

    });

function showNotification(msg, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.innerHTML =
        `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i><div class="message">${msg}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(notif);
    setTimeout(() => { notif.style.animation = 'fadeOut 0.3s';
        setTimeout(() => notif.remove(), 300); }, 5000);
    notif.querySelector('.close-notif').onclick = () => { notif.style.animation = 'fadeOut 0.3s';
        setTimeout(() => notif.remove(), 300); };
}

// ============================================================
async function showReferralCode(userId) {
    try {
        const userRef = ref(rtdb, `users/${userId}`);
        const snapshot = await get(userRef);
        if (snapshot.exists()) {
            const userData = snapshot.val();
            const referralCode = userData.referralCode;

            if (referralCode) {
                const link = `${window.location.origin}${window.location.pathname}?ref=${referralCode}`;
                showNotification(`🔑 Your referral code: ${referralCode}`, 'success');
                setTimeout(() => {
                    showNotification(`📤 Share: ${link}`, 'info');
                }, 1000);

                localStorage.setItem('abotra_referral_code', referralCode);
                localStorage.setItem('abotra_referral_link', link);

                return referralCode;
            }
        }
        return null;
    } catch (e) {
        console.error("[REFERRAL] Error fetching referral code:", e);
        return null;
    }
}

// EMAIL REGISTRATION - VIA BACKEND API
// ============================================================
async function registerWithEmail() {
    if (!document.getElementById('termsCheckbox').checked) {
        showNotification('Please accept Terms & Conditions', 'error');
        return;
    }

    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const country = document.getElementById('country').value;

    if (!fullName || !username || !email || !password || !country) {
        showNotification('All fields are required', 'error');
        return;
    }
    if (password.length < 6) {
        showNotification('Password must be at least 6 characters', 'error');
        return;
    }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

    try {
        // ✅ CALL BACKEND API
        const response = await fetch(`${API_BASE_URL}/api/auth/register/email`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: email,
                password: password,
                fullName: fullName,
                username: username,
                country: country,
                referralCode: referredByCode
            })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
            throw new Error(data.error || 'Registration failed');
        }

        // ✅ USER CREATED - Now sign in with Firebase Auth
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        // Send verification email
        try {
            await sendEmailVerification(user);
            console.log("[EMAIL] Verification email sent");
        } catch (e) {
            console.warn("[EMAIL] Could not send verification email:", e);
        }

        showNotification(`✅ Account created! Verification email sent to ${email}.`, 'success');
        await showReferralCode(user.uid);

        setTimeout(() => { window.location.href = 'login.html'; }, 3000);

    } catch (error) {
        console.error("[EMAIL] Registration error:", error);
        showNotification(error.message || 'Registration failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Register with Email';
        btn.onclick = () => registerWithEmail();
    }
}

        console.log("[RECAPTCHA] Rendered");
    } catch (e) {
        console.warn("[RECAPTCHA] Render warning:", e);
    }
}

async function registerWithPhone() {
    if (!document.getElementById('termsCheckbox').checked) {
        showNotification('Please accept Terms & Conditions', 'error');
        return;
    }

    const fullName = document.getElementById('phoneFullName').value.trim();
    const username = document.getElementById('phoneUsername').value.trim();
    const pwd = document.getElementById('phonePassword').value;
    const countrySelect = document.getElementById('phoneCountryCode');
    const selectedText = countrySelect.options[countrySelect.selectedIndex]?.text || '';
    const matchedCountry = countriesData.find(c => selectedText.includes(c.name));
    const countryCode = matchedCountry ? matchedCountry.code : '+255';
    const phone = document.getElementById('phoneNumber').value.trim();

    if (!fullName || !username || !pwd || !phone || !countrySelect.value) {
        showNotification('All fields are required', 'error');
        return;
    }
    if (pwd.length < 6) {
        showNotification('Password must be at least 6 characters', 'error');
        return;
    }

    const digitsOnly = phone.replace(/\D/g, '');
    if (matchedCountry && digitsOnly.length !== matchedCountry.digits) {
        showNotification(`Phone number must have exactly ${matchedCountry.digits} digits for ${matchedCountry.name}`,
        'error');
        return;
    }

    const fullPhone = countryCode + phone;
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';

    try {
        await initRecaptcha();
        const confirmation = await signInWithPhoneNumber(auth, fullPhone, recaptchaVerifier);
        phoneConfirmation = confirmation;
        phoneTempData = {
            fullName,
            username,
            password: pwd,
            fullPhone,
            phoneNumber: phone,
            phoneRaw: digitsOnly,
            phoneCountryCode: countryCode,
            country: matchedCountry?.name || '',
            referralCode: referredByCode
        };

        showNotification(`OTP sent to ${fullPhone}.`, 'info');

        const otpCode = prompt("Enter the 6-digit OTP sent to your phone:");
        if (!otpCode || otpCode.length !== 6) {
            showNotification('Invalid OTP. Please try again.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-phone"></i> Register with Phone';
            btn.onclick = () => registerWithPhone();
            return;
        }

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
        const result = await phoneConfirmation.confirm(otpCode);
        const user = result.user;
        console.log("[PHONE] User verified:", user.uid);

        await updateProfile(user, { displayName: fullName });

        // ✅ SAVE USER DATA VIA BACKEND API
        // NOTE: Phone registration through backend requires custom implementation
        // For now, save directly to RTDB since user is already authenticated
        const userRef = ref(rtdb, `users/${user.uid}`);
        const existing = await get(userRef);
        
        if (!existing.exists()) {
            // Generate referral code
            const genCode = await generateUniqueReferralCode();
            await userRef.set({
                uid: user.uid,
                fullName: fullName,
                username: username,
                phone: fullPhone,
                phoneRaw: digitsOnly,
                phoneCountryCode: countryCode,
                country: phoneTempData.country,
                method: 'phone',
                emailVerified: false,
                phoneVerified: true,
                referredBy: null, // Will handle referral separately
                referralCode: genCode,
                referralCount: 0,
                commissionEarned: 0,
                depositCommissionEarned: 0,
                botProfitCommissionEarned: 0,
                affiliateWithdrawn: 0,
                balance: 0,
                tradingBalance: 0,
                totalDeposited: 0,
                totalWithdrawn: 0,
                totalProfit: 0,
                dailyPnL: 0,
                dailyLoss: 0,
                winRate: 0,
                activeTrades: 0,
                aiScore: 0,
                status: 'active',
                isVerified: false,
                isMerchant: false,
                isPhoneUser: true,
                isOnline: false,
                profilePic: null,
                registrationIP: await getUserIP(),
                userAgent: navigator.userAgent,
                createdAt: Date.now(),
                lastLogin: Date.now(),
                lastActive: Date.now(),
                kycStatus: 'none',
                subscriptionMultiplier: 1,
                subscriptionExpiry: 0
            });
            
            // Process referral
            if (referredByCode) {
                const referrerRef = ref(rtdb, `users/${referredByCode}`);
                const referrerSnap = await get(referrerRef);
                if (referrerSnap.exists()) {
                    await referrerRef.update({
                        referralCount: (referrerSnap.val().referralCount || 0) + 1
                    });
                }
            }
        }

        showNotification(`✅ Phone registration successful! Welcome ${fullName}!`, 'success');
        await showReferralCode(user.uid);
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);

    } catch (err) {
        console.error("[PHONE] Registration error:", err);
        showNotification(`Registration failed: ${err.message}`, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-phone"></i> Register with Phone';
        btn.onclick = () => registerWithPhone();
    }
}

// Generate referral code (local function for phone)
async function generateUniqueReferralCode() {
    function generateCode() {
        const timestamp = Date.now().toString(36).toUpperCase();
        const random = Math.random().toString(36).substring(2, 6).toUpperCase();
        return `ABOTRA${timestamp.slice(-4)}${random}`;
    }

    let code = generateCode();
    let attempts = 0;
    while (attempts < 50) {
        const snapshot = await get(ref(rtdb, 'users'));
        let found = false;
        if (snapshot.exists()) {
            for (const [uid, userData] of Object.entries(snapshot.val())) {
                if (userData.referralCode === code) {
                    found = true;
                    break;
                }
            }
        }
        if (!found) return code;
        code = generateCode();
        attempts++;
    }
    return `ABOTRA${Date.now().toString(36).toUpperCase().slice(-6)}`;
}

document.getElementById('googleSignUpBtn')?.addEventListener('click', async () => {
    if (!document.getElementById('termsCheckbox').checked) {
        showNotification('Please accept Terms & Conditions', 'error');
        return;
    }

    const provider = new GoogleAuthProvider();
    const btn = document.getElementById('googleSignUpBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';

    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        console.log("[GOOGLE] User signed in:", user.uid);

        const username = user.email.split('@')[0] + Math.floor(Math.random() * 1000);
        const fullName = user.displayName || user.email.split('@')[0];

        // ✅ SAVE VIA BACKEND API
        const response = await fetch(`${API_BASE_URL}/api/auth/register/google`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                uid: user.uid,
                email: user.email,
                fullName: fullName,
                username: username,
                referralCode: referredByCode
            })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
            throw new Error(data.error || 'Failed to save user data');
        }

        showNotification(`✅ Welcome ${fullName}! Your account has been created.`, 'success');
        await showReferralCode(user.uid);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);

    } catch (err) {
        console.error("[GOOGLE] Registration error:", err);
        showNotification('Google signup failed: ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
    }
});
