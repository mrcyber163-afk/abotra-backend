function initTheme() {

// ============================================================
// NOTIFICATION
// ============================================================
function showNotification(msg, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i><div class="message">${msg}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(notif);
    setTimeout(() => { notif.style.animation = 'fadeOut 0.3s'; setTimeout(() => notif.remove(), 300); }, 5000);
    notif.querySelector('.close-notif').onclick = () => { notif.style.animation = 'fadeOut 0.3s'; setTimeout(() => notif.remove(), 300); };
}

// ============================================================
// SAVE USER TO FIREBASE DATABASE
// ============================================================
async function saveUserToFirebase(user, userData) {
    const userRef = ref(rtdb, `users/${user.uid}`);
    await set(userRef, {
        uid: user.uid,
        email: user.email,
        username: userData.username,
        fullName: userData.fullName,
        country: userData.country,
        phone: userData.phone || null,
        referralCode: userData.referralCode || null,
        balance: 0,
        totalDeposited: 0,
        totalWithdrawn: 0,
        isVerified: false,
        isActive: true,
        createdAt: Date.now(),
        updatedAt: Date.now()
    });
    
    // Save username lookup
    await set(ref(rtdb, `usernames/${userData.username.toLowerCase()}`), { uid: user.uid });
    
    // Save email lookup
    await set(ref(rtdb, `emails/${user.email}`), { uid: user.uid });
}

// ============================================================
// HANDLE REFERRAL
// ============================================================
async function handleReferral(newUserId) {
    if (!referredByCode) return;
    try {
        const referralRef = ref(rtdb, `referrals/${referredByCode}`);
        const snap = await get(referralRef);
        if (snap.exists()) {
            const referrerUid = snap.val().uid;
            const newRef = push(ref(rtdb, `users/${referrerUid}/referrals`));
            await set(newRef, {
                userId: newUserId,
                joinedAt: Date.now()
            });
            // Add to global referrals
            const refListRef = push(ref(rtdb, `referralList`));
            await set(refListRef, {
                referrer: referrerUid,
                referred: newUserId,
                date: Date.now()
            });
            console.log('[REFERRAL] Recorded successfully');
        }
    } catch (e) {
        console.error('[REFERRAL] Error:', e);
    }
}

async function registerWithEmail() {

        return;

    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();

    const country = document.getElementById('country').value;

    if (!fullName || !username || !email || !password || !country) {
        showNotification('All fields are required', 'error');
        return;
    }
    if (password.length < 6) {
        showNotification('Password must be at least 6 characters', 'error');
        return;
    }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

    try {
        // Check if username already exists
        const usernameRef = ref(rtdb, `usernames/${username.toLowerCase()}`);
        const usernameSnap = await get(usernameRef);
        if (usernameSnap.exists()) {
            throw new Error('Username already taken');
        }
        
        // Check if email already exists
        const emailRef = ref(rtdb, `emails/${email}`);
        const emailSnap = await get(emailRef);
        if (emailSnap.exists()) {
            throw new Error('Email already registered');
        }

        // Create user with Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Update profile with full name
        await updateProfile(user, {
            displayName: fullName
        });
        
        // Save user to Firebase Database
        await saveUserToFirebase(user, {
            fullName,
            username,
            country,
            referralCode: referredByCode,
            phone: null
        });
        
        // Handle referral
        await handleReferral(user.uid);
        
        // Send email verification
        await sendEmailVerification(user);
        
        showNotification('✅ Account created! Please verify your email.', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);

    } catch (error) {
        console.error('[REGISTER] Error:', error);
        let message = error.message;
        if (error.code === 'auth/email-already-in-use') {
            message = 'Email already registered';
        } else if (error.code === 'auth/weak-password') {
            message = 'Password too weak';
        } else if (error.code === 'auth/operation-not-allowed') {
            message = 'Email/password accounts are not enabled';
        }
        showNotification(message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Register with Email';
    }
}

// ============================================================
// PHONE REGISTRATION
// ============================================================
let recaptchaVerifier = null;

async function registerWithPhone() {
    if (!document.getElementById('termsCheckbox').checked) {
        showNotification('Please accept Terms & Conditions', 'error');
        return;
    }

    const fullName = document.getElementById('phoneFullName').value.trim();
    const username = document.getElementById('phoneUsername').value.trim();
    const phoneNumber = document.getElementById('phoneNumber').value.trim();
    const password = document.getElementById('phonePassword').value;
    const countrySelect = document.getElementById('phoneCountryCode');
    const country = countrySelect.options[countrySelect.selectedIndex]?.value || '';
    
    const selectedText = countrySelect.options[countrySelect.selectedIndex]?.text || '';
    const matched = countriesData.find(c => selectedText.includes(c.name));
    const countryCode = matched ? matched.code : '';

    if (!fullName || !username || !phoneNumber || !password || !country) {
        showNotification('All fields are required', 'error');
        return;
    }
    if (password.length < 6) {
        showNotification('Password must be at least 6 characters', 'error');
        return;
    }
    if (!countryCode) {
        showNotification('Please select a valid country', 'error');
        return;
    }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';

    try {
        // Check if username already exists
        const usernameRef = ref(rtdb, `usernames/${username.toLowerCase()}`);
        const usernameSnap = await get(usernameRef);
        if (usernameSnap.exists()) {
            throw new Error('Username already taken');
        }

        // Initialize reCAPTCHA
        if (!recaptchaVerifier) {
            recaptchaVerifier = new RecaptchaVerifier(auth, 'registerBtn', {
                size: 'invisible',
                callback: () => console.log("[RECAPTCHA] Resolved")
            });
            await recaptchaVerifier.render();
        }

        const fullPhoneNumber = countryCode + phoneNumber;
        const confirmation = await signInWithPhoneNumber(auth, fullPhoneNumber, recaptchaVerifier);
        console.log("[PHONE] OTP sent to:", fullPhoneNumber);
        
        showNotification('📱 OTP sent to your phone!', 'info');
        
        // Prompt for OTP
        const otp = prompt('Enter the 6-digit verification code sent to your phone:');
        if (!otp) {
            throw new Error('OTP is required');
        }
        
        const userCredential = await confirmation.confirm(otp);
        const user = userCredential.user;
        
        // Update profile
        await updateProfile(user, {
            displayName: fullName
        });
        
        // Save user to Firebase Database
        await saveUserToFirebase(user, {
            fullName,
            username,
            country,
            phone: fullPhoneNumber,
            referralCode: referredByCode
        });
        
        // Handle referral
        await handleReferral(user.uid);
        
        showNotification('✅ Account created successfully!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);

    } catch (error) {
        console.error('[PHONE] Error:', error);
        let message = error.message;
        if (error.code === 'auth/invalid-verification-code') {
            message = 'Invalid OTP code';
        } else if (error.code === 'auth/too-many-requests') {
            message = 'Too many attempts. Try again later';
        }
        showNotification(message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-phone"></i> Register with Phone';
    }
}

// ============================================================
// GOOGLE REGISTRATION
// ============================================================
document.getElementById('googleSignUpBtn')?.addEventListener('click', async () => {
    if (!document.getElementById('termsCheckbox').checked) {
        showNotification('Please accept Terms & Conditions', 'error');
        return;
    }

    const provider = new GoogleAuthProvider();
    const btn = document.getElementById('googleSignUpBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';

    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        console.log("[GOOGLE] User:", user.uid);

        // Check if user already exists
        const userRef = ref(rtdb, `users/${user.uid}`);
        const userSnap = await get(userRef);
        
        if (!userSnap.exists()) {
            // Create username from email
            let username = user.email.split('@')[0];
            // Check if username exists
            const usernameRef = ref(rtdb, `usernames/${username.toLowerCase()}`);
            const usernameSnap = await get(usernameRef);
            if (usernameSnap.exists()) {
                username = username + Math.floor(Math.random() * 1000);
            }
            
            await saveUserToFirebase(user, {
                fullName: user.displayName || user.email.split('@')[0],
                username: username,
                country: 'Tanzania',
                referralCode: referredByCode,
                phone: null
            });
            
            await handleReferral(user.uid);
        }

        showNotification(`✅ Welcome ${user.displayName || 'User'}!`, 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);

    } catch (err) {
        console.error("[GOOGLE] Error:", err);
        showNotification('Google signup failed: ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
    }
});

// ============================================================
// METHOD SWITCHING
// ============================================================
document.querySelectorAll('.register-option').forEach(opt => {
    opt.addEventListener('click', function() {
        document.querySelectorAll('.register-option').forEach(o => o.classList.remove('active'));
        this.classList.add('active');
        const method = this.dataset.method;
        document.getElementById('emailSection').style.display = 'none';
        document.getElementById('phoneSection').style.display = 'none';
        document.getElementById('googleSection').style.display = 'none';

        const btn = document.getElementById('registerBtn');
        if (method === 'email') {
            document.getElementById('emailSection').style.display = 'block';
            btn.style.display = 'flex';
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Register with Email';
            btn.onclick = registerWithEmail;
        } else if (method === 'phone') {
            document.getElementById('phoneSection').style.display = 'block';
            btn.style.display = 'flex';
            btn.innerHTML = '<i class="fas fa-phone"></i> Register with Phone';
            btn.onclick = registerWithPhone;
        } else {
            document.getElementById('googleSection').style.display = 'block';
            btn.style.display = 'none';
        }
    });
});

// ============================================================
const phoneCountrySelect = document.getElementById('phoneCountryCode');
const phoneInput = document.getElementById('phoneNumber');
const phoneHint = document.getElementById('phoneHint');

function updatePhoneHint() {
    const selectedText = phoneCountrySelect.options[phoneCountrySelect.selectedIndex]?.text || '';
    const matched = countriesData.find(c => selectedText.includes(c.name));
    if (matched) {
        phoneHint.innerHTML = `${matched.flag} ${matched.name} requires ${matched.digits} digits (excluding country code)`;
        phoneHint.style.color = '#FFD700';
    } else {
        phoneHint.innerHTML = 'Select country to see required digits';
        phoneHint.style.color = '#888';
    }
}
phoneCountrySelect.addEventListener('change', updatePhoneHint);
updatePhoneHint();

// ============================================================
// AUTO-DETECT COUNTRY
// ============================================================
async function autoDetectCountry() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        const matched = countriesData.find(c => c.name === data.country_name);
        if (matched) {
            const countrySelect = document.getElementById('country');
            const phoneSelect = document.getElementById('phoneCountryCode');
            for (let i = 0; i < countrySelect.options.length; i++) {
                if (countrySelect.options[i].value === matched.name) {
                    countrySelect.selectedIndex = i;
                    phoneSelect.selectedIndex = i;
                    updatePhoneHint();
                    break;
                }
            }
        }
    } catch (e) { console.log("Auto-detect failed"); }
}
autoDetectCountry();
