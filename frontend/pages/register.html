.overlay {

}
.register-box {

.checkbox-container {

    height: 18px;

    margin: 0;

.checkmark {

    left: 0;

    height: 18px;
    border-radius: 5px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s;
    pointer-events: none;
}
.checkbox-container input:checked + .checkmark { background: #FFD700; border-color: #FFD700; }
.checkbox-container input:checked + .checkmark::after {
    content: "✓";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    font-weight: bold;
    color: #000000;
}
.terms-text {

.bottom-text {

.notification {

    right: 25px;

    max-width: 380px;
    padding: 12px 16px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 99999;
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    animation: slideInRight 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    border-left: 4px solid;
}
.notification.success { background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,255,136,0.08)); border-left-color: #00FF88; }
.notification.success i { color: #00FF88; }
.notification.error { background: linear-gradient(135deg, rgba(255,77,77,0.15), rgba(255,77,77,0.08)); border-left-color: #FF4D4D; }
.notification.error i { color: #FF4D4D; }
.notification.info { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.08)); border-left-color: #FFD700; }
.notification.info i { color: #FFD700; }
.notification i { font-size: 20px; }
.notification .message { flex: 1; font-size: 12px; line-height: 1.4; color: #FFFFFF; font-weight: 500; }
.notification .close-notif { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 13px; }
.notification .close-notif:hover { opacity: 1; }
@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(100%); }
}

.otp-modal {

.otp-input-group {

.otp-input-group input {

.otp-input-group input:focus {

.otp-input-group input:disabled { opacity: 0.4; }
.otp-actions {

.otp-actions button {

.otp-actions .otp-verify {

.otp-actions .otp-verify:disabled { opacity: 0.5; cursor: not-allowed; }
.otp-actions .otp-cancel {

.otp-resend {

.otp-resend button {

.otp-resend button:hover { text-decoration: underline; }
.otp-resend button:disabled { opacity: 0.5; cursor: not-allowed; }

@media(max-width: 480px) {

}

function initTheme() {

        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';

function showNotification(msg, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i><div class="message">${msg}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(notif);
    setTimeout(() => { notif.style.animation = 'fadeOut 0.3s'; setTimeout(() => notif.remove(), 300); }, 5000);

}

// ============================================================
// AUTO-DETECT COUNTRY
// ============================================================
async function autoDetectCountry() {
    try {
        // Try IP API first
        const response = await fetch('https://ipapi.co/json/');
        if (response.ok) {
            const data = await response.json();
            const matched = countriesData.find(c => 
                c.name.toLowerCase() === data.country_name?.toLowerCase() ||
                c.iso === data.country_code?.toUpperCase()
            );
            if (matched) {
                setSelectedCountry(matched);
                return;
            }
        }
    } catch (e) { console.log('[DETECT] IP API failed, trying fallback...'); }

    // Fallback: Try browser locale
    try {
        const locale = navigator.language || navigator.languages?.[0] || 'en-US';
        const parts = locale.split('-');
        if (parts.length > 1) {
            const countryCode = parts[1].toUpperCase();
            const matched = countriesData.find(c => c.iso === countryCode);
            if (matched) {
                setSelectedCountry(matched);
                return;
            }
        }
    } catch (e) { console.log('[DETECT] Locale fallback failed'); }

    // Fallback: Try timezone
    try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const matched = countriesData.find(c => c.timezone === tz);
        if (matched) {
            setSelectedCountry(matched);
            return;
        }
    } catch (e) { console.log('[DETECT] Timezone fallback failed'); }

    // Default to Tanzania
    const defaultCountry = countriesData.find(c => c.code === '+255');
    if (defaultCountry) setSelectedCountry(defaultCountry);
}

function setSelectedCountry(country) {
    if (!country) return;
    selectedCountry = country;
    if (emailCountryChoices) {
        emailCountryChoices.setChoiceByValue(country.code);
    }
    if (phoneCountryChoices) {
        phoneCountryChoices.setChoiceByValue(country.code);
    }
    updatePhoneHint(country);
}

// ============================================================
// SAVE USER TO FIREBASE
// ============================================================
async function saveUserToFirebase(user, userData) {
    const userRef = ref(rtdb, `users/${user.uid}`);
    
    // Generate permanent referral code
    const referralCode = generateReferralCode(user.uid);
    
    await set(userRef, {
        uid: user.uid,
        email: user.email || null,
        username: userData.username.toLowerCase(),
        fullName: userData.fullName,
        country: userData.country || selectedCountry?.name || 'Tanzania',
        countryCode: userData.countryCode || selectedCountry?.code || '+255',
        phone: userData.phone || null,
        referralCode: referralCode,
        referredBy: userData.referredBy || null,
        balance: 0,
        totalDeposited: 0,
        totalWithdrawn: 0,
        isVerified: false,
        isActive: true,
        createdAt: Date.now(),
        updatedAt: Date.now()
    });
    
    // Store referral code index
    await set(ref(rtdb, `referrals/${referralCode}`), {
        uid: user.uid,
        username: userData.username.toLowerCase(),
        createdAt: Date.now()
    });
    
    // Store username lookup (hashed)
    const usernameHash = await hashString(userData.username.toLowerCase());
    await set(ref(rtdb, `usernames/${usernameHash}`), { uid: user.uid, username: userData.username.toLowerCase() });
    
    // Store email lookup (hashed)
    if (user.email) {
        const emailHash = await hashString(user.email.toLowerCase());
        await set(ref(rtdb, `emails/${emailHash}`), { uid: user.uid, email: user.email.toLowerCase() });
    }
    
    return referralCode;
}

function generateReferralCode(uid) {
    // Generate unique referral code: ABOTRA + 6 random chars
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let code = 'ABOTRA';
    for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return code;
}

async function hashString(str) {
    // Simple hash for lookup keys - SHA-256
    const encoder = new TextEncoder();
    const data = encoder.encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// HANDLE REFERRAL
// ============================================================
async function handleReferral(newUserId) {
    if (!referredByCode) return;
    try {
        // Validate referral code exists
        const referralRef = ref(rtdb, `referrals/${referredByCode}`);
        const snap = await get(referralRef);
        if (!snap.exists()) {
            console.log('[REFERRAL] Invalid referral code:', referredByCode);
            return;
        }
        
        const referrerData = snap.val();
        const referrerUid = referrerData.uid;
        
        // Store referral relationship
        await runTransaction(ref(rtdb, `users/${referrerUid}/referrals`), (current) => {
            if (!current) current = { count: 0, list: [] };
            current.count = (current.count || 0) + 1;
            if (!current.list) current.list = [];
            current.list.push({
                userId: newUserId,
                joinedAt: Date.now(),
                referralCode: referredByCode
            });
            return current;
        });
        
        // Add to global referral list
        const refListRef = push(ref(rtdb, `referralHistory`));
        await set(refListRef, {
            referrer: referrerUid,
            referred: newUserId,
            referralCode: referredByCode,
            date: Date.now()
        });
        
        console.log('[REFERRAL] Recorded successfully');
    } catch (e) {
        console.error('[REFERRAL] Error:', e);
    }
}

async function registerWithEmail() {
    if (!termsCheckbox.checked) {
        showNotification('Please accept Terms & Conditions', 'error');
        return;
    }

    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const countryCode = document.getElementById('emailCountry').value;
    const country = countriesData.find(c => c.code === countryCode);

    if (!fullName || !username || !email || !password || !country) {
        showNotification('All fields are required', 'error');
        return;
    }
    if (password.length < 8) {
        showNotification('Password must be at least 8 characters', 'error');
        return;
    }
    if (!validatePassword(password)) {
        showNotification('Password must contain uppercase, lowercase, number and special character', 'error');
        return;
    }

    const btn = registerBtn;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

    try {
        // Check username with hash
        const usernameHash = await hashString(username);
        const usernameRef = ref(rtdb, `usernames/${usernameHash}`);
        const usernameSnap = await get(usernameRef);
        if (usernameSnap.exists()) {
            throw new Error('Username already taken');
        }
        
        // Check email with hash
        const emailHash = await hashString(email);
        const emailRef = ref(rtdb, `emails/${emailHash}`);
        const emailSnap = await get(emailRef);
        if (emailSnap.exists()) {
            throw new Error('Email already registered');
        }

        // Create user with Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        await updateProfile(user, { displayName: fullName });
        
        // Save to database
        const referralCode = await saveUserToFirebase(user, {
            fullName,
            username,
            country: country.name,
            countryCode: country.code,
            referredBy: referredByCode || null,
            phone: null
        });
        
        await handleReferral(user.uid);
        await sendEmailVerification(user);
        
        showNotification(`✅ Account created! Your referral code: ${referralCode}. Please verify your email.`, 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 4000);

    } catch (error) {
        console.error('[REGISTER] Error:', error);
        let message = error.message;
        if (error.code === 'auth/email-already-in-use') message = 'Email already registered';
        else if (error.code === 'auth/weak-password') message = 'Password too weak';
        else if (error.code === 'auth/operation-not-allowed') message = 'Email/password accounts are not enabled';
        showNotification(message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Register with Email';
    }
}

// ============================================================
function showOtpModal(phoneNumber) {
    const modal = document.getElementById('otpModal');
    document.getElementById('otpPhoneDisplay').textContent = phoneNumber;
    modal.classList.add('active');
    
    // Focus first input
    const inputs = document.querySelectorAll('#otpInputGroup input');
    inputs.forEach((input, index) => {
        input.value = '';
        input.disabled = false;
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1 && index < 5) {
                inputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
            }
            if (e.key === 'Enter') {
                document.getElementById('otpVerifyBtn').click();
            }
        });
    });
    inputs[0].focus();
}

function hideOtpModal() {
    document.getElementById('otpModal').classList.remove('active');
    phoneConfirmation = null;
}

async function verifyOtp() {
    if (otpVerificationInProgress) return;
    
    const inputs = document.querySelectorAll('#otpInputGroup input');
    const otp = Array.from(inputs).map(inp => inp.value).join('');
    
    if (otp.length !== 6) {
        showNotification('Please enter 6-digit code', 'error');
        return;
    }
    
    otpVerificationInProgress = true;
    const verifyBtn = document.getElementById('otpVerifyBtn');
    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
    
    try {
        if (!phoneConfirmation) {
            throw new Error('No verification in progress');
        }
        
        const result = await phoneConfirmation.confirm(otp);
        const user = result.user;
        
        // Get pending registration data
        const pending = window._pendingPhoneRegistration || {};
        
        // Update profile
        await updateProfile(user, { displayName: pending.fullName || 'User' });
        
        // Save to database
        await saveUserToFirebase(user, {
            fullName: pending.fullName || 'User',
            username: pending.username || 'user' + Date.now(),
            country: pending.country?.name || 'Tanzania',
            countryCode: pending.countryCode || '+255',
            phone: pending.fullPhoneNumber || '',
            referredBy: referredByCode || null
        });
        
        await handleReferral(user.uid);
        
        hideOtpModal();
        showNotification('✅ Account created successfully!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        
    } catch (error) {
        console.error('[OTP] Error:', error);
        let message = error.message;
        if (error.code === 'auth/invalid-verification-code') {
            message = 'Invalid OTP code. Please try again.';
        }
        showNotification(message, 'error');
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = 'Verify';
    } finally {
        otpVerificationInProgress = false;
    }
}

async function resendOtp() {
    if (otpResendCount >= 3) {
        showNotification('Maximum resend attempts reached. Please try again later.', 'error');
        return;
    }
    
    const resendBtn = document.getElementById('otpResendBtn');
    resendBtn.disabled = true;
    
    try {
        if (!phoneConfirmation) {
            throw new Error('No verification in progress');
        }
        // Re-send OTP
        const pending = window._pendingPhoneRegistration || {};
        const fullPhoneNumber = pending.fullPhoneNumber || '';
        const confirmation = await signInWithPhoneNumber(auth, fullPhoneNumber, recaptchaVerifier);
        phoneConfirmation = confirmation;
        
        otpResendCount++;
        showNotification('📱 New OTP sent!', 'info');
        
        // Start timer
        let seconds = 30;
        const timerSpan = document.getElementById('otpTimer');
        timerSpan.textContent = ` (${seconds}s)`;
        const interval = setInterval(() => {
            seconds--;
            timerSpan.textContent = ` (${seconds}s)`;
            if (seconds <= 0) {
                clearInterval(interval);
                timerSpan.textContent = '';
                resendBtn.disabled = false;
            }
        }, 1000);
        
    } catch (error) {
        console.error('[OTP] Resend error:', error);
        showNotification('Failed to resend OTP. Try again.', 'error');
        resendBtn.disabled = false;
    }
}

// ============================================================
// PASSWORD VALIDATION
// ============================================================
function validatePassword(password) {
    const hasUpperCase = /[A-Z]/.test(password);
    const hasLowerCase = /[a-z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
    return hasUpperCase && hasLowerCase && hasNumber && hasSpecial;
}
