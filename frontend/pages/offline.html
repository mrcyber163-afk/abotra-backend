<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline | ABOTRA-PROAI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
background:#050505;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
.offline-container{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,215,0,0.2);
border-radius:24px;
padding:40px 30px;
max-width:400px;
width:100%;
text-align:center;
backdrop-filter:blur(12px);
}
.offline-icon{
font-size:60px;
color:#FFD700;
margin-bottom:20px;
}
.offline-title{
color:#FFD700;
font-size:24px;
font-weight:700;
margin-bottom:10px;
}
.offline-text{
color:#aaa;
font-size:14px;
line-height:1.6;
margin-bottom:20px;
}
.retry-btn{
background:linear-gradient(135deg,#800000,#FFD700);
border:none;
border-radius:12px;
padding:12px 30px;
color:white;
font-weight:700;
font-size:14px;
cursor:pointer;
transition:0.3s;
}
.retry-btn:hover{
transform:translateY(-2px);
box-shadow:0 4px 15px rgba(255,215,0,0.3);
}
.retry-btn i{margin-right:8px;}
</style>
</head>
<body>
<div class="offline-container">
    <div class="offline-icon"><i class="fas fa-wifi-slash"></i></div>
    <h1 class="offline-title">You're Offline</h1>
    <p class="offline-text">
        It looks like you've lost your internet connection.<br>
        Don't worry, some content is still available offline.
    </p>
    <button class="retry-btn" onclick="location.reload()">
        <i class="fas fa-sync-alt"></i> Retry Connection
    </button>
</div>
</body>
</html>
