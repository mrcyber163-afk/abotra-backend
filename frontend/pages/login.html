<script type="module">
// ============================================================
// CONFIG - From global
// ============================================================
const API_BASE_URL = window.CONFIG ? window.CONFIG.API_URL : 'https://abotra-backend-production.up.railway.app';

// ============================================================
// FIREBASE CLIENT SDK
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider,
    signInWithPhoneNumber, RecaptchaVerifier, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const rtdb = getDatabase(app);

// ============================================================
// COUNTRIES DATA
// ============================================================
const countriesData = [
    { code: "+255", name: "Tanzania", flag: "🇹🇿", digits: 9 },
    { code: "+265", name: "Malawi", flag: "🇲🇼", digits: 9 },
    { code: "+260", name: "Zambia", flag: "🇿🇲", digits: 9 },
    { code: "+254", name: "Kenya", flag: "🇰🇪", digits: 9 },
    { code: "+256", name: "Uganda", flag: "🇺🇬", digits: 9 },
    { code: "+234", name: "Nigeria", flag: "🇳🇬", digits: 10 },
    { code: "+233", name: "Ghana", flag: "🇬🇭", digits: 9 },
    { code: "+27", name: "South Africa", flag: "🇿🇦", digits: 9 },
    { code: "+243", name: "Congo DRC", flag: "🇨🇩", digits: 9 },
    { code: "+257", name: "Burundi", flag: "🇧🇮", digits: 8 },
    { code: "+267", name: "Botswana", flag: "🇧🇼", digits: 7 },
    { code: "+264", name: "Namibia", flag: "🇳🇦", digits: 9 },
    { code: "+258", name: "Mozambique", flag: "🇲🇿", digits: 9 },
    { code: "+250", name: "Rwanda", flag: "🇷🇼", digits: 9 },
    { code: "+20", name: "Egypt", flag: "🇪🇬", digits: 10 },
    { code: "+212", name: "Morocco", flag: "🇲🇦", digits: 9 },
    { code: "+1", name: "USA", flag: "🇺🇸", digits: 10 },
    { code: "+44", name: "UK", flag: "🇬🇧", digits: 10 }
];

function populateCountries() {
    const select = document.getElementById('phoneCountryCode');
    if (!select) return;
    const sorted = [...countriesData].sort((a, b) => a.name.localeCompare(b.name));
    sorted.forEach(c => {
        const option = new Option(`${c.flag} ${c.name} (${c.code})`, c.code);
        select.appendChild(option);
    });
}
populateCountries();

// Phone hint
const phoneCountrySelect = document.getElementById('phoneCountryCode');
const phoneHint = document.getElementById('phoneHint');
const phoneNumberInput = document.getElementById('phoneNumber');

function updatePhoneHint() {
    const selectedCode = phoneCountrySelect.value;
    const matched = countriesData.find(c => c.code === selectedCode);
    if (matched) {
        phoneHint.innerHTML = `<i class="fas fa-check-circle"></i> ${matched.flag} ${matched.name} requires ${matched.digits} digits`;
        phoneHint.style.color = '#FFD700';
        phoneNumberInput.maxLength = matched.digits;
        phoneNumberInput.placeholder = `Enter ${matched.digits} digits`;
    } else {
        phoneHint.innerHTML = '<i class="fas fa-info-circle"></i> Select country to see required digits';
        phoneHint.style.color = '#888';
        phoneNumberInput.maxLength = 15;
        phoneNumberInput.placeholder = 'Phone Number';
    }
}
phoneCountrySelect.addEventListener('change', updatePhoneHint);
updatePhoneHint();

async function autoDetectCountry() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        const detectedName = data.country_name;
        const matched = countriesData.find(c => c.name === detectedName);
        if (matched) {
            const phoneSelect = document.getElementById('phoneCountryCode');
            for (let i = 0; i < phoneSelect.options.length; i++) {
                if (phoneSelect.options[i].value === matched.code) {
                    phoneSelect.selectedIndex = i;
                    updatePhoneHint();
                    break;
                }
            }
        }
    } catch (e) { console.log("Auto-detect failed"); }
}
autoDetectCountry();

// Theme
function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') document.body.classList.add('light-theme');
}
document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('light-theme');
    localStorage.setItem('abotra_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
});

let currentMethod = 'email';
let recaptchaVerifier = null;

document.querySelectorAll('.login-option').forEach(opt => {
    opt.addEventListener('click', function() {
        document.querySelectorAll('.login-option').forEach(o => o.classList.remove('active'));
        this.classList.add('active');
        currentMethod = this.dataset.method;
        document.getElementById('emailLoginSection').style.display = 'none';
        document.getElementById('phoneLoginSection').style.display = 'none';
        document.getElementById('googleLoginSection').style.display = 'none';
        document.getElementById('loginBtn').style.display = 'flex';
        if (currentMethod === 'email') {
            document.getElementById('emailLoginSection').style.display = 'block';
        } else if (currentMethod === 'phone') {
            document.getElementById('phoneLoginSection').style.display = 'block';
        } else {
            document.getElementById('googleLoginSection').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';
        }
    });
});

document.getElementById('togglePassword')?.addEventListener('click', function() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.classList.toggle('fa-eye');
});
document.getElementById('togglePhonePassword')?.addEventListener('click', function() {
    const inp = document.getElementById('phonePassword');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.classList.toggle('fa-eye');
});

function showNotification(msg, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    const n = document.createElement('div');
    n.className = `notification ${type}`;
    n.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-times-circle'}"></i><div class="message">${msg}</div><div class="close-notif"><i class="fas fa-times"></i></div>`;
    document.body.appendChild(n);
    setTimeout(() => { n.style.animation = 'fadeOut 0.3s'; setTimeout(() => n.remove(), 300); }, 3000);
    n.querySelector('.close-notif').onclick = () => { n.style.animation = 'fadeOut 0.3s'; setTimeout(() => n.remove(), 300); };
}

async function updateUserInRTDB(userId, userData) {
    const userRef = ref(rtdb, `users/${userId}`);
    const snapshot = await get(userRef);
    if (!snapshot.exists()) {
        await set(userRef, {
            uid: userId, email: userData.email || '',
            username: userData.username || userData.email?.split('@')[0] || 'User',
            fullName: userData.fullName || userData.email?.split('@')[0] || 'User',
            createdAt: Date.now(), balance: 0, totalDeposited: 0, lastLogin: Date.now()
        });
    } else {
        await update(userRef, { lastLogin: Date.now() });
    }
}

// Biometric
let biometricCredential = null;
let rpId = window.location.hostname || "abotra-proai.com";

async function checkBiometricEnabled() {
    const savedCredential = localStorage.getItem('abotra_biometric_credential');
    const savedEmail = localStorage.getItem('abotra_biometric_email');
    const bioBtn = document.getElementById('biometricLoginBtn');
    if (savedCredential && savedEmail) {
        bioBtn.style.opacity = '1'; bioBtn.style.cursor = 'pointer';
        bioBtn.classList.remove('disabled');
        bioBtn.querySelector('span').textContent = 'Biometric Login';
        return true;
    }
    bioBtn.style.opacity = '0.6'; bioBtn.style.cursor = 'not-allowed';
    bioBtn.classList.add('disabled');
    bioBtn.querySelector('span').textContent = 'Biometric (Not Setup)';
    return false;
}

async function performBiometricLogin() {
    const savedCredentialStr = localStorage.getItem('abotra_biometric_credential');
    const savedEmail = localStorage.getItem('abotra_biometric_email');
    const savedPassword = localStorage.getItem('abotra_biometric_password');
    if (!savedCredentialStr || !savedEmail || !savedPassword) {
        showNotification('Biometric not set up. Please login with password first.', 'info');
        return false;
    }
    try {
        const savedCredential = JSON.parse(savedCredentialStr);
        const authOptions = {
            challenge: new Uint8Array(32),
            allowCredentials: [{ id: savedCredential.id, type: "public-key", transports: ["internal"] }],
            timeout: 60000, userVerification: "required", rpId: rpId
        };
        crypto.getRandomValues(authOptions.challenge);
        const modal = document.getElementById('biometricModal');
        const statusDiv = document.getElementById('biometricStatus');
        const statusText = document.getElementById('biometricStatusText');
        modal.classList.add('active');
        statusText.innerHTML = 'Place finger on sensor or use Face ID...';
        statusDiv.className = 'biometric-status waiting';
        const assertionResp = await SimpleWebAuthnBrowser.startAuthentication(authOptions);
        if (assertionResp) {
            statusText.innerHTML = 'Verification successful! Logging in...';
            statusDiv.className = 'biometric-status success';
            setTimeout(async () => {
                modal.classList.remove('active');
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                try {
                    await signInWithEmailAndPassword(auth, savedEmail, savedPassword);
                    showNotification('Biometric login successful!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } catch (loginError) {
                    showNotification('Login failed. Please login with password.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }, 500);
            return true;
        }
    } catch (error) {
        console.error("Biometric auth error:", error);
        const modal = document.getElementById('biometricModal');
        const statusDiv = document.getElementById('biometricStatus');
        if (error.name === "NotAllowedError") {
            statusDiv.className = 'biometric-status error';
            document.getElementById('biometricStatusText').innerHTML = 'Biometric cancelled or failed.';
            setTimeout(() => modal.classList.remove('active'), 2000);
            showNotification('Biometric cancelled. Use password.', 'error');
        } else {
            statusDiv.className = 'biometric-status error';
            document.getElementById('biometricStatusText').innerHTML = 'Biometric not available.';
            setTimeout(() => modal.classList.remove('active'), 2000);
            showNotification('Biometric not supported on this device.', 'error');
        }
        return false;
    }
}

document.getElementById('biometricLoginBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    const isEnabled = await checkBiometricEnabled();
    if (isEnabled) { await performBiometricLogin(); }
    else { showNotification('Biometric not set up. Please login first with password.', 'info'); }
});

document.getElementById('biometricCancelBtn')?.addEventListener('click', () => {
    document.getElementById('biometricModal').classList.remove('active');
    showNotification('Cancelled', 'info');
});
document.getElementById('biometricUsePasswordBtn')?.addEventListener('click', () => {
    document.getElementById('biometricModal').classList.remove('active');
    showNotification('Use password instead', 'info');
});

// Email Login
async function loginWithEmail(email, password) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
    try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        await updateUserInRTDB(result.user.uid, { email: result.user.email });
        showNotification('Login successful', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (error) {
        let msg = error.code === 'auth/invalid-credential' ? 'Login failed' : error.message;
        showNotification(msg, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
}

// Phone Login
async function loginWithPhone(phoneNumber, countryCode, password) {
    const fullPhone = countryCode + phoneNumber;
    const digitsOnly = phoneNumber.replace(/\D/g, '');
    const usersRef = ref(rtdb, 'users');
    const snapshot = await get(usersRef);
    let foundUser = null;
    if (snapshot.exists()) {
        for (const [userId, userData] of Object.entries(snapshot.val())) {
            const userPhone = userData.phone || '';
            const userPhoneRaw = userData.phoneRaw || '';
            if (userPhone === fullPhone || userPhone === phoneNumber || userPhoneRaw === digitsOnly || userPhoneRaw === phoneNumber) {
                foundUser = { userId, ...userData };
                break;
            }
        }
    }
    if (!foundUser) { showNotification('Phone number not registered', 'error'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';
    try {
        await initRecaptcha();
        const result = await signInWithPhoneNumber(auth, fullPhone, recaptchaVerifier);
        const otp = prompt("Enter 6-digit OTP:");
        if (!otp) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login'; return; }
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
        const confirmation = await result.confirm(otp);
        await updateUserInRTDB(confirmation.user.uid, { phone: fullPhone });
        showNotification('Login successful', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (error) {
        showNotification('Login failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
}

// Google Login
document.getElementById('googleLoginBtn')?.addEventListener('click', async () => {
    const provider = new GoogleAuthProvider();

        });

        setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (err) {
        showNotification('Login failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
    }
});

async function initRecaptcha() {
    if (!recaptchaVerifier) {
        recaptchaVerifier = new RecaptchaVerifier(auth, 'loginBtn', { size: 'invisible' });
    }
    await recaptchaVerifier.render();
}

document.getElementById('loginBtn').addEventListener('click', async () => {
    if (currentMethod === 'email') {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showNotification('Enter email and password', 'error'); return; }
        await loginWithEmail(email, password);
    } else if (currentMethod === 'phone') {
        const countryCode = document.getElementById('phoneCountryCode').value;
        const phone = document.getElementById('phoneNumber').value.trim();
        const password = document.getElementById('phonePassword').value;
        if (!countryCode || !phone || !password) { showNotification('Enter phone and password', 'error'); return; }
        const matched = countriesData.find(c => c.code === countryCode);
        const digitsOnly = phone.replace(/\D/g, '');
        if (matched && digitsOnly.length !== matched.digits) {
            showNotification(`Invalid ${matched.name} phone number`, 'error');
            return;
        }
        await loginWithPhone(phone, countryCode, password);
    }
});

onAuthStateChanged(auth, async (user) => {
    if (user && window.location.pathname.includes('login.html')) {
        window.location.href = 'dashboard.html';
    }
});

initTheme();
