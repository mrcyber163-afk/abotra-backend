.phone-number-input { flex: 1; }

    width: 100%; height: 50px; border: none; outline: none; padding: 0 14px;

    border: 1.5px solid var(--border-color);
    color: var(--text-primary);

    transition: all var(--transition);
}
.phone-number-input input:focus {
    border-color: var(--gold);

}

}
.phone-hint.active { color: var(--gold); }

/* ============================================================
   FORGOT & BIOMETRIC ROW
   ============================================================ */
.forgot-biometric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0;
    margin: -2px 0 16px;
    flex-wrap: wrap;

}

    color: var(--gold);

}

.biometric-icon {

    border-radius: 50px;
    padding: 6px 14px;

    display: flex;
    align-items: center;

}

/* ============================================================
   LOGIN BUTTON
   ============================================================ */
.button-container { display: flex; justify-content: center; width: 100%; margin-top: 4px; }
.login-btn {
    width: 100%; height: 52px; border: none; border-radius: var(--radius-sm);
    background: var(--gold-gradient); color: #0A0A0A;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all var(--transition);
    box-shadow: 0 4px 20px rgba(255,215,0,0.25);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    position: relative; overflow: hidden;
    font-family: var(--font);
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,215,0,0.4); }
.login-btn:active { transform: scale(0.98); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.login-btn .spinner {
    width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.1); border-top-color: #0A0A0A;

}

.google-btn {
    background: linear-gradient(135deg, #DB4437, #C23321) !important;
    color: white !important;
    box-shadow: 0 4px 20px rgba(219,68,55,0.3) !important;
}
.google-btn:hover { box-shadow: 0 6px 30px rgba(219,68,55,0.5) !important; }
.google-btn i { font-size: 18px; }

   BOTTOM TEXT
   ============================================================ */

}
.bottom-text a {

    text-decoration: none;
    font-weight: 700;
    transition: var(--transition);
}
.bottom-text a:hover { text-decoration: underline; }

/* ============================================================
   BIOMETRIC MODAL
   ============================================================ */
.biometric-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
    z-index: 20000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: all 0.3s ease;
}
.biometric-modal.active { opacity: 1; visibility: visible; }
.biometric-modal-card {
    background: var(--bg-card); border-radius: var(--radius);
    width: 90%; max-width: 340px; padding: 32px 28px;
    text-align: center;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-card);
    transform: scale(0.9); transition: transform 0.3s ease;
    position: relative;
    overflow: hidden;
}
.biometric-modal-card::before {
    content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 70% 30%, rgba(255,215,0,0.05) 0%, transparent 70%);
    pointer-events: none;
}
.biometric-modal.active .biometric-modal-card { transform: scale(1); }

.biometric-icon-large {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,215,0,0.12);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
}
.biometric-icon-large i { font-size: 32px; color: var(--gold); }

.biometric-modal-card h3 {
    color: var(--gold);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
}
.biometric-modal-card p {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 20px;
}

.biometric-status {
    padding: 10px 14px;
    border-radius: var(--radius-xs);
    margin: 12px 0 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.3s;
}
.biometric-status.success {
    background: rgba(14,203,129,0.15);
    color: #0ECB81;
    border: 1px solid rgba(14,203,129,0.3);
}
.biometric-status.error {
    background: rgba(246,70,93,0.15);
    color: #F6465D;
    border: 1px solid rgba(246,70,93,0.3);
}
.biometric-status.waiting {
    background: rgba(255,215,0,0.1);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.2);

.biometric-modal-buttons {
    display: flex; gap: 10px; margin-top: 4px;
}
.biometric-modal-btn {
    flex: 1; height: 46px; border: none; border-radius: var(--radius-xs);
    font-weight: 600; cursor: pointer; transition: all var(--transition);
    font-size: 12px;
    font-family: var(--font);
}
.biometric-modal-btn.cancel {
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
    border: 1px solid var(--border-color);
}
.biometric-modal-btn.cancel:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }
.biometric-modal-btn.use-password {
    background: var(--gold-gradient);

    box-shadow: 0 4px 20px rgba(255,215,0,0.2);
}
.biometric-modal-btn.use-password:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255,215,0,0.35); }

/* ============================================================
   NOTIFICATION
   ============================================================ */
.notification {
    position: fixed; top: 80px; right: 25px; min-width: 260px; max-width: 330px;
    padding: 14px 18px; border-radius: var(--radius-sm);
    display: flex; align-items: center; gap: 12px;
    z-index: 99999; backdrop-filter: blur(20px);
    background: rgba(18,18,18,0.95); border: 1px solid var(--border-color);
    box-shadow: var(--shadow-card);
    animation: slideInRight 0.4s ease; border-left: 4px solid;
}
.notification.success { border-left-color: #0ECB81; }
.notification.success i { color: #0ECB81; }
.notification.success .message { color: var(--text-primary); }
.notification.error { border-left-color: #F6465D; }
.notification.error i { color: #F6465D; }
.notification.error .message { color: var(--text-primary); }
.notification.info { border-left-color: var(--gold); }
.notification.info i { color: var(--gold); }
.notification.info .message { color: var(--text-primary); }
.notification i { font-size: 18px; flex-shrink: 0; }
.notification .message { flex: 1; font-size: 12px; font-weight: 500; }
.notification .close-notif { cursor: pointer; opacity: 0.5; transition: var(--transition); font-size: 14px; color: var(--text-muted); }
.notification .close-notif:hover { opacity: 1; color: var(--text-primary); }

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(100%) scale(0.95); }
    to { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes fadeOut {
    to { opacity: 0; transform: translateX(100%) scale(0.95); }
}

/* ============================================================

   ============================================================ */
@media(max-width: 480px) {

// ============================================================
// INIT COUNTRY DROPDOWN WITH CHOICES.JS
// ============================================================
let phoneCountryChoices = null;

function initCountryDropdowns() {
    const phoneSelect = document.getElementById('phoneCountryCode');
    if (!phoneSelect) return;
    
    // Populate native selects with options
    const sorted = [...countriesData].sort((a, b) => a.name.localeCompare(b.name));
    sorted.forEach(c => {
        phoneSelect.appendChild(new Option(`${c.flag} ${c.name} (${c.code})`, c.code));
    });

    if (typeof Choices === 'undefined') {
        console.error('[CHOICES] Choices.js not loaded.');
        return;
    }

    const commonConfig = {
        searchEnabled: true,
        searchPlaceholderValue: '🔍 Search country...',
        itemSelectText: '',
        shouldSort: false,
        placeholder: true,
        placeholderValue: '🇺🇳 Select Country',
        allowHTML: false,
        renderSelectedChoices: 'always'
    };

    try {
        phoneCountryChoices = new Choices(phoneSelect, {
            ...commonConfig,
            classNames: {
                containerOuter: 'choices country-code-select'
            }
        });

        const defaultCountry = countriesData.find(c => c.code === '+255' || c.name === 'Tanzania');
        if (defaultCountry) {
            phoneCountryChoices.setChoiceByValue(defaultCountry.code);
            updatePhoneHint(defaultCountry);
        }

        phoneSelect.addEventListener('change', () => {
            const code = phoneSelect.value;
            const country = countriesData.find(c => c.code === code);
            if (country) {
                updatePhoneHint(country);
            }
        });

        console.log('[CHOICES] ✅ Initialized (allowHTML: false)');
    } catch (error) {
        console.error('[CHOICES] Error:', error);
    }
}

function updatePhoneHint(country) {
    const hint = document.getElementById('phoneHint');
    const phoneNumberInput = document.getElementById('phoneNumber');
    if (country) {
        hint.innerHTML = `<i class="fas fa-check-circle"></i> ${country.flag} ${country.name} requires ${country.digits} digits`;
        hint.className = 'phone-hint active';
        phoneNumberInput.maxLength = country.digits;
        phoneNumberInput.placeholder = `Enter ${country.digits} digits`;
    } else {
        hint.innerHTML = '<i class="fas fa-info-circle"></i> Select country to see required digits';
        hint.className = 'phone-hint';
        phoneNumberInput.maxLength = 15;
        phoneNumberInput.placeholder = 'Phone Number';
    }
}

// ============================================================
// AUTO-DETECT COUNTRY
// ============================================================
async function autoDetectCountry() {
    try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        const detectedName = data.country_name;
        const matched = countriesData.find(c => c.name === detectedName);
        if (matched && phoneCountryChoices) {
            phoneCountryChoices.setChoiceByValue(matched.code);
            updatePhoneHint(matched);
            return;
        }
    } catch (e) { console.log("[DETECT] Auto-detect failed"); }
    
    // Fallback: Try default
    const defaultCountry = countriesData.find(c => c.code === '+255');
    if (defaultCountry && phoneCountryChoices) {
        phoneCountryChoices.setChoiceByValue(defaultCountry.code);
        updatePhoneHint(defaultCountry);
    }
}

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const label = document.getElementById('themeLabel');
    if (saved === 'light') {
        document.body.classList.add('light-theme');

}

// ============================================================
// NOTIFICATION
// ============================================================
function showNotification(msg, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    const n = document.createElement('div');
    n.className = `notification ${type}`;
    const iconMap = {
        success: 'fa-check-circle',
        error: 'fa-times-circle',
        info: 'fa-info-circle'
    };
    n.innerHTML = `
        <i class="fas ${iconMap[type] || 'fa-info-circle'}"></i>
        <div class="message">${msg}</div>
        <div class="close-notif"><i class="fas fa-times"></i></div>
    `;
    document.body.appendChild(n);
    setTimeout(() => { n.style.animation = 'fadeOut 0.3s'; setTimeout(() => n.remove(), 300); }, 3000);
    n.querySelector('.close-notif').onclick = () => { n.style.animation = 'fadeOut 0.3s'; setTimeout(() => n.remove(), 300); };
}

// ============================================================
// UPDATE USER IN RTDB
// ============================================================
async function updateUserInRTDB(userId, userData) {
    const userRef = ref(rtdb, `users/${userId}`);
    const snapshot = await get(userRef);
    if (!snapshot.exists()) {
        await set(userRef, {
            uid: userId,
            email: userData.email || '',
            username: userData.username || userData.email?.split('@')[0] || 'User',
            fullName: userData.fullName || userData.email?.split('@')[0] || 'User',
            createdAt: Date.now(),
            balance: 0,
            totalDeposited: 0,
            lastLogin: Date.now()
        });
    } else {
        await update(userRef, { lastLogin: Date.now() });
    }
}

// BIOMETRIC - Firebase Auth Integration
// ============================================================
let rpId = window.location.hostname || "abotra-proai.com";

async function checkBiometricEnabled() {
    const savedCredential = localStorage.getItem('abotra_biometric_credential');
    const savedEmail = localStorage.getItem('abotra_biometric_email');
    const savedPassword = localStorage.getItem('abotra_biometric_password');
    const bioBtn = document.getElementById('biometricLoginBtn');
    if (savedCredential && savedEmail && savedPassword) {
        bioBtn.style.opacity = '1';
        bioBtn.style.cursor = 'pointer';
        bioBtn.classList.remove('disabled');
        bioBtn.querySelector('span').textContent = 'Biometric Login';
        return true;
    }
    bioBtn.style.opacity = '0.5';
    bioBtn.style.cursor = 'not-allowed';
    bioBtn.classList.add('disabled');
    bioBtn.querySelector('span').textContent = 'Biometric (Not Setup)';
    return false;
}

async function performBiometricLogin() {
    const savedCredentialStr = localStorage.getItem('abotra_biometric_credential');
    const savedEmail = localStorage.getItem('abotra_biometric_email');
    const savedPassword = localStorage.getItem('abotra_biometric_password');
    if (!savedCredentialStr || !savedEmail || !savedPassword) {
        showNotification('Biometric not set up. Please login with password first.', 'info');
        return false;
    }
    try {
        const savedCredential = JSON.parse(savedCredentialStr);
        const authOptions = {
            challenge: new Uint8Array(32),
            allowCredentials: [{ id: savedCredential.id, type: "public-key", transports: ["internal"] }],
            timeout: 60000,
            userVerification: "required",
            rpId: rpId
        };
        crypto.getRandomValues(authOptions.challenge);
        
        const modal = document.getElementById('biometricModal');
        const statusDiv = document.getElementById('biometricStatus');
        const statusText = document.getElementById('biometricStatusText');
        modal.classList.add('active');
        statusText.innerHTML = 'Place finger on sensor or use Face ID...';
        statusDiv.className = 'biometric-status waiting';
        
        const assertionResp = await SimpleWebAuthnBrowser.startAuthentication(authOptions);
        if (assertionResp) {
            statusText.innerHTML = 'Verification successful! Logging in...';
            statusDiv.className = 'biometric-status success';
            setTimeout(async () => {
                modal.classList.remove('active');
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Logging in...';
                try {
                    await signInWithEmailAndPassword(auth, savedEmail, savedPassword);
                    await updateUserInRTDB(auth.currentUser.uid, { email: savedEmail });
                    showNotification('Biometric login successful!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } catch (loginError) {
                    showNotification('Login failed. Please login with password.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            }, 500);
            return true;
        }
    } catch (error) {
        console.error("Biometric auth error:", error);
        const modal = document.getElementById('biometricModal');
        const statusDiv = document.getElementById('biometricStatus');
        if (error.name === "NotAllowedError" || error.name === "AbortError") {
            statusDiv.className = 'biometric-status error';
            document.getElementById('biometricStatusText').innerHTML = 'Biometric cancelled or failed.';
            setTimeout(() => modal.classList.remove('active'), 1500);
            showNotification('Biometric cancelled. Use password.', 'info');
        } else {
            statusDiv.className = 'biometric-status error';
            document.getElementById('biometricStatusText').innerHTML = 'Biometric not available.';
            setTimeout(() => modal.classList.remove('active'), 1500);
            showNotification('Biometric not supported on this device.', 'error');
        }
        return false;
    }
}

    e.preventDefault();

// LOGIN FUNCTIONS
// ============================================================
let recaptchaVerifier = null;

async function initRecaptcha() {
    if (!recaptchaVerifier) {
        recaptchaVerifier = new RecaptchaVerifier(auth, 'loginBtn', { 
            size: 'invisible',
            callback: () => console.log("[RECAPTCHA] Resolved")
        });
    }
    await recaptchaVerifier.render();
}

async function loginWithEmail(email, password) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Logging in...';
    try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        await updateUserInRTDB(result.user.uid, { email: result.user.email });
        localStorage.setItem('abotra_biometric_email', email);
        localStorage.setItem('abotra_biometric_password', password);
        showNotification('Login successful!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (error) {
        let msg = error.code === 'auth/invalid-credential' ? 'Invalid email or password' : error.message;
        showNotification(msg, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
}

async function loginWithPhone(phoneNumber, countryCode, password) {
    const fullPhone = countryCode + phoneNumber;
    const digitsOnly = phoneNumber.replace(/\D/g, '');
    
    const usersRef = ref(rtdb, 'users');
    const snapshot = await get(usersRef);
    let foundUser = null;
    if (snapshot.exists()) {
        for (const [userId, userData] of Object.entries(snapshot.val())) {
            const userPhone = userData.phone || '';
            const userPhoneRaw = userData.phoneRaw || '';
            if (userPhone === fullPhone || userPhone === phoneNumber || 
                userPhoneRaw === digitsOnly || userPhoneRaw === phoneNumber) {
                foundUser = { userId, ...userData };
                break;
            }
        }
    }
    if (!foundUser) { 
        showNotification('Phone number not registered. Please register first.', 'error'); 
        return; 
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sending OTP...';
    try {
        await initRecaptcha();
        const result = await signInWithPhoneNumber(auth, fullPhone, recaptchaVerifier);
        const otp = prompt("Enter 6-digit verification code:");
        if (!otp) { 
            btn.disabled = false; 
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login'; 
            return; 
        }
        btn.innerHTML = '<span class="spinner"></span> Verifying...';
        const confirmation = await result.confirm(otp);
        await updateUserInRTDB(confirmation.user.uid, { 
            phone: fullPhone,
            email: foundUser.email || ''
        });
        showNotification('Login successful!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (error) {
        console.error("Phone login error:", error);
        let msg = error.code === 'auth/invalid-verification-code' ? 'Invalid OTP code' : error.message;
        showNotification(msg, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
}

// LOGIN BUTTON CLICK
// ============================================================
document.getElementById('loginBtn').addEventListener('click', async () => {
    if (currentMethod === 'email') {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { 
            showNotification('Enter email and password', 'error'); 
            return; 
        }
        await loginWithEmail(email, password);
    } else if (currentMethod === 'phone') {
        const countryCode = document.getElementById('phoneCountryCode').value;
        const phone = document.getElementById('phoneNumber').value.trim();
        const password = document.getElementById('phonePassword').value;
        if (!countryCode || !phone || !password) { 
            showNotification('Enter phone and password', 'error'); 
            return; 
        }
        const matched = countriesData.find(c => c.code === countryCode);
        const digitsOnly = phone.replace(/\D/g, '');
        if (matched && digitsOnly.length !== matched.digits) {
            showNotification(`Invalid ${matched.name} phone number`, 'error');
            return;
        }
        await loginWithPhone(phone, countryCode, password);
    }
});

// ============================================================
// AUTH STATE OBSERVER
// ============================================================
onAuthStateChanged(auth, async (user) => {
    if (user && window.location.pathname.includes('login.html')) {
        const hasBiometric = localStorage.getItem('abotra_biometric_credential');
        if (!hasBiometric) {
            try {
                const challenge = new Uint8Array(32);
                crypto.getRandomValues(challenge);
                const options = {
                    challenge: challenge,
                    rp: { name: "ABOTRA-PROAI", id: rpId },
                    user: {
                        id: user.uid,
                        name: user.email || user.uid,
                        displayName: user.displayName || user.email || 'User'
                    },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform",
                        residentKey: "preferred",
                        userVerification: "required"
                    },
                    timeout: 60000,
                    attestation: "none"
                };
                const credential = await SimpleWebAuthnBrowser.startRegistration(options);
                if (credential) {
                    localStorage.setItem('abotra_biometric_credential', JSON.stringify(credential));
                    localStorage.setItem('abotra_biometric_email', user.email || '');
                    showNotification('Biometric setup complete! You can now login with fingerprint/face.', 'success');
                }
            } catch (e) {
                console.log("[BIOMETRIC] Setup skipped or failed:", e.message);
            }
        }
        window.location.href = 'dashboard.html';
    }
});
