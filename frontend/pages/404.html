<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Page Not Found | ABOTRA-PROAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #050505;
            background-image: url("assets/images/background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body.light-theme {
            background: #f5f5f5;
            background-image: url("assets/images/background-light.png");
        }

        body.light-theme .overlay {
            background: rgba(255,255,255,0.85);
        }

        body.light-theme .error-container {
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(0,0,0,0.08);
        }

        body.light-theme .error-code {
            color: #800000;
        }

        body.light-theme .error-title {
            color: #1a1a1a;
        }

        body.light-theme .error-desc {
            color: #555;
        }

        body.light-theme .theme-toggle {
            background: rgba(0,0,0,0.08);
            border-color: rgba(128,0,0,0.3);
        }

        body.light-theme .theme-toggle i {
            color: #800000;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 50px;
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            z-index: 10000;
        }

        .theme-toggle:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.05);
        }

        .theme-toggle i {
            font-size: 18px;
            color: #FFD700;
        }

        .theme-toggle span {
            font-size: 12px;
            font-weight: 600;
            color: #FFFFFF;
        }

        body.light-theme .theme-toggle span {
            color: #800000;
        }

        .error-container {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 80px;
            color: #FFD700;
            margin-bottom: 16px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .error-code {
            font-size: 72px;
            font-weight: 900;
            color: #FFD700;
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 40px rgba(255,215,0,0.2);
        }

        .error-title {
            font-size: 22px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 12px;
        }

        .error-desc {
            font-size: 13px;
            color: #AAAAAA;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #800000, #FFD700);
            padding: 12px 32px;
            border-radius: 50px;
            text-decoration: none;
            color: #FFFFFF;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(255,215,0,0.18);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.28);
        }

        .btn-outline {
            border: 1px solid rgba(255,215,0,0.45);
            padding: 12px 32px;
            border-radius: 50px;
            text-decoration: none;
            color: #FFD700;
            font-weight: 700;
            transition: 0.3s;
            background: rgba(255,255,255,0.03);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .btn-outline:hover {
            background: #FFD700;
            color: #000;
        }

        .help-text {
            margin-top: 20px;
            font-size: 11px;
            color: #666;
        }

        .help-text a {
            color: #FFD700;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .help-text a:hover {
            color: #FFFFFF;
            text-decoration: underline;
        }

        @media(max-width: 480px) {
            .error-container {
                padding: 30px 20px;
                border-radius: 24px;
            }
            .error-code {
                font-size: 56px;
            }
            .error-icon {
                font-size: 60px;
            }
            .error-title {
                font-size: 18px;
            }
            .error-actions {
                flex-direction: column;
            }
            .btn-primary, .btn-outline {
                justify-content: center;
                width: 100%;
            }
            .theme-toggle span {
                display: none;
            }
            .theme-toggle {
                top: 15px;
                right: 15px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon" style="display:none;"></i>
        <span>Theme</span>
    </div>

    <div class="overlay"></div>

    <div class="error-container">
        <span class="error-icon">🔍</span>
        <div class="error-code">404</div>
        <div class="error-title">Oops! Page Not Found</div>
        <div class="error-desc">
            The page you are looking for might have been removed, had its name changed,
            or is temporarily unavailable.
        </div>
        <div class="error-actions">
            <a href="index.html" class="btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="javascript:history.back()" class="btn-outline">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
        <div class="help-text">
            Need help? <a href="mailto:abotraproai@gmail.com">Contact Support</a>
        </div>
    </div>

    <script>
        // ============================================================
        // THEME TOGGLE
        // ============================================================
        function initTheme() {
            const saved = localStorage.getItem('abotra_theme');
            if (saved === 'light') {
                document.body.classList.add('light-theme');
                document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
                document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
            }
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            if (document.body.classList.contains('light-theme')) {
                document.body.classList.remove('light-theme');
                localStorage.setItem('abotra_theme', 'dark');
                document.querySelector('#themeToggle i.fa-sun').style.display = 'inline-block';
                document.querySelector('#themeToggle i.fa-moon').style.display = 'none';
            } else {
                document.body.classList.add('light-theme');
                localStorage.setItem('abotra_theme', 'light');
                document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
                document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
            }
        });

        initTheme();
    </script>

</body>
</html>
