}

.notification.success { background:linear-gradient(135deg,rgba(0,255,136,0.15), rgba(0,255,136,0.08)); border-left-color:#00FF88; }
.notification.error { background:linear-gradient(135deg,rgba(255,77,77,0.15), rgba(255,77,77,0.08)); border-left-color:#FF4D4D; }

@media(max-width:480px) {

<div class="container">

<span>Password reset link will be sent to your registered email address. Check your spam folder if you don't see it within 5 minutes.</span>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle svg:first-child').style.display = 'none';
        document.querySelector('#themeToggle svg:last-child').style.display = 'inline-block';
    } else {
        document.body.classList.remove('light-theme');
        document.querySelector('#themeToggle svg:first-child').style.display = 'inline-block';
        document.querySelector('#themeToggle svg:last-child').style.display = 'none';
    }
}

document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('abotra_theme', 'dark');
        document.querySelector('#themeToggle svg:first-child').style.display = 'inline-block';
        document.querySelector('#themeToggle svg:last-child').style.display = 'none';
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('abotra_theme', 'light');
        document.querySelector('#themeToggle svg:first-child').style.display = 'none';
        document.querySelector('#themeToggle svg:last-child').style.display = 'inline-block';
    }
});

function showNotification(msg, type) {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    const n = document.createElement('div');
    n.className = `notification ${type}`;
    
    let icon = '';
    if (type === 'success') {
        icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
    } else if (type === 'error') {
        icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    } else {
        icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
    }
    
    n.innerHTML = `${icon}<div class="message">${msg}</div><div class="close-notif"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>`;
    document.body.appendChild(n);
    setTimeout(() => { n.style.animation = 'fadeOut 0.3s'; setTimeout(()=>n.remove(),300); }, 5000);
    n.querySelector('.close-notif').onclick = () => { n.style.animation = 'fadeOut 0.3s'; setTimeout(()=>n.remove(),300); };
}

async function checkEmailExistsInRTDB(email) {
    if (!email) return false;
    try {
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        if (snapshot.exists()) {
            let emailFound = false;
            snapshot.forEach(child => {
                const user = child.val();
                if (user.email && user.email.toLowerCase() === email.toLowerCase()) {
                    emailFound = true;
                }
            });
            return emailFound;
        }
        return false;
    } catch (error) {
        console.error("Error checking email in RTDB:", error);
        return false;
    }
}

async function resetPassword() {
    const email = document.getElementById('resetEmail').value.trim();
    const btn = document.getElementById('resetBtn');
    
    if (!email) { showNotification('Please enter your email address', 'error'); return; }
    if (!email.includes('@') || !email.includes('.')) { showNotification('Please enter a valid email address', 'error'); return; }
    
    const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
    if (!emailRegex.test(email)) {
        showNotification('Please enter a valid email address', 'error');
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg> Checking email...';
    
    try {
        const emailExists = await checkEmailExistsInRTDB(email);
        if (!emailExists) {
            showNotification('No account found with this email address. Please register first.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg> Send Reset Link';
            return;
        }
        
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg> Sending...';
        
        await sendPasswordResetEmail(auth, email);
        showNotification(`✅ Password reset link sent to ${email}! Check your inbox and spam folder.`, 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 4000);
        
    } catch (error) {
        let errorMessage = 'Failed to send reset email.';
        if (error.code === 'auth/user-not-found') errorMessage = 'No account found with this email address. Please register first.';
        else if (error.code === 'auth/invalid-email') errorMessage = 'Please enter a valid email address.';
        else if (error.code === 'auth/too-many-requests') errorMessage = 'Too many attempts. Try again later.';
        else if (error.code === 'auth/network-request-failed') errorMessage = 'Network error. Please check your connection.';
        showNotification(errorMessage, 'error');
        btn.disabled = false;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg> Send Reset Link';
    }
}

document.getElementById('resetBtn').addEventListener('click', resetPassword);
document.getElementById('resetEmail').addEventListener('keypress', (e) => { if(e.key === 'Enter') resetPassword(); });

// Add spin animation
const style = document.createElement('style');
style.textContent = `
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
`;
document.head.appendChild(style);

initTheme();
</script>
</body>
