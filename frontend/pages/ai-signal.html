<script type="module">
// ============================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, push, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyCAr7b_5VOqQWCLXb8JlJ1zOcoDNg0V4tM",
    authDomain: "abotra-proa1.firebaseapp.com",
    databaseURL: "https://abotra-proa1-default-rtdb.firebaseio.com",
    projectId: "abotra-proa1",
    storageBucket: "abotra-proa1.firebasestorage.app",
    messagingSenderId: "510401455603",
    appId: "1:510401455603:web:8efa0a186a90dea7c0de86"
};

// ============================================================
// API BASE URL
// ============================================================
const API_BASE_URL = window.location.origin === 'http://localhost:5001' 
    ? 'http://localhost:5001' 
    : 'https://abotra-backend.up.railway.app';

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let ws = null;
let priceHistory = [];
let previousPrice = 0;
let lastSignal = null;
let lastSignalTime = 0;

// ============================================================
// GET FIREBASE TOKEN
// ============================================================
async function getFirebaseToken() {
    return new Promise((resolve, reject) => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
            unsubscribe();
            if (!user) {
                reject(new Error('No user logged in'));
                return;
            }
            try {
                const token = await user.getIdToken(true);
                resolve(token);
            } catch (error) {
                reject(error);
            }
        });
    });
}

// ============================================================
// API CALLS TO BACKEND
// ============================================================
async function apiRequest(endpoint, method, body = null) {
    try {
        const token = await getFirebaseToken();
        const options = {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            }
        };
        if (body) options.body = JSON.stringify(body);
        
        const response = await fetch(`${API_BASE_URL}/api/${endpoint}`, options);
        const data = await response.json();
        return data;
    } catch (error) {
        console.error('API request error:', error);
        return { success: false, error: error.message };
    }
}

// ============================================================
// THEME TOGGLE
// ============================================================
function initTheme() {
    const saved = localStorage.getItem('abotra_theme');
    if (saved === 'light') {
        document.body.classList.add('light-theme');
        document.querySelector('#themeToggle i.fa-sun').style.display = 'none';
        document.querySelector('#themeToggle i.fa-moon').style.display = 'inline-block';
    }
}
document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('light-theme');
    const isLight = document.body.classList.contains('light-theme');
    localStorage.setItem('abotra_theme', isLight ? 'light' : 'dark');

    else { sun.style.display = 'inline-block'; moon.style.display = 'none'; }

// NOTIFICATION FUNCTIONS

function showNotification(message, type) {
    const existing = document.querySelector('.notification-popup');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = `notification-popup ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i><div>${message}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

async function addNotification(userId, title, message, type = 'info') {
    if (!userId) return;
    try {
        await apiRequest('notifications', 'POST', { userId, title, message, type });
    } catch(e) {
        console.error('Add notification error:', e);
    }
}

// ============================================================
// INDICATOR CALCULATIONS
// ============================================================
function calculateRSI(prices, period = 14) {
    if (prices.length < period + 1) return 50;
    let gains = 0, losses = 0;
    for (let i = prices.length - period; i < prices.length; i++) {
        const change = prices[i] - prices[i - 1];
        if (change >= 0) gains += change;
        else losses -= change;
    }
    const avgGain = gains / period, avgLoss = losses / period;
    if (avgLoss === 0) return 100;
    return 100 - (100 / (1 + (avgGain / avgLoss)));
}

function calculateMACD(prices, fast = 12, slow = 26) {
    if (prices.length < slow) return { macd: 0, signal: 0 };
    const fastEMA = prices.slice(-fast).reduce((a, b) => a + b, 0) / fast;
    const slowEMA = prices.slice(-slow).reduce((a, b) => a + b, 0) / slow;
    return { macd: fastEMA - slowEMA, signal: (fastEMA - slowEMA) * 0.8 };
}

function calculateMA(prices, period = 20) {
    if (prices.length < period) return prices[prices.length - 1] || 0;
    return prices.slice(-period).reduce((a, b) => a + b, 0) / period;
}

// ============================================================
// UPDATE UI FUNCTIONS
// ============================================================
function updateIndicatorsDisplay(rsi, macd, currentPrice, ma) {
    const rsiEl = document.getElementById('rsi');
    if (rsiEl) rsiEl.innerHTML = rsi.toFixed(1);
    const rsiSignal = document.getElementById('rsiSignal');
    if (rsiSignal) {
        if (rsi > 70) { rsiSignal.innerHTML = 'Overbought (Bearish)'; rsiSignal.className = 'indicator-signal bearish'; }
        else if (rsi < 30) { rsiSignal.innerHTML = 'Oversold (Bullish)'; rsiSignal.className = 'indicator-signal bullish'; }
        else { rsiSignal.innerHTML = 'Neutral'; rsiSignal.className = 'indicator-signal'; }
    }
    
    const macdEl = document.getElementById('macd');
    if (macdEl) macdEl.innerHTML = macd.macd > 0 ? `+${macd.macd.toFixed(2)}` : macd.macd.toFixed(2);
    const macdSignal = document.getElementById('macdSignal');
    if (macdSignal) {
        if (macd.macd > 0) { macdSignal.innerHTML = 'Bullish'; macdSignal.className = 'indicator-signal bullish'; }
        else { macdSignal.innerHTML = 'Bearish'; macdSignal.className = 'indicator-signal bearish'; }
    }
    
    const maEl = document.getElementById('ma');
    if (maEl) maEl.innerHTML = `$${ma.toFixed(2)}`;
    const maSignal = document.getElementById('maSignal');
    if (maSignal) {
        if (currentPrice > ma) { maSignal.innerHTML = 'Above MA (Bullish)'; maSignal.className = 'indicator-signal bullish'; }
        else { maSignal.innerHTML = 'Below MA (Bearish)'; maSignal.className = 'indicator-signal bearish'; }
    }
}

// ============================================================
// SAVE SIGNAL TO BACKEND
// ============================================================
async function saveSignal(signal, price, confidence, rsi, macdValue, ma) {
    if (!currentUser) return;
    const now = Date.now();
    if (lastSignal === signal && (now - lastSignalTime) < 300000) return;
    
    lastSignal = signal;
    lastSignalTime = now;
    
    try {
        const result = await apiRequest('signals', 'POST', {
            signal: signal,
            price: price,
            confidence: confidence,
            rsi: rsi,
            macd: macdValue,
            movingAverage: ma
        });
        
        if (result.success) {
            // Update stats
            const statsResult = await apiRequest('signals/stats', 'GET');
            if (statsResult.success && statsResult.stats) {
                document.getElementById('totalSignals').textContent = statsResult.stats.total || 0;
                document.getElementById('buyCount').textContent = statsResult.stats.buy || 0;
                document.getElementById('sellCount').textContent = statsResult.stats.sell || 0;
            }
            
            const lastNotif = localStorage.getItem(`last_signal_notif_${currentUser.uid}`);
            if (!lastNotif || now - parseInt(lastNotif) > 3600000) {
                await addNotification(currentUser.uid, '📊 New AI Signal', 
                    `${signal} signal for BTC at $${price.toFixed(2)} with ${confidence}% confidence.`, 
                    signal === 'BUY' ? 'success' : 'warning');
                localStorage.setItem(`last_signal_notif_${currentUser.uid}`, now);
                showNotification(`🔔 New ${signal} Signal at $${price.toFixed(2)}`, signal === 'BUY' ? 'success' : 'info');
            }
        }
    } catch(e) { console.error('Save signal error:', e); }
}

// ============================================================
// LOAD SIGNAL HISTORY
// ============================================================
function loadSignalHistory() {
    if (!currentUser) return;
    
    const container = document.getElementById('signalHistory');
    if (!container) return;
    
    container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;"><i class="fas fa-spinner fa-spin"></i> Loading signals...</div>';
    
    async function fetchHistory() {
        try {
            const result = await apiRequest('signals/history', 'GET');
            if (result.success && result.signals) {
                const history = result.signals;
                if (history.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No signals yet. Waiting for market data...</div>';
                    return;
                }
                
                container.innerHTML = '';
                history.slice(0, 30).forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'signal-history-card';
                    const signalClass = s.signal === 'BUY' ? 'buy' : 'sell';
                    const signalText = s.signal === 'BUY' ? 'BUY' : 'SELL';
                    
                    card.innerHTML = `
                        <span class="signal-badge ${signalClass}">${signalText}</span>
                        <span class="history-price">💰 $${(s.price || 0).toFixed(2)}</span>
                        <span class="history-confidence">🎯 ${s.confidence || 0}%</span>
                        <span class="history-time">📅 ${new Date(s.timestamp || Date.now()).toLocaleString()}</span>
                    `;
                    container.appendChild(card);
                });
            }
        } catch(e) {
            console.error('Fetch history error:', e);
        }
    }
    fetchHistory();
}

// ============================================================
// LOAD STATS
// ============================================================
function loadStats() {
    if (!currentUser) return;
    
    async function fetchStats() {
        try {
            const result = await apiRequest('signals/stats', 'GET');
            if (result.success && result.stats) {
                document.getElementById('totalSignals').textContent = result.stats.total || 0;
                document.getElementById('buyCount').textContent = result.stats.buy || 0;
                document.getElementById('sellCount').textContent = result.stats.sell || 0;
                document.getElementById('accuracy').textContent = `${result.stats.accuracy || 0}%`;
            }
        } catch(e) {
            console.error('Fetch stats error:', e);
        }
    }
    fetchStats();
}

// ============================================================
// PROCESS PRICE - GENERATE SIGNAL
// ============================================================
function processPrice(currentPrice) {
    document.getElementById('signalPrice').innerHTML = `$${currentPrice.toFixed(2)}`;
    priceHistory.push(currentPrice);
    if (priceHistory.length > 100) priceHistory.shift();
    if (previousPrice === 0) { previousPrice = currentPrice; return; }
    
    const rsi = calculateRSI(priceHistory, 14);
    const macd = calculateMACD(priceHistory, 12, 26);
    const ma = calculateMA(priceHistory, 20);
    const priceChange = ((currentPrice - previousPrice) / previousPrice) * 100;
    
    let signal = "HOLD", strength = 0;
    if (rsi < 30) strength += 2;
    if (rsi > 70) strength -= 2;
    if (macd.macd > 0) strength += 1.5;
    else strength -= 1.5;
    if (currentPrice > ma) strength += 1;
    else strength -= 1;
    if (priceChange > 0.2) strength += 1;
    if (priceChange < -0.2) strength -= 1;
    if (strength > 1.5) signal = "BUY";
    else if (strength < -1.5) signal = "SELL";
    
    const confidence = Math.min(95, Math.max(55, 50 + strength * 5));
    
    const signalTypeEl = document.getElementById('signalType');
    const confidenceEl = document.getElementById('confidence');
    const confidenceFillEl = document.getElementById('confidenceFill');
    const signalGlowEl = document.getElementById('signalGlow');
    
    if (signalTypeEl) signalTypeEl.innerHTML = signal;
    if (confidenceEl) confidenceEl.innerHTML = `${confidence}%`;
    if (confidenceFillEl) confidenceFillEl.style.width = `${confidence}%`;
    
    if (signal === "BUY") {
        if (signalTypeEl) signalTypeEl.className = "signal-type buy";
        if (signalGlowEl) signalGlowEl.className = "signal-glow buy";
        if (confidenceFillEl) confidenceFillEl.className = "confidence-fill buy";
    } else if (signal === "SELL") {
        if (signalTypeEl) signalTypeEl.className = "signal-type sell";
        if (signalGlowEl) signalGlowEl.className = "signal-glow sell";
        if (confidenceFillEl) confidenceFillEl.className = "confidence-fill sell";
    } else {
        if (signalTypeEl) signalTypeEl.className = "signal-type";
        if (signalGlowEl) signalGlowEl.className = "signal-glow";
        if (confidenceFillEl) confidenceFillEl.className = "confidence-fill";
    }
    updateIndicatorsDisplay(rsi, macd, currentPrice, ma);
    
    if (signal !== "HOLD") {
        saveSignal(signal, currentPrice, confidence, rsi, macd.macd, ma);
    }
    previousPrice = currentPrice;
}

// ============================================================
// WEBSOCKET CONNECTION
// ============================================================
function connectWebSocket() {
    if (ws) {
        try { ws.close(); } catch(e) {}
    }
    ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
    ws.onopen = () => console.log('WebSocket connected');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const currentPrice = parseFloat(data.p);
        processPrice(currentPrice);
    };
    ws.onerror = () => { 
        console.error('WebSocket error');
        const signalTypeEl = document.getElementById('signalType');
        if (signalTypeEl) signalTypeEl.innerHTML = "Connection Error"; 
    };
    ws.onclose = () => {
        console.log('WebSocket closed, reconnecting in 5 seconds...');
        setTimeout(() => connectWebSocket(), 5000);
    };
}

// ============================================================
// FETCH INITIAL PRICE
// ============================================================
async function fetchInitialPrice() {
    try {
        const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
        const data = await response.json();
        const price = parseFloat(data.price);
        priceHistory = [];
        for(let i = 0; i < 50; i++) priceHistory.push(price);
        previousPrice = price;
        document.getElementById('signalPrice').innerHTML = `$${price.toFixed(2)}`;
        return price;
    } catch(e) { console.error('Initial price fetch error:', e); return 50000; }
}
